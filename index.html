<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfume Raw Materials Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff; --bg2: #f5f5fa; --text: #1a1a2e; --text2: #4a5e78;
  --accent: #3D5A80; --border: #d1d9e6; --card-bg: #ffffff;
  --badge-top-bg: #fef9c3; --badge-top-fg: #854d0e;
  --badge-mid-bg: #dbeafe; --badge-mid-fg: #1e40af;
  --badge-base-bg: #ede9fe; --badge-base-fg: #5b21b6;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e1117; --bg2: #1a2332; --text: #e8ecf0; --text2: #8899aa;
    --accent: #7E8EA6; --border: #2a3a50; --card-bg: #1a2332;
    --badge-top-bg: #422006; --badge-top-fg: #fbbf24;
    --badge-mid-bg: #172554; --badge-mid-fg: #60a5fa;
    --badge-base-bg: #2e1065; --badge-base-fg: #c4b5fd;
  }
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); padding:16px; padding-bottom:60px; max-width:900px; margin:0 auto; }
h1 { font-size:1.8em; font-weight:600; margin-bottom:4px; }
.subtitle { color:var(--text2); font-size:0.9em; margin-bottom:16px; }
hr { border:none; border-top:1px solid var(--border); margin:16px 0; }
code { font-family:'IBM Plex Mono',monospace; font-size:0.85em; color:var(--accent); background:var(--bg2); padding:1px 6px; border-radius:3px; overflow-wrap:anywhere; }

/* Search */
.search-box { display:flex; gap:8px; margin-bottom:8px; }
#searchInput { flex:1; padding:10px 14px; border:2px solid var(--border); border-radius:6px; font-size:1em; background:var(--bg2); color:var(--text); outline:none; font-family:inherit; }
#searchInput:focus { border-color:var(--accent); }
#searchBtn { padding:10px 24px; background:var(--accent); color:#fff; border:none; border-radius:6px; font-size:1em; cursor:pointer; font-family:inherit; font-weight:500; white-space:nowrap; }
#searchBtn:hover { opacity:0.85; }
#searchBtn:disabled { opacity:0.4; cursor:default; }

/* Pills */
.pills { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; min-height:0; }
.pill { padding:5px 14px; border:1px solid var(--border); border-radius:16px; font-size:0.82em; cursor:pointer; background:var(--bg2); color:var(--text); transition:all 0.15s; }
.pill:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Status */
.status { color:var(--text2); font-size:0.85em; margin-bottom:8px; }
.clear-btn { color:var(--text2); font-size:0.85em; cursor:pointer; text-decoration:underline; margin-left:12px; }

/* Cards */
.card { border:1px solid var(--border); border-radius:6px; margin-bottom:12px; overflow:hidden; }
.card-header { padding:12px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; background:var(--card-bg); }
.card-header:hover { background:var(--bg2); }
.card-header h3 { font-size:1em; font-weight:500; }
.card-arrow { transition:transform 0.2s; font-size:0.8em; color:var(--text2); }
.card-arrow.open { transform:rotate(90deg); }
.card-body { padding:0 16px 16px; display:none; }
.card-body.open { display:block; }
.card-del { color:var(--text2); font-size:1.1em; cursor:pointer; opacity:0.5; padding:4px 8px; }
.card-del:hover { opacity:1; }
.card-match { color:var(--text2); font-size:0.8em; margin-bottom:10px; }

/* Layout */
.row { display:flex; gap:16px; flex-wrap:wrap; }
.col-img { width:100%; max-width:1080px; margin:0 auto 12px; text-align:center; }
.col-img img { max-width:100%; max-height:1080px; border-radius:6px; filter:contrast(1.5) saturate(1.3); }
.col-info { flex:1; min-width:200px; }
.col-info p { margin:3px 0; font-size:0.9em; overflow-wrap:anywhere; }

/* Sections */
.sec-title { font-size:0.7em; text-transform:uppercase; letter-spacing:0.08em; color:var(--text2); font-weight:600; margin:12px 0 4px; }
.odor-desc { font-style:italic; }
.badge { display:inline-block; padding:3px 12px; border-radius:3px; font-size:0.8em; font-weight:500; margin:2px 4px; }
.badge-top { background:var(--badge-top-bg); color:var(--badge-top-fg); }
.badge-mid { background:var(--badge-mid-bg); color:var(--badge-mid-fg); }
.badge-base { background:var(--badge-base-bg); color:var(--badge-base-fg); }

/* PubChem data */
.pubchem-toggle { cursor:pointer; color:var(--accent); font-size:0.9em; margin-top:8px; }
.pubchem-data { display:none; font-size:0.85em; margin-top:8px; }
.pubchem-data.open { display:block; }
.pc-group { border:1px solid var(--border); border-radius:6px; margin-bottom:8px; overflow:hidden; }
.pc-group-header { padding:8px 12px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; background:var(--bg2); font-weight:500; font-size:0.9em; color:var(--text); }
.pc-group-header:hover { opacity:0.8; }
.pc-group-header .pc-arrow { font-size:0.7em; color:var(--text2); transition:transform 0.2s; }
.pc-group-header .pc-arrow.open { transform:rotate(90deg); }
.pc-group-body { display:none; padding:8px 12px; }
.pc-group-body.open { display:block; }
.pc-sub { margin-bottom:6px; }
.pc-sub-title { font-size:0.8em; font-weight:600; color:var(--accent); margin-bottom:2px; }
.pc-sub-content { font-size:0.88em; color:var(--text); line-height:1.5; padding:4px 0 4px 8px; border-left:2px solid var(--border); margin-left:2px; }
.pc-sub-content p { margin:2px 0; overflow-wrap:anywhere; }

/* Download bar (sticky) */
.downloads { position:fixed; bottom:0; left:0; right:0; z-index:100; background:var(--bg); border-top:1px solid var(--border); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; }
.downloads a { color:var(--text); text-decoration:underline; font-size:0.9em; cursor:pointer; }
.downloads a:hover { opacity:0.6; }

/* Progress */
.progress { display:none; height:4px; background:var(--border); border-radius:2px; margin:8px 0; overflow:hidden; }
.progress-bar { height:100%; background:var(--accent); transition:width 0.3s; }
.progress-text { font-size:0.8em; color:var(--text2); }

/* Back to top */
.back-top a { color:var(--text2); font-size:0.85em; text-decoration:none; }
.back-top a:hover { text-decoration:underline; }

/* Loading */
.spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Error */
.error-card { border-color:#e74c3c; }
.error-text { color:#e74c3c; font-size:0.85em; }

html { scroll-behavior:smooth; }
@media (max-width:600px) {
  .col-img { flex:0 0 80px; }
  h1 { font-size:1.4em; }
  .row { gap:10px; }
}
</style>
</head>
<body>
<div id="top"></div>
<h1>Perfume Raw Materials Analyzer</h1>
<p class="subtitle">PubChem compound data + perfumery knowledge</p>
<hr>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="e.g. linalool, hedione, iso e super" autocomplete="off">
  <button id="searchBtn" disabled>Search</button>
</div>
<div class="pills" id="pills"></div>
<div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
<p class="progress-text" id="progressText"></p>
<hr>

<div id="statusBar" style="display:none">
  <span class="status" id="statusText"></span>
  <span class="clear-btn" onclick="clearAll()">Clear all</span>
</div>
<div id="results"></div>
<div class="downloads" id="downloads" style="display:none">
  <a onclick="downloadJSON()">Download.JSON</a>
  <span class="back-top"><a href="#top">▲ Back to top</a></span>
</div>

<script src="perfumery_data.js"></script>
<script>
const PUBCHEM_REST = "https://pubchem.ncbi.nlm.nih.gov/rest/pug";
// Build CAS-keyed lookup from array
const DB = {};
PERFUMERY_DATA.perfumery_db.forEach(entry => { DB[entry.cas] = entry; });
const TRADES = PERFUMERY_DATA.trade_names;
const MIXTURES = new Set(PERFUMERY_DATA.mixture_cas);

// Build synonym→CAS reverse lookup
const NAME_TO_CAS = {};
for (const [cas, entry] of Object.entries(DB)) {
  for (const name of entry.synonyms || []) NAME_TO_CAS[name.toLowerCase()] = cas;
}

// Build prefix index (pre-sorted by name length descending)
const _seen = new Set();
const PREFIX_IX = {};
function _addPrefix(name) {
  if (_seen.has(name)) return;
  _seen.add(name);
  const nl = name.toLowerCase();
  const cas = TRADES[nl] || NAME_TO_CAS[nl] || "";
  for (let i=1; i<=Math.min(name.length,11); i++) {
    const p = name.substring(0,i);
    if (!PREFIX_IX[p]) PREFIX_IX[p] = [];
    PREFIX_IX[p].push({name, cas});
  }
}
Object.keys(TRADES).forEach(_addPrefix);
Object.values(DB).forEach(e => (e.synonyms||[]).forEach(_addPrefix));
for (const key in PREFIX_IX) PREFIX_IX[key].sort((a,b)=>b.name.length-a.name.length);

// Build lowercase synonym→CAS index for fast fuzzy matching (keep first match per synonym)
const SYN_IX = {};
for (const [cas, entry] of Object.entries(DB)) {
  for (const name of entry.synonyms || []) {
    const nl = name.toLowerCase();
    if (!SYN_IX[nl]) SYN_IX[nl] = {cas, name}; // First wins, no overwrite
  }
}

let results = [];
let pcCache = {};

// ── Search input ──
const input = document.getElementById("searchInput");
const btn = document.getElementById("searchBtn");
const pillsDiv = document.getElementById("pills");

let _pillTimer;
input.addEventListener("input", () => {
  btn.disabled = !input.value.trim();
  clearTimeout(_pillTimer);
  _pillTimer = setTimeout(() => showPills(input.value), 150);
});
input.addEventListener("keydown", e => { const v=input.value.trim(); if (e.key==="Enter"&&v) doSearch(v); });
btn.addEventListener("click", () => { const v=input.value.trim(); if (v) doSearch(v); });

function showPills(typed) {
  const ql = typed.toLowerCase().replace(/\s+/g,' ').trim();
  const qs = ql;
  if (qs.length < 1) { pillsDiv.innerHTML = ""; return; }
  
  const existingCas = new Set();
  const existingNames = new Set();
  results.forEach(r => { if (r.cas_number) existingCas.add(r.cas_number); existingNames.add(r.name.toLowerCase()); });
  
  let suggestions = [];
  const seenCas = new Set();
  
  // Prefix match (with trailing space)
  (PREFIX_IX[ql]||[]).forEach(({name,cas}) => {
    if (suggestions.length>=10) return;
    if (cas && seenCas.has(cas)) return;
    suggestions.push({name:toTitle(name),cas}); if(cas)seenCas.add(cas);
  });

  // Without space fallback
  if (!suggestions.length && ql!==qs) {
    (PREFIX_IX[qs]||[]).forEach(({name,cas}) => {
      if (suggestions.length>=10) return;
      if (cas && seenCas.has(cas)) return;
      suggestions.push({name:toTitle(name),cas}); if(cas)seenCas.add(cas);
    });
  }
  
  // Space fallback
  if (!suggestions.length && qs.includes(' ')) {
    const shorter = qs.substring(0, qs.lastIndexOf(' '));
    (PREFIX_IX[shorter]||[]).forEach(({name,cas}) => {
      if (suggestions.length>=10) return;
      if (!name.startsWith(qs) && !name.includes(qs)) return;
      if (cas && seenCas.has(cas)) return;
      suggestions.push({name:toTitle(name),cas}); if(cas)seenCas.add(cas);
    });
  }
  
  // Substring
  if (suggestions.length<10 && qs.length>=2) {
    (PREFIX_IX[qs.substring(0,2)]||PREFIX_IX[qs[0]]||[]).forEach(({name,cas}) => {
      if (suggestions.length>=10) return;
      if (!name.includes(qs)) return;
      if (suggestions.find(s=>s.name===toTitle(name))) return;
      if (cas && seenCas.has(cas)) return;
      suggestions.push({name:toTitle(name),cas}); if(cas)seenCas.add(cas);
    });
  }
  
  // Filter out already in results
  suggestions = suggestions.filter(s => {
    const sl = s.name.toLowerCase();
    if (sl===qs || existingNames.has(sl)) return false;
    if (s.cas && existingCas.has(s.cas)) return false;
    return true;
  });

  // Render local suggestions immediately
  renderPills(suggestions);

  // PubChem autocomplete fallback (async, renders when done)
  if (suggestions.length < 3 && qs.length >= 2) {
    const currentQuery = qs;
    pubchemAutocomplete(qs).then(names => {
      if (!names.length && qs.includes('.')) {
        return pubchemAutocomplete(qs.replace(/\./g,''));
      }
      return names;
    }).then(names => {
      // Abort if user has typed something else
      if (input.value.toLowerCase().trim() !== currentQuery) return;
      if (!names) return;
      names.forEach(n => {
        if (suggestions.length >= 10) return;
        if (suggestions.find(s=>s.name===n)) return;
        if (existingNames.has(n.toLowerCase())) return;
        suggestions.push({name:n, cas:""});
      });
      renderPills(suggestions);
    });
  }
}

function renderPills(suggestions) {
  pillsDiv.innerHTML = suggestions.slice(0,10).map(s =>
    `<span class="pill" onclick="doSearch('${s.name.replace(/'/g,"\\'")}')">${s.name}</span>`
  ).join('');
}

// Fetch with timeout
function fetchWithTimeout(url, opts={}, ms=8000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, {...opts, signal:ctrl.signal}).finally(() => clearTimeout(timer));
}

async function pubchemAutocomplete(q) {
  const key = 'ac_'+q.toLowerCase();
  if (pcCache[key]) return pcCache[key];
  try {
    const r = await fetchWithTimeout(`https://pubchem.ncbi.nlm.nih.gov/rest/autocomplete/compound/${encodeURIComponent(q)}/JSON?limit=5`);
    const d = await r.json();
    const names = d.dictionary_terms?.compound || [];
    pcCache[key] = names;
    return names;
  } catch(e) { return []; }
}

// ── Search ──
async function doSearch(term) {
  const names = term.split(',').map(s=>s.trim()).filter(Boolean);
  const existingNames = new Set(results.map(r=>r.name.toLowerCase()));
  const newNames = names.filter(n=>!existingNames.has(n.toLowerCase()));
  if (!newNames.length) return;
  
  const prog = document.getElementById("progress");
  const progBar = document.getElementById("progressBar");
  const progText = document.getElementById("progressText");
  prog.style.display = "block";
  
  // Parallel scraping (max 5 concurrent, fault-tolerant)
  const BATCH = 5;
  for (let i=0; i<newNames.length; i+=BATCH) {
    const batch = newNames.slice(i, i+BATCH);
    progBar.style.width = ((i/newNames.length)*100)+"%";
    progText.textContent = batch.join(', ');
    const settled = await Promise.allSettled(batch.map(n => scrapeMaterial(n)));
    settled.forEach(r => { if (r.status==='fulfilled') results.unshift(r.value); });
  }
  
  // Dedup by CAS — keep first (newest)
  const seen = new Set();
  results = results.filter(r => {
    if (!r.cas_number) return true;
    if (seen.has(r.cas_number)) return false;
    seen.add(r.cas_number); return true;
  });
  
  progBar.style.width = "100%";
  prog.style.display = "none";
  progText.textContent = "";
  input.value = "";
  pillsDiv.innerHTML = "";
  btn.disabled = true;
  renderResults();
  // Prefetch images + PubChem data in background
  prefetchAll();
}

async function scrapeMaterial(name) {
  const mat = {name, found:false, cas_number:"", fema_number:"", iupac_name:"",
    molecular_formula:"", molecular_weight:"", smiles:"", inchi:"",
    synonyms:[], structure_image_url:"", page_url:"", match_info:"",
    odor_description:"", odor_type:"", odor_strength:"", note_classification:"",
    tenacity:"", tenacity_hours:"", ifra_guidelines:"", usage_levels:"",
    blends_well_with:[], pubchem_sections:{}};
  
  const n = name.toLowerCase().replace(/[®™]/g,'').trim();
  const CAS_RE = /^\d{2,7}-\d{2}-\d$/;
  const SMILES_RE = /^[A-Za-z0-9@+\-\[\]\(\)\\\/=#$.%]+$/;
  let cid = null;

  // ── Fast path: direct DB match by name/synonym → return instantly ──
  const fastCas = TRADES[n] || NAME_TO_CAS[n];
  if (fastCas && DB[fastCas]) {
    mat.cas_number = fastCas;
    mat.found = true;
    mat.match_info = "✅ CAS match (" + fastCas + ")";
    applyPerfumery(mat, fastCas);
    if (MIXTURES.has(fastCas)) {
      mat.match_info = "✅ Natural mixture (CAS " + fastCas + ")";
    }
    // Load CID + image + properties in background (non-blocking)
    mat._loadPubchem = getCid(fastCas).then(async cid => {
      if (!cid) return;
      mat._cid = cid;
      mat.page_url = `https://pubchem.ncbi.nlm.nih.gov/compound/${cid}`;
      mat.structure_image_url = `${PUBCHEM_REST}/compound/cid/${cid}/record/PNG?image_size=500x500`;
      const [propsRes, synsRes] = await Promise.allSettled([
        fetchWithTimeout(`${PUBCHEM_REST}/compound/cid/${cid}/property/MolecularFormula,MolecularWeight,CanonicalSMILES,IUPACName,InChI/JSON`).then(r=>r.json()).catch(()=>null),
        fetchWithTimeout(`${PUBCHEM_REST}/compound/cid/${cid}/synonyms/JSON`).then(r=>r.json()).catch(()=>null),
      ]);
      const propsData = propsRes.status==='fulfilled' ? propsRes.value : null;
      if (propsData) {
        const p = propsData.PropertyTable?.Properties?.[0] || {};
        mat.molecular_formula = p.MolecularFormula || "";
        mat.molecular_weight = String(p.MolecularWeight || "");
        mat.smiles = p.CanonicalSMILES || "";
        mat.iupac_name = p.IUPACName || "";
        mat.inchi = p.InChI || "";
      }
      const synsData = synsRes.status==='fulfilled' ? synsRes.value : null;
      if (synsData) mat.synonyms = (synsData.InformationList?.Information?.[0]?.Synonym || []).slice(0,15);
      renderResults(); // Re-render to show image + chemical data
      prefetchAll();
    }).catch(()=>{});
    return mat;
  }

  // ── Strategy 1: CAS detection ──
  if (CAS_RE.test(n)) {
    cid = await getCid(n);
    if (cid) { mat.cas_number = n; mat.match_info = "✅ CAS direct lookup (" + n + ")"; }
  }

  // ── Strategy 2: SMILES detection ──
  if (!cid && SMILES_RE.test(n) && n.length > 5 && /[=#\(\)]/.test(n)) {
    try {
      const r = await fetchWithTimeout(`${PUBCHEM_REST}/compound/smiles/cids/JSON?smiles=${encodeURIComponent(name.trim())}`);
      const d = await r.json();
      cid = d.IdentifierList?.CID?.[0] || null;
      if (cid) mat.match_info = "✅ SMILES lookup";
    } catch(e) {}
  }

  // ── Strategy 3: InChI detection ──
  if (!cid && n.startsWith("inchi=")) {
    try {
      const r = await fetchWithTimeout(`${PUBCHEM_REST}/compound/inchi/cids/JSON`, {
        method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"inchi="+encodeURIComponent(name.trim())
      });
      const d = await r.json();
      cid = d.IdentifierList?.CID?.[0] || null;
      if (cid) mat.match_info = "✅ InChI lookup";
    } catch(e) {}
  }

  // ── Strategy 4: Trade name → CAS → CID ──
  if (!cid) {
    let tradeCas = TRADES[n];
    // Fuzzy variants
    if (!tradeCas) {
      const variants = [
        n.replace(/ /g, '-'), n.replace(/-/g, ' '),
      ];
      // Only apply chemical suffix swaps if input looks like a chemical name
      if (n.length > 4) {
        if (n.endsWith('ol') && !n.endsWith('ool')) variants.push(n.replace(/ol$/, 'ool'));
        if (n.endsWith('ool')) variants.push(n.replace(/ool$/, 'ol'));
        if (n.endsWith('ene') && !n.endsWith('en')) variants.push(n.replace(/ene$/, 'en'));
        if (n.endsWith('en') && !n.endsWith('ene')) variants.push(n.replace(/en$/, 'ene'));
      }
      for (const v of variants) { if (v !== n && TRADES[v]) { tradeCas = TRADES[v]; break; } }
    }
    if (tradeCas) {
      if (MIXTURES.has(tradeCas)) {
        mat.found = true; mat.cas_number = tradeCas;
        mat.match_info = "✅ Natural mixture (CAS " + tradeCas + ")";
        applyPerfumery(mat, tradeCas);
        return mat;
      }
      cid = await getCid(tradeCas);
      if (cid) { mat.cas_number = tradeCas; mat.match_info = "✅ CAS match (" + tradeCas + ")"; }
      // SID fallback for trade CAS
      if (!cid) {
        cid = await getCidViaSid(tradeCas);
        if (cid) { mat.cas_number = tradeCas; mat.match_info = "✅ CAS via Substance DB (" + tradeCas + ")"; }
      }
    }
  }

  // ── Strategy 5: Exact name on PubChem ──
  if (!cid) {
    cid = await getCid(name);
  }

  // ── Strategy 6: SID→CID (Substance DB) ──
  if (!cid) {
    cid = await getCidViaSid(name);
    if (cid) mat.match_info = "ℹ️ Found via Substance DB";
  }

  // ── Strategy 7: Fuzzy perfumery DB match ──
  if (!cid) {
    const fuzzy = fuzzyMatchDB(n);
    if (fuzzy) {
      cid = await getCid(fuzzy.cas);
      if (cid) { mat.cas_number = fuzzy.cas; mat.match_info = "ℹ️ Fuzzy match: " + fuzzy.name; }
    }
  }

  if (!cid) return mat; // not found after all strategies
  
  mat.found = true;
  mat.page_url = `https://pubchem.ncbi.nlm.nih.gov/compound/${cid}`;
  mat.structure_image_url = `${PUBCHEM_REST}/compound/cid/${cid}/record/PNG?image_size=500x500`;
  
  // ── Fetch properties + synonyms in PARALLEL ──
  const [propsRes, synsRes] = await Promise.allSettled([
    fetchWithTimeout(`${PUBCHEM_REST}/compound/cid/${cid}/property/MolecularFormula,MolecularWeight,CanonicalSMILES,IUPACName,InChI/JSON`).then(r=>r.json()).catch(()=>null),
    fetchWithTimeout(`${PUBCHEM_REST}/compound/cid/${cid}/synonyms/JSON`).then(r=>r.json()).catch(()=>null),
  ]);
  
  const propsData = propsRes.status==='fulfilled' ? propsRes.value : null;
  if (propsData) {
    const p = propsData.PropertyTable?.Properties?.[0] || {};
    mat.molecular_formula = p.MolecularFormula || "";
    mat.molecular_weight = String(p.MolecularWeight || "");
    mat.smiles = p.CanonicalSMILES || "";
    mat.iupac_name = p.IUPACName || "";
    mat.inchi = p.InChI || "";
  }
  
  const synsData = synsRes.status==='fulfilled' ? synsRes.value : null;
  if (synsData) {
    const syns = synsData.InformationList?.Information?.[0]?.Synonym || [];
    mat.synonyms = syns.slice(0,15);
    if (!mat.cas_number) {
      const cas = syns.find(s => CAS_RE.test(s));
      if (cas) mat.cas_number = cas;
    }
  }
  
  // ── Apply perfumery overlay ──
  if (mat.cas_number) applyPerfumery(mat, mat.cas_number);
  
  // Store CID for lazy PUG View loading (fetched only when user opens section)
  mat._cid = cid;
  
  return mat;
}

// SID→CID lookup
async function getCidViaSid(name) {
  const key = 'sid_'+name.toLowerCase();
  if (pcCache[key] !== undefined) return pcCache[key];
  try {
    const r = await fetchWithTimeout(`${PUBCHEM_REST}/substance/name/${encodeURIComponent(name)}/cids/JSON?cids_type=standardized`);
    const d = await r.json();
    const cid = d.InformationList?.Information?.[0]?.CID?.[0] || null;
    pcCache[key] = cid; return cid;
  } catch(e) { pcCache[key]=null; return null; }
}

// Fuzzy perfumery DB match (uses pre-built SYN_IX)
function fuzzyMatchDB(query) {
  // Exact match first (O(1))
  if (SYN_IX[query]) return SYN_IX[query];
  // Substring match
  let bestScore = 0, bestMatch = null;
  for (const [nl, match] of Object.entries(SYN_IX)) {
    if (nl.includes(query) || query.includes(nl)) {
      const score = Math.min(query.length, nl.length) / Math.max(query.length, nl.length);
      if (score > bestScore && score > 0.6) { bestScore = score; bestMatch = match; }
    }
  }
  return bestMatch;
}

// Sections to skip entirely (not useful for perfumery users)
const SKIP_SECTIONS = new Set([
  "3D Conformer",
  "Record Description", "Summary Information",
  "Crystal Structures", "Information Sources",
  "Taxonomy", "Gene Regulation"
]);

// Extract all PUG View sections recursively
function extractAllSections(sections, prefix="", depth=0) {
  if (depth > 4) return {}; // Limit recursion depth
  const result = {};
  for (const sec of sections) {
    if (SKIP_SECTIONS.has(sec.TOCHeading)) continue;
    const heading = prefix ? `${prefix} > ${sec.TOCHeading}` : sec.TOCHeading;
    if (sec.Information) {
      const items = [];
      for (const info of sec.Information) {
        if (items.length >= 30) break; // Cap items per section
        if (info.Value?.StringWithMarkup) {
          for (const sm of info.Value.StringWithMarkup) {
            if (sm.String && sm.String.length > 5) items.push(sm.String);
          }
        }
      }
      if (items.length) result[heading] = items;
    }
    if (sec.Section) {
      Object.assign(result, extractAllSections(sec.Section, heading, depth+1));
    }
  }
  return result;
}

function applyPerfumery(mat, cas) {
  let pdb = DB[cas];
  // Fallback: try finding CAS via synonym match from mat.name
  if (!pdb && mat.name) {
    const fallbackCas = NAME_TO_CAS[mat.name.toLowerCase()];
    if (fallbackCas) { pdb = DB[fallbackCas]; cas = fallbackCas; mat.cas_number = cas; }
  }
  if (!pdb) return;
  mat.odor_description = (pdb.odor && pdb.odor.description) || "";
  mat.odor_type = (pdb.odor && pdb.odor.type) || "";
  mat.odor_strength = (pdb.odor && pdb.odor.strength) || "";
  mat.note_classification = pdb.note || "";
  mat.tenacity = (pdb.performance && pdb.performance.tenacity) || "";
  mat.tenacity_hours = (pdb.performance && pdb.performance.duration) || "";
  mat.ifra_guidelines = (pdb.safety && pdb.safety.ifra) || "";
  mat.usage_levels = (pdb.safety && pdb.safety.usage) || "";
  mat.blends_well_with = pdb.blends_with || [];
  if (pdb.fema) mat.fema_number = pdb.fema;
  if (!mat.match_info) mat.match_info = "✅ CAS match (" + cas + ")";
}

async function getCid(name) {
  const key = 'cid_'+name.toLowerCase();
  if (pcCache[key] !== undefined) return pcCache[key];
  try {
    const r = await fetchWithTimeout(`${PUBCHEM_REST}/compound/name/${encodeURIComponent(name)}/cids/JSON`);
    const d = await r.json();
    const cid = d.IdentifierList?.CID?.[0] || null;
    pcCache[key] = cid; return cid;
  } catch(e) { pcCache[key]=null; return null; }
}

let pcGroupId = 0;
function renderPubchemSections(sections) {
  const grouped = {};
  for (const [heading, items] of Object.entries(sections)) {
    const top = heading.includes(' > ') ? heading.split(' > ')[0] : heading;
    if (!grouped[top]) grouped[top] = [];
    grouped[top].push({heading, items});
  }
  let html = '';
  for (const [topH, subs] of Object.entries(grouped)) {
    // Build body content first to check if it's empty
    let bodyHtml = '';
    for (const {heading, items} of subs) {
      const display = heading.includes(' > ') ? heading.split(' > ').pop() : heading;
      const cleaned = [];
      for (const item of items) {
        if (cleaned.length >= 20) break;
        if (item.startsWith('http')) continue;
        const c = item.replace(/https?:\/\/\S+/g,'').trim();
        if (c && c.length >= 3) cleaned.push(c);
      }
      if (!cleaned.length) continue;
      bodyHtml += `<div class="pc-sub">`;
      if (display !== topH) bodyHtml += `<div class="pc-sub-title">${esc(display)}</div>`;
      bodyHtml += `<div class="pc-sub-content">`;
      for (const c of cleaned) {
        bodyHtml += `<p>${esc(c.length>400?c.substring(0,400)+'…':c)}</p>`;
      }
      bodyHtml += `</div></div>`;
    }
    // Skip entire group if body is empty
    if (!bodyHtml) continue;
    const gid = pcGroupId++;
    html += `<div class="pc-group">`;
    html += `<div class="pc-group-header" onclick="togglePcGroup(${gid})">
      <span>${esc(topH)}</span>
      <span class="pc-arrow" id="pcArrow${gid}">▶</span>
    </div>`;
    html += `<div class="pc-group-body" id="pcBody${gid}">${bodyHtml}</div></div>`;
  }
  return html;
}

function togglePcGroup(gid) {
  const body = document.getElementById("pcBody"+gid);
  const arrow = document.getElementById("pcArrow"+gid);
  body.classList.toggle("open");
  arrow.classList.toggle("open");
}

// ── Render ──

    if (!mat.found) return `
      <div class="card error-card">
        <div class="card-header" onclick="toggleCard(${idx})">

          <span><span class="card-del" onclick="event.stopPropagation();delResult(${idx})">✕</span></span>
        </div>
        <div class="card-body"><p class="error-text">'${esc(mat.name)}' not found</p></div>
      </div>`;
    
    const nl = (mat.note_classification||"").toLowerCase();

    if (nl.includes("top")) badges += `<span class="badge badge-top">Top</span>`;
    if (nl.includes("middle")||nl.includes("heart")) badges += `<span class="badge badge-mid">Heart</span>`;
    if (nl.includes("base")) badges += `<span class="badge badge-base">Base</span>`;
    
    const ids = [
      mat.cas_number?`<p><code>CAS</code> ${esc(mat.cas_number)}</p>`:"",
      mat.fema_number?`<p><code>FEMA</code> ${esc(mat.fema_number)}</p>`:"",
      mat.iupac_name?`<p><code>IUPAC</code> ${esc(mat.iupac_name)}</p>`:"",
      mat.molecular_formula?`<p><code>Formula</code> ${esc(mat.molecular_formula)}</p>`:"",
      mat.molecular_weight?`<p><code>MW</code> ${esc(mat.molecular_weight)}</p>`:"",
      mat.smiles?`<p><code>SMILES</code> ${esc(mat.smiles)}</p>`:"",
      mat.inchi?`<p><code>InChI</code> ${esc(mat.inchi)}</p>`:"",
    ].join('');
    
    const syns = mat.synonyms.length?`<p style="color:var(--text2);font-size:0.8em;margin-top:6px">${esc(mat.synonyms.slice(0,8).join(', '))}</p>`:"";
    
    return `
      <div class="card">
        <div class="card-header" onclick="toggleCard(${idx})">
          <h3><span class="card-arrow" id="arrow${idx}">▶</span> ${esc(mat.name)}</h3>
          <span class="card-del" onclick="event.stopPropagation();delResult(${idx})">✕</span>
        </div>
        <div class="card-body" id="body${idx}">
          ${mat.match_info?`<p class="card-match">${esc(mat.match_info)}</p>`:""}
          ${mat.structure_image_url?`<div class="col-img"><img src="${mat.structure_image_url}" alt="structure" loading="lazy"></div>`:""}
          <div class="col-info">
            <p><strong>${esc(mat.name)}</strong></p>
            ${mat.page_url?`<p><a href="${mat.page_url}" target="_blank" style="color:var(--accent);font-size:0.85em">PubChem ↗</a></p>`:""}
            ${ids}${syns}
          </div>
          <hr>
          <div class="row">
            <div style="flex:1">
              <p class="sec-title">Odor</p>
              ${mat.odor_description?`<p class="odor-desc">${esc(mat.odor_description)}</p>`:""}
              ${mat.odor_type?`<p>${esc(mat.odor_type)}</p>`:""}
              ${mat.odor_strength?`<p style="color:var(--text2);font-size:0.85em">${esc(mat.odor_strength)}</p>`:""}
              ${!mat.odor_description&&!mat.odor_type?`<p style="color:var(--text2)">—</p>`:""}
            </div>
            <div style="flex:1">
              <p class="sec-title">Note</p>
              ${badges||`<p style="color:var(--text2)">—</p>`}
            </div>
            <div style="flex:1">
              <p class="sec-title">Performance</p>
              ${mat.tenacity?`<p>${esc(mat.tenacity)}</p>`:""}
              ${mat.tenacity_hours?`<p style="color:var(--text2);font-size:0.85em">${esc(mat.tenacity_hours)}</p>`:""}
              ${!mat.tenacity?`<p style="color:var(--text2)">—</p>`:""}
            </div>
          </div>
          ${mat.ifra_guidelines||mat.usage_levels||mat.blends_well_with.length?`
          <hr>
          <div class="row">

              ${mat.ifra_guidelines?`<p>${esc(mat.ifra_guidelines)}</p>`:""}

            </div>

          ${mat._cid?`

function prefetchAll() {
  results.forEach((mat, idx) => {
    if (!mat.found) return;
    // Prefetch structure image
    if (mat.structure_image_url) {
      const img = new Image();
      img.src = mat.structure_image_url;
    }
    // Prefetch PubChem pug_view data in background
    if (mat._cid && !mat._prefetched) {
      mat._prefetched = true;
      fetchWithTimeout(`https://pubchem.ncbi.nlm.nih.gov/rest/pug_view/data/compound/${mat._cid}/JSON`, {}, 15000)
        .then(r => r.json())
        .then(d => {
          const sections = d.Record?.Section || [];
          mat.pubchem_sections = extractAllSections(sections);
          if (!mat.fema_number) {
            for (const [heading, items] of Object.entries(mat.pubchem_sections)) {
              if (heading.toLowerCase().includes('fema') && items.length) {
                mat.fema_number = items[0]; break;
              }
            }
          }
        })
        .catch(() => {});
    }
  });
}

function toggleCard(idx) {
  const body = document.getElementById("body"+idx);
  const arrow = document.getElementById("arrow"+idx);
  body.classList.toggle("open");
  arrow.classList.toggle("open");
}

async function loadPubchemData(idx) {
  const toggle = document.getElementById("pcToggle"+idx);
  const dataDiv = document.getElementById("pcData"+idx);
  
  // Toggle open/close if already loaded
  if (dataDiv.dataset.loaded) {
    dataDiv.classList.toggle("open");
    toggle.textContent = dataDiv.classList.contains("open") ? "▼ Complete PubChem Data" : "▶ Complete PubChem Data";
    return;
  }
  
  const mat = results[idx];
  if (!mat._cid) return;
  
  toggle.textContent = "⏳ Loading...";
  try {
    // Use prefetched data if available, otherwise fetch now
    if (!mat.pubchem_sections || !Object.keys(mat.pubchem_sections).length) {
      const r = await fetchWithTimeout(`https://pubchem.ncbi.nlm.nih.gov/rest/pug_view/data/compound/${mat._cid}/JSON`, {}, 10000);
      const d = await r.json();
      const sections = d.Record?.Section || [];
      mat.pubchem_sections = extractAllSections(sections);
      if (!mat.fema_number) {
        for (const [heading, items] of Object.entries(mat.pubchem_sections)) {
          if (heading.toLowerCase().includes('fema') && items.length) {
            mat.fema_number = items[0]; break;
          }
        }
      }
    }
    
    dataDiv.innerHTML = renderPubchemSections(mat.pubchem_sections);
    dataDiv.dataset.loaded = "1";
    dataDiv.classList.add("open");
    toggle.textContent = "▼ Complete PubChem Data";
  } catch(e) {
    toggle.textContent = "❌ Failed to load — click to retry";
    dataDiv.dataset.loaded = "";
  }
}

function delResult(idx) {
  results.splice(idx,1);
  renderResults();
  showPills(input.value);
}

function clearAll() {
  results = [];
  renderResults();
  showPills(input.value);
}

function buildPerfumerySections(mat) {
  const sections = [];
  if (mat.odor_description || mat.odor_type || mat.odor_strength) {
    const info = [];
    if (mat.odor_description) info.push({ReferenceNumber:0,Description:"Odor Description",Value:{StringWithMarkup:[{String:mat.odor_description}]}});
    if (mat.odor_type) info.push({ReferenceNumber:0,Description:"Odor Type",Value:{StringWithMarkup:[{String:mat.odor_type}]}});
    if (mat.odor_strength) info.push({ReferenceNumber:0,Description:"Odor Strength",Value:{StringWithMarkup:[{String:mat.odor_strength}]}});
    sections.push({TOCHeading:"Odor Profile",Description:"Olfactory characteristics from perfumery database.",Information:info});
  }
  if (mat.note_classification) {
    sections.push({TOCHeading:"Note Classification",Description:"Fragrance pyramid classification.",Information:[
      {ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.note_classification}]}}
    ]});
  }
  if (mat.tenacity || mat.tenacity_hours) {
    const info = [];
    if (mat.tenacity) info.push({ReferenceNumber:0,Description:"Tenacity",Value:{StringWithMarkup:[{String:mat.tenacity}]}});
    if (mat.tenacity_hours) info.push({ReferenceNumber:0,Description:"Duration",Value:{StringWithMarkup:[{String:mat.tenacity_hours}]}});
    sections.push({TOCHeading:"Performance",Description:"Longevity and projection characteristics.",Information:info});
  }
  if (mat.ifra_guidelines || mat.usage_levels) {
    const info = [];
    if (mat.ifra_guidelines) info.push({ReferenceNumber:0,Description:"IFRA Guidelines",Value:{StringWithMarkup:[{String:mat.ifra_guidelines}]}});
    if (mat.usage_levels) info.push({ReferenceNumber:0,Description:"Usage Levels",Value:{StringWithMarkup:[{String:mat.usage_levels}]}});
    sections.push({TOCHeading:"Perfumery Safety",Description:"IFRA restrictions and recommended usage levels.",Information:info});
  }
  if (mat.blends_well_with && mat.blends_well_with.length) {
    sections.push({TOCHeading:"Blending",Description:"Compatible fragrance materials.",Information:[
      {ReferenceNumber:0,Description:"Blends Well With",Value:{StringWithMarkup:mat.blends_well_with.map(s=>({String:s}))}}
    ]});
  }
  return sections;
}

function buildLocalRecord(mat) {
  const sections = [];

  // Names and Identifiers
  const namesSec = [];
  if (mat.cas_number) namesSec.push({TOCHeading:"CAS",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.cas_number}]}}]});
  if (mat.fema_number) namesSec.push({TOCHeading:"FEMA Number",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.fema_number}]}}]});
  if (mat.iupac_name) namesSec.push({TOCHeading:"IUPAC Name",Description:"Chemical name computed from structure based on IUPAC nomenclature standards.",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.iupac_name}]}}]});
  if (mat.synonyms.length) namesSec.push({TOCHeading:"Synonyms",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:mat.synonyms.map(s=>({String:s}))}}]});
  if (namesSec.length) sections.push({TOCHeading:"Names and Identifiers",Description:"Chemical names, synonyms, identifiers, and descriptors.",Section:namesSec});

  // Chemical and Physical Properties
  const chemSec = [];
  if (mat.molecular_formula) chemSec.push({TOCHeading:"Molecular Formula",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.molecular_formula}]}}]});
  if (mat.molecular_weight) chemSec.push({TOCHeading:"Molecular Weight",Information:[{ReferenceNumber:0,Value:{Number:[parseFloat(mat.molecular_weight)]}}]});
  if (mat.smiles) chemSec.push({TOCHeading:"Canonical SMILES",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.smiles}]}}]});
  if (mat.inchi) chemSec.push({TOCHeading:"InChI",Description:"International Chemical Identifier.",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.inchi}]}}]});
  if (chemSec.length) sections.push({TOCHeading:"Chemical and Physical Properties",Description:"Structural descriptors and computed properties.",Section:chemSec});

  // Structures (image link)
  if (mat._cid) {
    sections.push({TOCHeading:"Structures",Description:"Structure depictions of this compound.",Section:[
      {TOCHeading:"2D Structure",Information:[{ReferenceNumber:0,Value:{Boolean:[true]}}],
        URL:`https://pubchem.ncbi.nlm.nih.gov/image/imgsrv.fcgi?cid=${mat._cid}&t=l`}
    ]});
  }

  // Perfumery Data
  const perfSections = buildPerfumerySections(mat);
  if (perfSections.length) sections.push({TOCHeading:"Perfumery Data",Description:"Perfumery-specific data from local fragrance database.",Section:perfSections});

  return {
    Record: {
      RecordType: "CID",
      RecordNumber: mat._cid || null,
      RecordTitle: mat.name,
      Section: sections
    }
  };
}

async function downloadJSON() {
  const found = results.filter(r=>r.found);
  if (!found.length) return;

  const btn = document.querySelector('.downloads a[onclick*="downloadJSON"]');
  if (!btn) return;
  const origText = btn.textContent;
  btn.style.pointerEvents = "none";
  btn.style.opacity = "0.4";

  async function fetchRecord(mat) {
    if (mat._cid) {
      try {
        const r = await fetchWithTimeout(`https://pubchem.ncbi.nlm.nih.gov/rest/pug_view/data/compound/${mat._cid}/JSON`, {}, 10000);
        if (r.ok) {
          const d = await r.json();
          if (d.Record && d.Record.Section) {
            const perfSections = buildPerfumerySections(mat);
            if (perfSections.length) {
              d.Record.Section.push({TOCHeading:"Perfumery Data",Description:"Perfumery-specific data from local fragrance database.",Section:perfSections});
            }
            return d;
          }
        }
      } catch(e) {}
    }
    return buildLocalRecord(mat);
  }

  const data = [];
  const BATCH = 4;
  for (let i = 0; i < found.length; i += BATCH) {
    const batch = found.slice(i, i + BATCH);
    btn.textContent = `⏳ ${i+1}/${found.length}...`;
    const settled = await Promise.allSettled(batch.map(m => fetchRecord(m)));
    settled.forEach(r => { if (r.status==='fulfilled') data.push(r.value); });
  }

  if (data.length) {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "perfume_report.json"; a.click();
  }

  btn.textContent = origText;
  btn.style.pointerEvents = "";
  btn.style.opacity = "";
}

function esc(s) { const d=document.createElement('div'); d.textContent=s||""; return d.innerHTML; }
function toTitle(s) { return s.replace(/\b\w/g, c=>c.toUpperCase()); }
