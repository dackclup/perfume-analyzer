// ── Helpers ──

// Normalize a free-text token to a canonical snake_case key suitable
// for FACET_TAGS / TAXONOMY_SYNONYMS lookup. Lowercases, strips
// punctuation (except - and /), collapses whitespace and separators
// to '_', and trims leading/trailing '_'. Returns '' on falsy input.
function normalizeTaxonomyToken(s) {
  if (s == null) return '';
  return String(s)
    .toLowerCase()
    .replace(/[^\w\s\-/]+/g, ' ')
    .trim()
    .replace(/[\s\-/]+/g, '_')
    .replace(/^_+|_+$/g, '');
}

// Stable dedup. Preserves first occurrence order.
function uniqStable(arr) {
  if (!Array.isArray(arr)) return [];
  const seen = new Set();
  const out = [];
  for (const x of arr) {
    if (x == null) continue;
    const key = typeof x === 'string' ? x : JSON.stringify(x);
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(x);
  }
  return out;
}

// Sort `items` by their position in `canonical`. Items not present in
// canonical are pushed to the end in their original relative order.
function sortByCanonicalOrder(items, canonical) {
  if (!Array.isArray(items)) return [];
  const rank = new Map();
  (canonical || []).forEach((v, i) => rank.set(v, i));
  return items
    .map((v, i) => ({ v, r: rank.has(v) ? rank.get(v) : (canonical?.length || 0) + i }))
    .sort((a, b) => a.r - b.r)
    .map(x => x.v);
}


// ═══════════════════════════════════════════════════════════════
// TAXONOMY CLASSIFIER (Step 2)
// Builds primaryFamilies / secondaryFamilies / facets for a record.
// Reads odor_type (strongest signal), odor_description (medium), and
// blends_with / canonical name / synonyms (weakest, facets only).
// Caps: 1–3 primary families, 0–3 secondary families, 0–8 facets.
// Conservative on `gourmand` — won't enter primary or secondary
// unless an explicit gourmand facet (vanilla / caramel / honey /
// chocolate / coffee / tonka / …) is present in the facets list.
// NOT wired into rendering or filter UI yet — only writes the new
// fields onto record.classification via _computeClassification.
// ═══════════════════════════════════════════════════════════════

// Internal helper: split a free-text source into ordered normalized
// tokens. Splits on commas, slashes, semicolons, em/en dashes, the
// words "and" / "with" / "of", then expands snake_case multi-word
// fragments into their inner pieces so a string like "sweet vanilla"
// yields ['sweet_vanilla','sweet','vanilla'] (the multi-word form is
// kept first so a future synonym map can match the longer phrase).
function _orderedTaxonomyTokens(s) {
  if (!s) return [];
  const text = String(s)
    .toLowerCase()
    .replace(/[—–]/g, ',')
    .replace(/\b(?:and|with|of)\b/g, ',');
  const out = [];
  for (const part of text.split(/[,;\/]+/)) {
    const piece = normalizeTaxonomyToken(part);
    if (!piece) continue;
    out.push(piece);
    // Inner-token expansion for compound snake_case tokens.
    //
    // Skip the expansion when the whole compound already resolves to a
    // canonical token — either directly (FACET_TAGS has a key for it)
    // or via a TAXONOMY_SYNONYMS fold. Otherwise a compound like
    // "peach_skin" would leak "skin" (→ animalic) even though the
    // whole phrase is unambiguously about the peach note. The
    // synonym-aware guard keeps legitimate compounds like "skin_like"
    // on Ambroxan working, since "skin_like" is NOT in either map and
    // still expands to ["skin","like"] → skin → animalic.
    if (piece.includes('_') && !FACET_TAGS[piece] && !TAXONOMY_SYNONYMS[piece]) {
      for (const sub of piece.split('_')) {
        if (sub.length >= 3) out.push(sub);
      }
    }
  }
  return uniqStable(out);
}

// Resolve a normalized token to its canonical synonym (if any).
function _resolveTaxonomyToken(tok) {
  return TAXONOMY_SYNONYMS[tok] || tok;
}

// Specificity overrides — when both members of a pair land in the
// classifier output, the more SPECIFIC one is forced into primary
// even if the curated odor_type lists them in the opposite order.
// Currently only "leather > animalic" but the structure scales.
const FAMILY_SPECIFICITY_OVERRIDES = [
  { specific: 'leather', general: 'animalic' },
  { specific: 'ozonic', general: 'fresh' },
];

// Internal: full inference. Returns { primaries, secondaries, facets }.
// Read-only — never mutates the record. The three classify*Families /
// classifyFacets functions below all delegate here.
//
// Inference is a 3-pass scan over curated text fields:
//   1. odor_type        → first family → primary; rest → secondary
//   2. odor_description → secondary families only (never primary)
//   3. FACET_KEYWORDS regex → compound-phrase facets
//
// The earlier 4-pass design (name+synonyms scan as Pass 3, parent-
// family promotion as Pass 4b, gourmand guard) was removed. Name/
// synonym scanning leaked unrelated facets onto materials whose name
// happened to contain a sibling token (e.g. "Lemon Balm" → balm/balsamic
// facet). Parent promotion was a workaround for the earlier weak-source
// scan and isn't needed once that scan is gone. Gourmand guard was
// likewise a defensive kludge against name-scan over-firing.
function _inferTaxonomy(matOrRecord) {
  const r = (matOrRecord && matOrRecord.record) || matOrRecord || {};
  const pf = r.perfumery || {};
  const primaries = [];
  const secondaries = [];
  const facets = [];

  const _addPrimary = fam => {
    if (!fam) return;
    if (primaries.includes(fam) || secondaries.includes(fam)) return;
    if (primaries.length < 3) primaries.push(fam);
  };
  const _addSecondary = fam => {
    if (!fam) return;
    if (primaries.includes(fam) || secondaries.includes(fam)) return;
    if (secondaries.length < 3) secondaries.push(fam);
  };
  const _addFacet = facet => {
    if (!facet) return;
    if (facets.includes(facet)) return;
    if (facets.length < 8) facets.push(facet);
  };

  // True once a family-grade token has been promoted to primary.
  let firstPrimaryAssigned = false;

  const _scanFamilySource = (text, mayPromotePrimary) => {
    const tokens = _orderedTaxonomyTokens(text);
    for (const raw of tokens) {
      const tok = _resolveTaxonomyToken(raw);
      if (PRIMARY_FAMILIES.includes(tok)) {
        if (mayPromotePrimary && !firstPrimaryAssigned) {
          _addPrimary(tok);
          firstPrimaryAssigned = true;
        } else {
          _addSecondary(tok);
        }
      } else if (FACET_TAGS[tok]) {
        const parent = FACET_TAGS[tok];
        _addFacet(tok);
        if (PRIMARY_FAMILIES.includes(parent)) {
          if (mayPromotePrimary && !firstPrimaryAssigned) {
            _addPrimary(parent);
            firstPrimaryAssigned = true;
          } else if (!primaries.includes(parent)) {
            _addSecondary(parent);
          }
        }
      }
    }
  };

  // Pass 1 — odor_type. Strongest signal; reading order drives
  // primary/secondary assignment.
  _scanFamilySource(pf.odor_type, true);

  // Pass 2 — odor_description. Same logic, but only allowed to
  // assign the first primary if pass 1 didn't.
  _scanFamilySource(pf.odor_description, !firstPrimaryAssigned);

  // Apply specificity overrides — leather always wins over animalic
  // when both ended up in the classifier output, regardless of
  // reading order in the curated odor_type.
  for (const { specific, general } of FAMILY_SPECIFICITY_OVERRIDES) {
    const inPrimary = primaries.indexOf(general);
    const inSecondary = secondaries.indexOf(specific);
    if (inPrimary >= 0 && inSecondary >= 0) {
      primaries[inPrimary] = specific;
      secondaries[inSecondary] = general;
    }
  }

  // Pass 3 — keyword regex scan of odor_type + odor_description.
  // Catches nose-friendly facets that the token-splitting approach
  // misses (e.g. "tea-like" → tea, "honeyed" → honey, "burnt sugar"
  // → roasted). Adds facets only — never touches primary/secondary.
  const _kwText = ((pf.odor_type || '') + ' ' + (pf.odor_description || '')).toLowerCase();
  for (const [facet, re] of Object.entries(FACET_KEYWORDS)) {
    if (re.test(_kwText)) _addFacet(facet);
  }

  return { primaries, secondaries, facets };
}

function classifyPrimaryFamilies(matOrRecord)   { return _inferTaxonomy(matOrRecord).primaries; }
function classifySecondaryFamilies(matOrRecord) { return _inferTaxonomy(matOrRecord).secondaries; }
function classifyFacets(matOrRecord)            { return _inferTaxonomy(matOrRecord).facets; }

// ── Step 3: legacy migration parser ──
// Bridges the OLD raw-DB entry shape into the NEW taxonomy arrays.
// Takes a perfumery_data.js-style entry (with .odor.type / .odor.description
// / .blends_with / .name / .synonyms) and returns:
//   { primaryFamilies, secondaryFamilies, facets }
// This is the single conversion point used by _buildFilterRecord at module
// init, so FILTER_CACHE is populated with the new axis directly from the
// legacy DB shape — the runtime classifier never has to re-derive these
// from raw odor_type strings inside any hot loop.
//
// The parser is intentionally additive: the old odor_type string is read
// only as INPUT for inference, never as the final filter model. The new
// taxonomy arrays are the source of truth for the upcoming filter UI.

function migrateLegacyTaxonomy(entry) {
  if (!entry) return { primaryFamilies: [], secondaryFamilies: [], facets: [] };
  // Per-entry explicit override. When a DB row carries an
  // `entry.classification` block, skip all auto-inference — the doc
  // (e.g. Lavender.md) has already specified the canonical Primary
  // Family / Sub-family / Facet assignment and we must not let the
  // classifier's token-splitting pollute it with secondary families
  // scraped from odor description prose (e.g. reading the word
  // "floral" inside Linalool's description and assigning Floral note
  // when the doc says the material is Aromatic-only). Only validated
  // canonical tokens survive.
  const raw = entry.classification;
  // Override only when the curated block carries actual content. The DB
  // contains 400+ stub blocks of shape `{facets:[]}` (auto-generated
  // placeholders) which used to short-circuit inference and leave the
  // material with zero families/facets. Treat any all-empty curated
  // block as "no override" and fall through to inference.
  const _hasCurated = raw && (
    (Array.isArray(raw.primaryFamilies)   && raw.primaryFamilies.length   > 0) ||
    (Array.isArray(raw.secondaryFamilies) && raw.secondaryFamilies.length > 0) ||
    (Array.isArray(raw.facets)            && raw.facets.length            > 0)
  );
  if (_hasCurated) {
    const rawPf = raw.primaryFamilies   || [];
    const rawSf = raw.secondaryFamilies || [];
    const rawFa = raw.facets            || [];
    const pf = uniqStable(rawPf.filter(f => PRIMARY_FAMILIES.includes(f)));
    const sf = uniqStable(rawSf.filter(f => PRIMARY_FAMILIES.includes(f) && !pf.includes(f)));
    // Facets must be specific descriptor tokens — NOT family names. The
    // self-reference entries in FACET_TAGS (e.g. `herbal:'herbal'`) let
    // validation pass for any family token, but those tokens belong in
    // primaryFamilies/secondaryFamilies, not facets. Filter them out so
    // the card's Class row doesn't render "Citrus · Floral · Herbal"
    // alongside the actual family chips (which would be visually
    // duplicated). Real descriptor facets (lavender / sage / rose /
    // bergamot / …) still pass through.
    const fa = uniqStable(rawFa.filter(f => f in FACET_TAGS && !PRIMARY_FAMILIES.includes(f)));
    // Integrity check: if the curated block had tokens but ALL got
    // filtered out as unknown, warn loudly. A silent drop is
    // indistinguishable from "no override, infer it" and hides typos
    // or stale taxonomies that slipped into perfumery_data.js.
    const _dropped = [];
    for (const t of rawPf) if (!PRIMARY_FAMILIES.includes(t)) _dropped.push('primary:' + t);
    for (const t of rawSf) if (!PRIMARY_FAMILIES.includes(t)) _dropped.push('secondary:' + t);
    for (const t of rawFa) if (!(t in FACET_TAGS))            _dropped.push('facet:' + t);
    if (_dropped.length && !pf.length && !sf.length && !fa.length) {
      console.warn('[taxonomy] curated classification for "' + (entry.name || '?') +
        '" had tokens but every one is unknown — falling through to inference. Dropped: ' + _dropped.join(', '));
    } else if (_dropped.length) {
      console.warn('[taxonomy] "' + (entry.name || '?') + '" curated classification contains unknown tokens (ignored): ' + _dropped.join(', '));
    }
    // If all validated arrays are empty, DON'T short-circuit inference —
    // treat the curated block as malformed and fall through.
    if (pf.length || sf.length || fa.length) {
      return { primaryFamilies: pf, secondaryFamilies: sf, facets: fa };
    }
  }
  const synthetic = {
    record: {
      perfumery: {
        odor_type:        entry.odor?.type || null,
        odor_description: entry.odor?.description || null,
        blends_with:      Array.isArray(entry.blends_with) ? entry.blends_with : []
      },
      names: {
        canonical: entry.name || '',
        synonyms:  Array.isArray(entry.synonyms) ? entry.synonyms : []
      }
    }
  };
  const tax = _inferTaxonomy(synthetic);
  // Normalize and validate: only canonical tokens survive, deduped,
  // secondaries cannot duplicate primaries, unknown tokens dropped.
  const pf = uniqStable(tax.primaries.filter(f => PRIMARY_FAMILIES.includes(f)));
  const sf = uniqStable(tax.secondaries.filter(f => PRIMARY_FAMILIES.includes(f) && !pf.includes(f)));
  const fa = uniqStable(tax.facets.filter(f => f in FACET_TAGS));
  return { primaryFamilies: pf, secondaryFamilies: sf, facets: fa };
}

// ═══════════════════════════════════════════════════════════════
// REGULATORY STATUS NORMALIZATION (backward-compat layer)
// Central helpers for the regulatory axis. There are TWO layers:
//
//   1. _normalizeRegulatoryToken(v) — used for the multi-value Set
//      tags stored in FILTER_CACHE.regulatory and
//      record.classification.regulatory. Folds legacy 'ifra_limited'
//      (and variant casings) into canonical 'regulated' on every
//      read. Leaves other tags (allergen / phototoxic / restricted /
//      banned / sensitizer) untouched.
//
// Accepts null/undefined safely. This is the single source of truth
// for regulatory status — every other reader should route through
// it instead of re-implementing the mapping.
// ═══════════════════════════════════════════════════════════════
function _normalizeRegulatoryToken(v) {
  if (v == null) return null;
  const raw = String(v).trim();
  if (!raw) return null;
  // Direct alias hit (covers 'ifra_limited', 'IFRA Limited', etc.)
  if (REGULATORY_LEGACY_ALIASES[raw]) return REGULATORY_LEGACY_ALIASES[raw];
  const lower = raw.toLowerCase();
  if (REGULATORY_LEGACY_ALIASES[lower]) return REGULATORY_LEGACY_ALIASES[lower];
  // Canonical pass-through (matches REGULATORY_VALUES exactly).
  return lower;
}


// ═══════════════════════════════════════════════════════════════
// MODULE: Normalized Filter Cache
// Precomputed per-CAS filter data derived from DB entries.
// This is the ONLY data structure that matchesAllFilters and
// _updateFilterVisibility should read from.
// ═══════════════════════════════════════════════════════════════
const FILTER_CACHE = new Map();

function _buildFilterRecord(cas, entry) {
  const desc = ((entry.odor?.description||'') + ' ' + (entry.safety?.usage||'')).toLowerCase();
  const odorType = (entry.odor?.type || '').toLowerCase();
  const noteLow = (entry.note||'').toLowerCase();
  const allText = (entry.name||'').toLowerCase() + ' ' + (entry.synonyms||[]).join(' ').toLowerCase() + ' ' + desc + ' ' + odorType;
  const funcAll = odorType + ' ' + noteLow + ' ' + desc;
  const hasRealOdor = !!(entry.odor?.description && !RE_ODORLESS.test(entry.odor.description));

  // Build a synthetic mat-like shape from the raw DB entry once, then route both
  // materialType and industryTags through the canonical classifiers. This makes
  // classifyMaterialType / classifyIndustryTags the single source of truth for
  // FILTER_CACHE *and* the result-card render path.
  const syntheticMat = {
    record: {
      identifiers: { cas, fema: entry.fema || null },
      names: { canonical: entry.name || '', synonyms: entry.synonyms || [] },
      perfumery: {
        odor_description: entry.odor?.description || null,
        odor_type: entry.odor?.type || null,
        odor_strength: entry.odor?.strength || null,
        note: entry.note || null,
        // Copy performance.tenacity into the synthetic perfumery object
        // so classifyUses' "very high tenacity → fine_fragrance" gate
        // actually fires. Raw DB entries carry tenacity under
        // `entry.performance.tenacity`; the synthetic record
        // consolidates the fields classifiers read at `perfumery.*`.
        tenacity: entry.performance?.tenacity || null
      },
      safety: {
        ifra_guideline: entry.safety?.ifra || null,
        usage_levels: entry.safety?.usage || null
      },
      metadata: { pubchem_sections: null }
    }
  };
  const materialType = classifyMaterialType(syntheticMat);

  // Precompute Function-axis set. A material may belong to MULTIPLE functions
  // (e.g., dipropylene glycol is both solvent and carrier). This Set is the
  // single source of truth for both filter matching/counts AND card render.
  // Mirrors classifyFunctionsFromRecord exactly so FILTER_CACHE and the
  // runtime classifier never disagree.
  const functions = new Set();
  const _entryName = (entry.name || '').toLowerCase();
  const _tenacity  = (entry.performance?.tenacity || '').toLowerCase();
  // Aromatic = any material with a real odor description. The earlier
  // RE_FUNC_AROMATIC_EXCLUDE filter wrongly stripped 'aromatic' from
  // aroma chemicals whose curated text mentions a secondary fixative /
  // solvent role (Benzyl Salicylate, Benzyl Alcohol, Cinnamic Acid, …).
  if (hasRealOdor) functions.add('aromatic');
  for (const f of FUNCTION_AXIS_SPECIFIC) { if (funcAll.includes(f)) functions.add(f); }
  if (/\b(high|very high|excellent|extremely high)\b/i.test(_tenacity) && /\bbase\b/i.test(noteLow)) functions.add('fixative');
  if (/\b(balsam|resin|resinoid|oleoresin|absolute)\b/i.test(_entryName)) functions.add('fixative');
  if (KNOWN_FIXATIVE_NAMES.test(_entryName)) functions.add('fixative');
  if (/\bblender\b/i.test(funcAll) || KNOWN_BLENDER_NAMES.test(_entryName)) functions.add('blender');
  if (/\bmodifier\b/i.test(funcAll) || KNOWN_MODIFIER_NAMES.test(_entryName)) functions.add('modifier');
  if (/\benhancer\b|\bbooster\b/i.test(funcAll)) functions.add('enhancer');

  // Legacy Odor Family axis was removed — the redundant 23-value list
  // duplicated work already done by SUB_FAMILY_TO_LEGACY (Edwards 14)
  // and tended to over-fire on words like "fresh" or "sweet" inside
  // odor_description text.
  const hasNoOdorType = !odorType || RE_ODOR_FUNC.test(entry.odor?.type||'');

  // Use-axis tags (renamed Industry → Use in the taxonomy redesign).
  // Stored as both `industryTags` (legacy field name) and `uses` (new) so
  // existing read sites keep working.
  const uses = new Set(classifyUses(syntheticMat));
  const industryTags = uses;

  // Regulatory + Source axes (multi-axis taxonomy redesign).
  // Every token is run through _normalizeRegulatoryToken so legacy
  // 'ifra_limited' / 'IFRA Limited' values from imported / saved data
  // are silently folded to the canonical 'regulated' token on cache
  // build. Downstream readers can always trust fc.regulatory.
  const regulatory = new Set(
    classifyRegulatory(syntheticMat)
      .map(_normalizeRegulatoryToken)
      .filter(Boolean)
  );
  const source = classifySource(syntheticMat);

  // Precompute the primary / secondary / facets axis directly from the
  // raw DB entry via migrateLegacyTaxonomy (which honors any explicit
  // entry.classification override and otherwise calls _inferTaxonomy).
  // Runs ONCE per CAS at module init — no hot-loop recomputation.
  const _newTax = migrateLegacyTaxonomy(entry);
  const primaryFamilies   = _newTax.primaryFamilies;
  const secondaryFamilies = _newTax.secondaryFamilies;
  // Sort facets alphabetically for deterministic output (helps diff/debug).
  // Primary/secondary keep discovery order (strongest signal first).
  const facets            = _newTax.facets.slice().sort();

  // Diagnostic: any material that looks like a perfumery candidate
  // (has a real odor description or is in MIXTURES) but ended up with
  // zero primary families is almost certainly a missing rule. Log it
  // once at module init so the dev console flags the gap. Excludes
  // genuine vehicles / additives (no real odor, not in MIXTURES) which
  // legitimately have no family.
  const _isPerfumeryCandidate = hasRealOdor || MIXTURES.has(cas);
  if (_isPerfumeryCandidate && primaryFamilies.length === 0) {
    console.warn('[taxonomy] zero primary families for perfumery material:', entry.name, '(' + cas + ')');
  }

  return {
    cas, noteLow, materialType, functions, funcAll, hasRealOdor,
    hasNoOdorType,
    industryTags, uses, regulatory, source, allText,
    // Edwards taxonomy — precomputed once, read-only from here on.
    primaryFamilies, secondaryFamilies, facets
  };
}

for (const [cas, entry] of Object.entries(DB)) {
  FILTER_CACHE.set(cas, _buildFilterRecord(cas, entry));
}

// ── Inverted index: axis‑value → Set<CAS> ──
// Precomputed once at module init. Provides O(1) set‑intersection
// filtering on any axis without re‑running classifiers. The primary
// filter matching still iterates FILTER_CACHE.values() (fast for ~400
// entries) but this index is available for future optimisations and
// for quick cardinality queries (e.g. "how many materials have facet
// tea?").
const FILTER_INDEX = {};
{
  const _idx = (axis, value, cas) => {
    if (!FILTER_INDEX[axis]) FILTER_INDEX[axis] = {};
    if (!FILTER_INDEX[axis][value]) FILTER_INDEX[axis][value] = new Set();
    FILTER_INDEX[axis][value].add(cas);
  };
  const RE_NOTE_T = /\btop\b/, RE_NOTE_M = /\bmiddle\b/, RE_NOTE_B = /\bbase\b/;
  for (const [cas, fc] of FILTER_CACHE) {
    if (fc.materialType) _idx('type', fc.materialType, cas);
    for (const f of fc.functions) _idx('func', f, cas);
    for (const u of fc.uses) _idx('use', u, cas);
    for (const r of fc.regulatory) _idx('reg', r, cas);
    if (fc.source) _idx('source', fc.source, cas);
    if (RE_NOTE_T.test(fc.noteLow)) _idx('note', 'top', cas);
    if (RE_NOTE_M.test(fc.noteLow)) _idx('note', 'middle', cas);
    if (RE_NOTE_B.test(fc.noteLow)) _idx('note', 'base', cas);
    for (const pf of fc.primaryFamilies || []) _idx('primaryFamily', pf, cas);
    for (const sf of fc.secondaryFamilies || []) _idx('secondaryFamily', sf, cas);
    for (const f of fc.facets || []) _idx('facet', f, cas);
  }
}

// ── Taxonomy coverage audit (dev diagnostic, runs once at init) ──
// Logs perfumery candidates missing primaryFamilies and/or facets so
// gaps are visible in the dev console without user-facing UI noise.
{
  const _missingP = [], _missingF = [], _missingBoth = [];
  for (const [cas, fc] of FILTER_CACHE) {
    const isPerfCandidate = fc.hasRealOdor || MIXTURES.has(cas);
    if (!isPerfCandidate) continue;
    const noP = !fc.primaryFamilies || fc.primaryFamilies.length === 0;
    const noF = !fc.facets || fc.facets.length === 0;
    const name = DB[cas]?.name || cas;
    if (noP && noF) _missingBoth.push(name);
    else if (noP) _missingP.push(name);
    else if (noF) _missingF.push(name);
  }
  if (_missingBoth.length || _missingP.length || _missingF.length) {
    console.groupCollapsed('[taxonomy audit] coverage gaps (' +
      (_missingP.length + _missingF.length + _missingBoth.length) + ' materials)');
    if (_missingBoth.length) console.warn('Missing BOTH primary+facets:', _missingBoth);
    if (_missingP.length)    console.warn('Missing primary only:', _missingP);
    if (_missingF.length)    console.warn('Missing facets only:', _missingF);
    console.groupEnd();
  }
}

// Regulatory filter precompute: one-time O(n) pass over raw DB entries
// to collect CAS values whose safety text matches the same ban heuristic
// that getBanStatus() uses for rendering cards and exports. Each raw
// entry is wrapped in a minimal { safety: { ifra_guideline, usage_levels } }
// shape so getBanStatus()'s canonical-record field paths resolve. This
// guarantees "banned" means exactly the same thing across card badges,
// JSON export, CSV export, and the new regulatory filter.
// Note: getBanStatus is a function declaration, so forward-reference
// via hoisting is safe here at module-level init time. Does NOT touch
// FILTER_CACHE or _buildFilterRecord.
const BANNED_CAS = new Set();
for (const [cas, entry] of Object.entries(DB)) {
  if (getBanStatus({ safety: { ifra_guideline: entry.safety?.ifra, usage_levels: entry.safety?.usage } })) {
    BANNED_CAS.add(cas);
  }
}

// Multi-select pill axis helpers. Every sub-drawer built by
// _buildPillFilter ends up with the same interaction pattern:
//   - click a value chip → toggle in the axis Set, toggle .active class
//   - click the "All" chip → clear the Set, mark All active
//   - sub-drawer summary label updates to show the comma-joined labels
//     of the active values, or "All" when the Set is empty
//   - every change triggers _refreshPills() to re-evaluate filter
//     visibility counts and pill suggestions
function _togglePillFilter(axisName, value, el) {
  const ax = _filterAxes[axisName];
  if (!ax) return;
  if (ax.set.has(value)) { ax.set.delete(value); el.classList.remove('active'); }
  else { ax.set.add(value); el.classList.add('active'); }
  const allBtn = document.querySelector('#' + ax.containerId + ' .odor-tag[data-axis-all]');
  if (allBtn) allBtn.classList.toggle('active', !ax.set.size);
  _updateAxisSelectedLabel(axisName);
  _refreshPills();
}
function _clearAxisFilter(axisName) {
  const ax = _filterAxes[axisName];
  if (!ax) return;
  ax.set.clear();
  document.querySelectorAll('#' + ax.containerId + ' .odor-tag[data-value]').forEach(b => b.classList.remove('active'));
  const allBtn = document.querySelector('#' + ax.containerId + ' .odor-tag[data-axis-all]');
  if (allBtn) allBtn.classList.add('active');
  _updateAxisSelectedLabel(axisName);
  _refreshPills();
}
function _updateAxisSelectedLabel(axisName) {
  const ax = _filterAxes[axisName];
  if (!ax) return;
  const el = document.getElementById(ax.elId);
  if (!el) return;
  if (!ax.set.size) { el.textContent = 'All'; return; }
  el.textContent = [...ax.set].map(v => ax.labels[v] || v).join(', ');
}

let _visTimer;
function _refreshPills() {
  showPills(input.value);
  clearTimeout(_visTimer);
  _visTimer = setTimeout(_updateFilterVisibility, 80);
}

// Per-axis failure set. Returns which axes the material would fail
// under the current active filter combo. Used by _updateFilterVisibility
// so each axis's chip visibility is computed against the OTHER axes
// only — otherwise an AND-within selection hides every other chip in
// the same group the moment the user picks the first one, making
// multi-select impossible.
function _axesFailedBy(fc, cas) {
  const failed = new Set();
  // Note
  const noteSet = _filterAxes.note.set;
  if (noteSet.size) {
    for (const v of noteSet) {
      if (v === '_other') { if (RE_NOTE_OTHER.test(fc.noteLow)) { failed.add('note'); break; } }
      else { if (!fc.noteLow.includes(v)) { failed.add('note'); break; } }
    }
  }
  // Type (single-value)
  const typeSet = _filterAxes.type.set;
  if (typeSet.size && !typeSet.has(fc.materialType)) failed.add('type');
  // Function
  const funcSet = _filterAxes.func.set;
  if (funcSet.size) {
    for (const f of funcSet) if (!fc.functions.has(f)) { failed.add('func'); break; }
  }
  // Use
  const tagSet = _filterAxes.tag.set;
  if (tagSet.size) {
    for (const u of tagSet) if (!fc.uses.has(u)) { failed.add('tag'); break; }
  }
  // Regulatory (with legacy alias fallback + BANNED_CAS)
  const regSet = _filterAxes.reg.set;
  if (regSet.size) {
    for (const r of regSet) {
      const canon = _normalizeRegulatoryToken(r);
      if (canon === 'banned') {
        if (!(BANNED_CAS.has(cas) || fc.regulatory.has('banned'))) { failed.add('reg'); break; }
      } else if (!fc.regulatory.has(canon)) {
        let hit = false;
        for (const [legacy, c] of Object.entries(REGULATORY_LEGACY_ALIASES)) {
          if (c === canon && fc.regulatory.has(legacy)) { hit = true; break; }
        }
        if (!hit) { failed.add('reg'); break; }
      }
    }
  }
  // Source (single-value)
  const sourceSet = _filterAxes.source.set;
  if (sourceSet.size && !sourceSet.has(fc.source)) failed.add('source');
  // Main Family — AND-within / OR-inside-chip against the 4-bucket
  // MAIN_FAMILY_TO_LEGACY Set.
  if (activeMainFamilyFilters.size) {
    const combined = new Set([
      ...(fc.primaryFamilies || []),
      ...(fc.secondaryFamilies || [])
    ]);
    for (const main of activeMainFamilyFilters) {
      const toks = MAIN_FAMILY_TO_LEGACY[main];
      if (!toks) continue;
      let hit = false;
      for (const t of toks) if (combined.has(t)) { hit = true; break; }
      if (!hit) { failed.add('mainFamily'); break; }
    }
  }
  // Family — AND-within / OR-inside-chip against the Edwards 14-subfamily
  // buckets (SUB_FAMILY_TO_LEGACY). Each active chip is expanded to its
  // legacy-token Set; the chip is satisfied if ANY token from that Set
  // appears in primaryFamilies ∪ secondaryFamilies.
  if (activeSubFamilyFilters.size) {
    const combined = new Set([
      ...(fc.primaryFamilies || []),
      ...(fc.secondaryFamilies || [])
    ]);
    for (const sub of activeSubFamilyFilters) {
      const toks = SUB_FAMILY_TO_LEGACY[sub];
      if (!toks) continue;
      let hit = false;
      for (const t of toks) if (combined.has(t)) { hit = true; break; }
      if (!hit) { failed.add('subFamily'); break; }
    }
  }
  // Facet
  if (activeFacetFilters.size) {
    const fcFacets = fc.facets || [];
    for (const facet of activeFacetFilters) if (!fcFacets.includes(facet)) { failed.add('facet'); break; }
  }
  return failed;
}

function _updateFilterVisibility() {
  // For each axis, compute what chip values would be reachable if the
  // axis's CURRENT selection were the only one ignored. This is
  // "filter independence": a material contributes to axis A's counts
  // iff it passes every OTHER axis. That way, selecting one chip in
  // axis A never hides the other chips inside A, so the user can
  // continue clicking to AND more values together.
  //
  // Implementation: for each material, compute its failed-axis set.
  // - failures.size === 0 → contributes to EVERY axis's counts.
  // - failures.size === 1 → contributes only to that one axis's
  //                         counts (because ignoring just that axis
  //                         makes the material pass).
  // - failures.size >= 2  → contributes to no axis.
  const noteCounts = {}, typeCounts = {}, funcCounts = {}, tagCounts = {};
  const regCounts = {}, sourceCounts = {};
  const mainFamilyHas = {};
  const subFamilyHas = {};
  const facetHas = {};

  for (const fc of FILTER_CACHE.values()) {
    const failures = _axesFailedBy(fc, fc.cas);
    if (failures.size > 1) continue;
    const contribTo = (axis) => failures.size === 0 || failures.has(axis);
    // Note
    if (contribTo('note')) {
      if (fc.noteLow.includes('top')) noteCounts['top'] = (noteCounts['top']||0)+1;
      if (fc.noteLow.includes('middle')) noteCounts['middle'] = (noteCounts['middle']||0)+1;
      if (fc.noteLow.includes('base')) noteCounts['base'] = (noteCounts['base']||0)+1;
      if (!RE_NOTE_OTHER.test(fc.noteLow)) noteCounts['_other'] = (noteCounts['_other']||0)+1;
    }
    // Type axis (single value per material)
    if (contribTo('type')) typeCounts[fc.materialType] = (typeCounts[fc.materialType]||0)+1;
    // Function axis (multi-value Set)
    if (contribTo('func')) for (const f of fc.functions) funcCounts[f] = (funcCounts[f]||0)+1;
    // Use axis (multi-value Set)
    if (contribTo('tag')) for (const u of fc.uses) tagCounts[u] = (tagCounts[u]||0)+1;
    // Regulatory axis (multi-value Set)
    if (contribTo('reg')) for (const reg of fc.regulatory) regCounts[reg] = (regCounts[reg]||0)+1;
    // Source axis (single value)
    if (contribTo('source') && fc.source) sourceCounts[fc.source] = (sourceCounts[fc.source]||0)+1;
    // Main Family axis (marker-only). Same primary ∪ secondary union
    // logic as Family — the marker map records every legacy token; the
    // chip visibility loop below resolves them to the 4 main buckets.
    if (contribTo('mainFamily')) {
      for (const fam of fc.primaryFamilies || []) mainFamilyHas[fam] = true;
      for (const fam of fc.secondaryFamilies || []) mainFamilyHas[fam] = true;
    }
    // Family axis (marker-only). The axis matches against
    // primary ∪ secondary union via SUB_FAMILY_TO_LEGACY, so chip
    // visibility must look at both fields — otherwise a family that
    // only ever appears as a secondary never gets a clickable chip.
    if (contribTo('subFamily')) {
      for (const fam of fc.primaryFamilies || []) subFamilyHas[fam] = true;
      for (const fam of fc.secondaryFamilies || []) subFamilyHas[fam] = true;
    }
    // Facet axis (marker-only)
    if (contribTo('facet')) for (const f of fc.facets || []) facetHas[f] = true;
  }

  // Apply visibility to the pill chips (now multi-select). Hide any
  // chip whose value has zero count under the "minus-self" filter.
  // Never hide a chip the user has already selected — it must stay
  // visible so they can always deselect it.
  const countsByName = {note:noteCounts, type:typeCounts, func:funcCounts, tag:tagCounts, reg:regCounts, source:sourceCounts};
  for (const name in countsByName) {
    const ax = _filterAxes[name];
    if (!ax) continue;
    const counts = countsByName[name];
    document.querySelectorAll('#' + ax.containerId + ' .odor-tag[data-value]').forEach(btn => {
      if (btn.classList.contains('active')) { btn.style.display = ''; return; }
      btn.style.display = (counts[btn.dataset.value] || 0) > 0 ? '' : 'none';
    });
  }
  // Main Family / Family / Facet chip visibility — same "minus-self"
  // logic via the marker maps built above. Selected chips are always
  // kept visible so the user can deselect them.
  document.querySelectorAll('#mainFamilyFilters .odor-tag[data-main]').forEach(btn => {
    if (btn.classList.contains('active')) { btn.style.display = ''; return; }
    const toks = MAIN_FAMILY_TO_LEGACY[btn.dataset.main];
    let keep = false;
    if (toks) for (const t of toks) if (mainFamilyHas[t]) { keep = true; break; }
    btn.style.display = keep ? '' : 'none';
  });
  document.querySelectorAll('#subFamilyFilters .odor-tag[data-subfam]').forEach(btn => {
    if (btn.classList.contains('active')) { btn.style.display = ''; return; }
    // Chip is visible if any of its sub-family legacy tokens is still
    // present among the filtered candidate set.
    const toks = SUB_FAMILY_TO_LEGACY[btn.dataset.subfam];
    let keep = false;
    if (toks) for (const t of toks) if (subFamilyHas[t]) { keep = true; break; }
    btn.style.display = keep ? '' : 'none';
  });
  // Facet chips stay visible regardless of live count — toggle the
  // .empty class so zero-count descriptors render dim instead of
  // being removed entirely. This preserves the full Edwards wheel
  // taxonomy (236 canonical chips) as a browsable reference even
  // when the current DB / filter combo leaves some chips unused.
  document.querySelectorAll('#facetFilters .odor-tag[data-facet]').forEach(btn => {
    btn.style.display = '';
    if (btn.classList.contains('active')) { btn.classList.remove('empty'); return; }
    btn.classList.toggle('empty', !facetHas[btn.dataset.facet]);
  });
  // Group visibility is now only governed by the Groups picker
  // checkbox list — all 14 canonical groups always stay rendered
  // otherwise so the user can see the wheel-wide taxonomy at all
  // times. The old "hide if every chip is hidden" rule made groups
  // visually vanish when their DB coverage was zero, which hid
  // legitimate parts of the taxonomy.
  document.querySelectorAll('#facetGroups .facet-group').forEach(g => {
    const label = g.querySelector('.facet-group-label')?.textContent || '';
    const userHidden = hiddenFacetGroups.has(label);
    g.style.display = userHidden ? 'none' : '';
  });
}
// Family + Facet chip drawer UI handlers. Mirror the multi-select
// pill axis pattern: mutate the active Set, sync the chip's CSS
// .active class, refresh the "All" reset chip, update the sub-drawer
// summary label, and call _refreshPills().
function _updateFacetSelected() {
  const sel = document.getElementById('facetSelected');
  if (!sel) return;
  const parts = [];
  if (activeFacetFilters.size) {
    parts.push([...activeFacetFilters].map(facetLabel).join(', '));
  }
  if (hiddenFacetGroups.size) {
    const total = document.querySelectorAll('#facetGroups > .facet-group').length;
    if (total) {
      const shown = total - hiddenFacetGroups.size;
      parts.push(shown === 0 ? 'group None' : 'group ' + shown + '/' + total);
    }
  }
  sel.textContent = parts.length ? parts.join(' · ') : 'All';
}
// ── Main Family chip handlers (Edwards 4-bucket filter) ────────
function _updateMainFamilySelected() {
  const sel = document.getElementById('mainFamSelected');
  if (!sel) return;
  if (activeMainFamilyFilters.size) {
    sel.textContent = [...activeMainFamilyFilters].map(m => MAIN_FAMILY_LABELS[m] || m).join(', ');
  } else { sel.textContent = 'All'; }
}
function toggleMainFamilyChip(el) {
  const v = el.dataset.main;
  if (!v) return;
  if (activeMainFamilyFilters.has(v)) { activeMainFamilyFilters.delete(v); el.classList.remove('active'); }
  else { activeMainFamilyFilters.add(v); el.classList.add('active'); }
  const allReset = document.querySelector('#mainFamilyFilters > div > .odor-tag:first-child');
  if (allReset) allReset.classList.toggle('active', !activeMainFamilyFilters.size);
  _updateMainFamilySelected();
  _applyCascadingVisibility();
  _refreshPills();
}
function clearMainFamilyFiltersUI(el) {
  activeMainFamilyFilters.clear();
  document.querySelectorAll('#mainFamilyFilters .odor-tag').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  _updateMainFamilySelected();
  _applyCascadingVisibility();
  _refreshPills();
}

// ── Family chip handlers (Edwards 14-subfamily filter) ─────────
function _updateSubFamilySelected() {
  const sel = document.getElementById('subFamilySelected');
  if (!sel) return;
  if (activeSubFamilyFilters.size) {
    sel.textContent = [...activeSubFamilyFilters].map(s => SUB_FAMILY_LABELS[s] || s).join(', ');
  } else { sel.textContent = 'All'; }
}
function toggleSubFamilyChip(el) {
  const v = el.dataset.subfam;
  if (!v) return;
  if (activeSubFamilyFilters.has(v)) { activeSubFamilyFilters.delete(v); el.classList.remove('active'); }
  else { activeSubFamilyFilters.add(v); el.classList.add('active'); }

  if (allReset) allReset.classList.toggle('active', !activeSubFamilyFilters.size);

function clearSubFamilyFiltersUI(el) {
  activeSubFamilyFilters.clear();
  document.querySelectorAll('#subFamilyFilters .odor-tag').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');

}

// ── Cascading visibility: Main Family → Family → Facet groups ──
// After any selection change at any level of the family hierarchy,
// re-compute which downstream chips should be visible. Clicking a
// chip in a now-hidden section would be impossible, so also
// deactivate any previously-selected chips that fell out of scope.
function _applyCascadingVisibility() {
  // 1. Family chips visible only if allowed by selected Main Families.
  //    Empty main selection = all sub-families visible.
  let allowedSubs = null;
  if (activeMainFamilyFilters.size) {
    allowedSubs = new Set();
    for (const main of activeMainFamilyFilters) {
      const subs = MAIN_FAMILY_TO_SUBS[main];
      if (subs) for (const s of subs) allowedSubs.add(s);
    }
  }
  let subDeactivated = false;
  document.querySelectorAll('#subFamilyFilters .odor-tag[data-subfam]').forEach(chip => {
    const sub = chip.dataset.subfam;
    const visible = !allowedSubs || allowedSubs.has(sub);
    chip.style.display = visible ? '' : 'none';
    if (!visible && activeSubFamilyFilters.has(sub)) {
      activeSubFamilyFilters.delete(sub);
      chip.classList.remove('active');
      subDeactivated = true;
    }
  });
  // Hide an entire Family section header when none of its chips are
  // visible (Main filter excludes the whole group).
  document.querySelectorAll('#subFamilyChips .sub-family-group').forEach(section => {
    const main = section.dataset.main;
    const visible = !allowedSubs || (main && activeMainFamilyFilters.has(main));
    section.style.display = visible ? '' : 'none';
  });
  if (subDeactivated) {
    const allReset = document.querySelector('#subFamilyFilters > div > .odor-tag:first-child');
    if (allReset) allReset.classList.toggle('active', !activeSubFamilyFilters.size);
    _updateSubFamilySelected();
  }

  // 2. Facet groups visible only if their sub-family is selected
  //    (or, if no sub-family is selected, allowed by the Main scope).
  let allowedGroupSubs;
  if (activeSubFamilyFilters.size) {
    allowedGroupSubs = new Set(activeSubFamilyFilters);
  } else if (allowedSubs) {
    allowedGroupSubs = allowedSubs; // fall back to Main scope
  } else {
    allowedGroupSubs = null;
  }
  let facetDeactivated = false;
  document.querySelectorAll('#facetGroups .facet-group').forEach(group => {
    const label = group.querySelector('.facet-group-label')?.textContent || '';
    const userHidden = hiddenFacetGroups.has(label);
    // Group visibility is controlled solely by the Groups picker here.
    // _updateFilterVisibility() later hides groups whose chips all
    // fell out — Primary/Sub cascade does NOT force-hide groups.
    group.style.display = userHidden ? 'none' : '';
    const sub = group.dataset.subfam;
    const cascadeValid = !allowedGroupSubs || (sub && allowedGroupSubs.has(sub));
    if (!cascadeValid) {
      group.querySelectorAll('.odor-tag[data-facet]').forEach(chip => {
        const f = chip.dataset.facet;
        if (activeFacetFilters.has(f)) {
          activeFacetFilters.delete(f);
          chip.classList.remove('active');
          facetDeactivated = true;
        }
      });
    }
  });
  if (facetDeactivated) {
    const allReset = document.querySelector('#facetFilters > div > .odor-tag:first-child');
    if (allReset) allReset.classList.toggle('active', !activeFacetFilters.size);
    _updateFacetSelected();
  }
}
function toggleFacetChip(el) {
  const v = el.dataset.facet;
  if (!v) return;
  if (activeFacetFilters.has(v)) { activeFacetFilters.delete(v); el.classList.remove('active'); }
  else { activeFacetFilters.add(v); el.classList.add('active'); }
  const allReset = document.querySelector('#facetFilters > div > .odor-tag:first-child');
  if (allReset) allReset.classList.toggle('active', !activeFacetFilters.size);
  _updateFacetSelected();
  _refreshPills();
}

  activeFacetFilters.clear();
  document.querySelectorAll('#facetFilters .odor-tag').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');

  _refreshPills();
}

function resetAllFilters() {
  // Clear every multi-select pill axis (Set + chip DOM + summary label).
  for (const name of Object.keys(_filterAxes)) {
    const ax = _filterAxes[name];
    ax.set.clear();
    document.querySelectorAll('#' + ax.containerId + ' .odor-tag[data-value]').forEach(b => b.classList.remove('active'));
    const allBtn = document.querySelector('#' + ax.containerId + ' .odor-tag[data-axis-all]');
    if (allBtn) allBtn.classList.add('active');
  }
  // Reset Main Family + Family + Facet chip drawers (state + DOM + summary labels).
  activeMainFamilyFilters.clear();
  activeSubFamilyFilters.clear();
  activeFacetFilters.clear();
  document.querySelectorAll('#mainFamilyFilters .odor-tag').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#subFamilyFilters .odor-tag').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#facetFilters .odor-tag').forEach(b => b.classList.remove('active'));
  const _allMain = document.querySelector('#mainFamilyFilters > div > .odor-tag:first-child');

  const _allSub = document.querySelector('#subFamilyFilters > div > .odor-tag:first-child');

    const el = document.getElementById(id); if (el) el.textContent = 'All';
  });
  // Cascade: clearing Primary/Sub-family selections restores the full
  // set of visible Sub-family and Facet chips.
  if (typeof _applyCascadingVisibility === 'function') _applyCascadingVisibility();
  _refreshPills();
}

// source of truth: edit the constants and the filter UI updates
// automatically. Every axis shares the same interaction pattern

function _buildPillFilter(axisName) {
  const ax = _filterAxes[axisName];
  if (!ax) return;
  const container = document.getElementById(ax.containerId);
  if (!container) return;
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px';
  // "All" reset chip — click to clear the axis Set.
  const allBtn = document.createElement('span');
  allBtn.className = 'odor-tag active';
  allBtn.dataset.axisAll = axisName;
  allBtn.textContent = 'All';
  allBtn.onclick = function() { _clearAxisFilter(axisName); };
  wrap.appendChild(allBtn);
  // One pill per value.
  for (const v of ax.values) {
    const btn = document.createElement('span');
    btn.className = 'odor-tag';
    btn.dataset.axis = axisName;
    btn.dataset.value = v;
    btn.textContent = ax.labels[v] || v;
    btn.onclick = function() { _togglePillFilter(axisName, v, this); };
    wrap.appendChild(btn);
  }
  container.appendChild(wrap);
}

// Facet chips. Grouped by Edwards sub-family with a section header
// per group. Every canonical descriptor in FACET_GROUPS is rendered
// as a chip regardless of DB coverage — chips whose facet has no
// matching material in FILTER_CACHE are styled dim via the .empty
// class so the full Edwards wheel taxonomy is visible at a glance.
// Facets not listed in any FACET_GROUPS entry (rare; only inferred
// via canonical-only FACET_TAGS) fall back to a parent-family
// "Other" group, also rendering full.
{
  const container = document.getElementById('facetGroups');
  const facetCounts = {};
  for (const fc of FILTER_CACHE.values()) {
    for (const f of fc.facets || []) facetCounts[f] = (facetCounts[f] || 0) + 1;
  }
  const rendered = new Set();
  const _renderGroup = (labelText, facets, subKey) => {
    if (!facets.length) return;
    const group = document.createElement('div');
    group.className = 'facet-group';
    if (subKey) group.dataset.subfam = subKey;
    const label = document.createElement('div');
    label.className = 'facet-group-label';
    label.textContent = labelText;
    group.appendChild(label);
    const chips = document.createElement('div');
    chips.className = 'facet-group-chips';
    for (const f of facets) {
      const btn = document.createElement('span');
      btn.className = 'odor-tag';
      if (!facetCounts[f]) btn.classList.add('empty');
      btn.dataset.facet = f;
      btn.textContent = facetLabel(f);
      btn.title = facetCounts[f] ? facetCounts[f] + ' material' + (facetCounts[f] > 1 ? 's' : '') : 'no materials in DB yet';
      btn.onclick = function() { toggleFacetChip(this); };
      chips.appendChild(btn);
      rendered.add(f);
    }
    group.appendChild(chips);
    container.appendChild(group);
  };
  // Collect facets not in any explicit FACET_GROUPS, bucketed by the
  // Edwards sub-family their parent primary-family maps to. Unlike the
  // main group loop these orphan facets are still filtered by live count
  // — they exist only in FACET_TAGS and are not part of the canonical
  // wheel list, so rendering all inferred tokens with no live match
  // would clutter the UI with noise.
  const orphansBySubFamily = {};
  const groupedFacetSet = new Set();
  for (const g of FACET_GROUPS) for (const f of g.facets) groupedFacetSet.add(f);
  for (const [facet, family] of Object.entries(FACET_TAGS)) {
    if (facet === family) continue;
    if (groupedFacetSet.has(facet)) continue;
    if (!facetCounts[facet]) continue;
    const sub = LEGACY_TO_SUB_FAMILY[family] || family;
    if (!orphansBySubFamily[sub]) orphansBySubFamily[sub] = [];
    orphansBySubFamily[sub].push(facet);
  }
  // Render explicit groups in canonical order, merging in any orphan
  // facets whose sub-family matches the group's label.
  for (const g of FACET_GROUPS) {
    const subKey = Object.keys(SUB_FAMILY_LABELS).find(k => SUB_FAMILY_LABELS[k] === g.label);
    const extra = subKey && orphansBySubFamily[subKey] ? orphansBySubFamily[subKey] : [];
    if (extra.length) { delete orphansBySubFamily[subKey]; }
    const merged = extra.length ? [...g.facets, ...[...extra].sort()] : g.facets;
    _renderGroup(g.label, merged, subKey);
  }
  // Any remaining orphans whose sub-family has no explicit group — render
  // with the Edwards sub-family label (falls back to PRIMARY_FAMILY_LABELS
  // only if the parent never mapped to a sub-family at all).
  for (const [sub, ofs] of Object.entries(orphansBySubFamily)) {
    if (!ofs.length) continue;
    ofs.sort();
    const label = SUB_FAMILY_LABELS[sub] || PRIMARY_FAMILY_LABELS[sub] || sub;
    _renderGroup(label, ofs, sub);
  }
}

// Facet groups picker — checkbox list that hides/shows entire

// actual show/hide is performed by _applyCascadingVisibility() so the
// user mask composes with the Primary/Sub-family cascade. Active

{

    const labels = groupEls.map(el => el.querySelector('.facet-group-label')?.textContent || '');
    const _refreshLabel = () => {
      const shown = labels.length - hiddenFacetGroups.size;
      selLabel.textContent = hiddenFacetGroups.size === 0
        ? 'All'
        : shown === 0 ? 'None' : shown + '/' + labels.length;
    };
    labels.forEach(label => {
      const row = document.createElement('label');
      row.className = 'facet-groups-picker-row';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = true;
      cb.addEventListener('change', () => {
        if (cb.checked) hiddenFacetGroups.delete(label);
        else hiddenFacetGroups.add(label);
        _refreshLabel();
        _updateFacetSelected();
        _applyCascadingVisibility();
      });
      row.appendChild(cb);
      row.appendChild(document.createTextNode(label));
      pickerBody.appendChild(row);
    });
    _refreshLabel();
    // When there isn't enough room below the summary to show the full
    // panel without being covered by the fixed .downloads footer, flip
    // the panel to open upward. Recomputed on every open in case the
    // user scrolled between toggles.
    const picker = document.getElementById('facetGroupsPicker');
    const downloadsEl = document.getElementById('downloads');
    picker?.addEventListener('toggle', () => {
      if (!picker.open) return;
      requestAnimationFrame(() => {
        pickerBody.style.top = '';
        pickerBody.style.bottom = '';
        const bodyRect = pickerBody.getBoundingClientRect();
        const footerTop = downloadsEl ? downloadsEl.getBoundingClientRect().top : window.innerHeight;
        if (bodyRect.bottom > footerTop - 8) {
          pickerBody.style.top = 'auto';
          pickerBody.style.bottom = 'calc(100% + 4px)';
        }
      });
    });
  }
}
