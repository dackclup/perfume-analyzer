function buildPerfumerySections(mat) {
  const sections = [];
  if (mat.odor_description || mat.odor_type || mat.odor_strength) {
    const info = [];
    if (mat.odor_description) info.push({ReferenceNumber:0,Description:"Odor Description",Value:{StringWithMarkup:[{String:mat.odor_description}]}});
    if (mat.odor_type) info.push({ReferenceNumber:0,Description:"Odor Type",Value:{StringWithMarkup:[{String:mat.odor_type}]}});
    if (mat.odor_strength) info.push({ReferenceNumber:0,Description:"Odor Strength",Value:{StringWithMarkup:[{String:mat.odor_strength}]}});
    sections.push({TOCHeading:"Odor Profile",Description:"Olfactory characteristics from perfumery database.",Information:info});
  }
  if (mat.note_classification) {
    sections.push({TOCHeading:"Note Classification",Description:"Fragrance pyramid classification.",Information:[
      {ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.note_classification}]}}
    ]});
  }
  if (mat.tenacity || mat.tenacity_hours) {
    const info = [];
    if (mat.tenacity) info.push({ReferenceNumber:0,Description:"Tenacity",Value:{StringWithMarkup:[{String:mat.tenacity}]}});
    if (mat.tenacity_hours) info.push({ReferenceNumber:0,Description:"Duration",Value:{StringWithMarkup:[{String:mat.tenacity_hours}]}});
    sections.push({TOCHeading:"Performance",Description:"Longevity and projection characteristics.",Information:info});
  }
  if (mat.ifra_guidelines || mat.usage_levels) {
    const info = [];
    if (mat.ifra_guidelines) info.push({ReferenceNumber:0,Description:"IFRA Guidelines",Value:{StringWithMarkup:[{String:mat.ifra_guidelines}]}});
    if (mat.usage_levels) info.push({ReferenceNumber:0,Description:"Usage Levels",Value:{StringWithMarkup:[{String:mat.usage_levels}]}});
    sections.push({TOCHeading:"Perfumery Safety",Description:"IFRA restrictions and recommended usage levels.",Information:info});
  }
  if (mat.blends_well_with && mat.blends_well_with.length) {
    sections.push({TOCHeading:"Blending",Description:"Compatible fragrance materials.",Information:[
      {ReferenceNumber:0,Description:"Blends Well With",Value:{StringWithMarkup:mat.blends_well_with.map(s=>({String:s}))}}
    ]});
  }
  return sections;
}

function buildLocalRecord(mat) {
  const sections = [];

  // Names and Identifiers
  const namesSec = [];
  if (mat.cas_number) namesSec.push({TOCHeading:"CAS",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.cas_number}]}}]});
  if (mat.fema_number) namesSec.push({TOCHeading:"FEMA Number",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.fema_number}]}}]});
  if (mat.iupac_name) namesSec.push({TOCHeading:"IUPAC Name",Description:"Chemical name computed from structure based on IUPAC nomenclature standards.",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.iupac_name}]}}]});
  if (mat.synonyms.length) namesSec.push({TOCHeading:"Synonyms",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:mat.synonyms.map(s=>({String:s}))}}]});
  if (namesSec.length) sections.push({TOCHeading:"Names and Identifiers",Description:"Chemical names, synonyms, identifiers, and descriptors.",Section:namesSec});

  // Chemical and Physical Properties
  const chemSec = [];
  if (mat.molecular_formula) chemSec.push({TOCHeading:"Molecular Formula",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.molecular_formula}]}}]});
  if (mat.molecular_weight) chemSec.push({TOCHeading:"Molecular Weight",Information:[{ReferenceNumber:0,Value:{Number:[parseFloat(mat.molecular_weight)]}}]});
  if (mat.exact_mass) chemSec.push({TOCHeading:"Exact Mass",Information:[{ReferenceNumber:0,Value:{Number:[parseFloat(mat.exact_mass)]}}]});
  if (mat.xlogp) chemSec.push({TOCHeading:"XLogP",Information:[{ReferenceNumber:0,Value:{Number:[parseFloat(mat.xlogp)]}}]});
  if (mat.tpsa) chemSec.push({TOCHeading:"TPSA",Information:[{ReferenceNumber:0,Value:{Number:[parseFloat(mat.tpsa)]}}]});
  if (mat.hbond_donor) chemSec.push({TOCHeading:"H-Bond Donor Count",Information:[{ReferenceNumber:0,Value:{Number:[parseInt(mat.hbond_donor)]}}]});
  if (mat.hbond_acceptor) chemSec.push({TOCHeading:"H-Bond Acceptor Count",Information:[{ReferenceNumber:0,Value:{Number:[parseInt(mat.hbond_acceptor)]}}]});
  if (mat.rotatable_bond) chemSec.push({TOCHeading:"Rotatable Bond Count",Information:[{ReferenceNumber:0,Value:{Number:[parseInt(mat.rotatable_bond)]}}]});
  if (mat.heavy_atom) chemSec.push({TOCHeading:"Heavy Atom Count",Information:[{ReferenceNumber:0,Value:{Number:[parseInt(mat.heavy_atom)]}}]});
  if (mat.smiles) chemSec.push({TOCHeading:"Canonical SMILES",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.smiles}]}}]});
  if (mat.inchi) chemSec.push({TOCHeading:"InChI",Description:"International Chemical Identifier.",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:mat.inchi}]}}]});
  if (chemSec.length) sections.push({TOCHeading:"Chemical and Physical Properties",Description:"Structural descriptors and computed properties.",Section:chemSec});

  // Structures (image link)
  if (mat._cid) {
    sections.push({TOCHeading:"Structures",Description:"Structure depictions of this compound.",Section:[
      {TOCHeading:"2D Structure",Information:[{ReferenceNumber:0,Value:{Boolean:[true]}}],
        URL:`https://pubchem.ncbi.nlm.nih.gov/image/imgsrv.fcgi?cid=${mat._cid}&t=l`}
    ]});
  }

  // Perfumery Data
  const perfSections = buildPerfumerySections(mat);
  if (perfSections.length) sections.push({TOCHeading:"Perfumery Data",Description:"Perfumery-specific data from local fragrance database.",Section:perfSections});

  return {
    Record: {
      RecordType: "CID",
      RecordNumber: mat._cid || null,
      RecordTitle: mat.name,
      Section: sections
    }
  };
}

async function downloadJSON() {
  const found = results.filter(r=>r.found);
  if (!found.length) return;

  const btn = document.querySelector('.dl-menu a[onclick*="downloadJSON"]');
  if (!btn) return;
  const origText = btn.textContent;
  btn.style.pointerEvents = "none";
  btn.style.opacity = "0.4";

  // Load PubChem data for all compounds
  // Wait for any pending PubChem property loads (fast path)
  await Promise.allSettled(found.map(mat => mat._loadPubchem).filter(Boolean));

  const BATCH = 4;
  for (let i = 0; i < found.length; i += BATCH) {
    const batch = found.slice(i, i + BATCH);
    btn.textContent = `⏳ ${i+1}/${found.length}...`;
    await Promise.allSettled(batch.map(async mat => {
      if (mat._cid && (!mat.pubchem_sections || !Object.keys(mat.pubchem_sections).length)) {
        try {
          const r = await fetchWithTimeout(`https://pubchem.ncbi.nlm.nih.gov/rest/pug_view/data/compound/${mat._cid}/JSON`, {}, 10000);
          const d = await r.json();
          const sections = d.Record?.Section || [];
          mat.pubchem_sections = extractAllSections(sections);
        } catch(e) {}
      }
    }));
  }

  // Headings to exclude from JSON export
  const SKIP_JSON = [
    // Spectra (raw data too verbose for AI)
    "spectr", "lc-ms", "gc-ms", "mass spec", "ms-ms", "raman",
    // Verbose sections not useful for perfumery AI analysis
    "mechanism of action", "human toxicity excerpt", "non-human toxicity excerpt",
    "national toxicology", "ongoing test", "antidote", "first aid",
    "fire fighting", "accidental release", "transport information",
    "nonfire spill", "spillage", "isolation and evacuation",
    "respirator recommendation", "sampling procedure",
    // Noise
    "removed synonym", "springermaterials",
    // Already in card identifiers/properties — avoid duplication
    "computed descriptor", "computed properties", "molecular formula",
    "molecular weight", "exact mass", "monoisotopic mass"
  ];

  // === AI Preprocessing Helpers ===
  const CAS_RE_SYN = /^\d{2,7}-\d{2}-\d$/;

  // Parse numeric from text like "~36 hours", "~400 hours"
  function parseHoursNumeric(s) {
    if (!s) return null;
    const m = s.match(/([\d.]+)\s*hour/i);
    return m ? parseFloat(m[1]) : null;
  }
  // Parse usage range — supports "0.1–2 %" and "IFRA 51: 7.3% FF / 1.9% Body"
  function parseUsageRange(s) {
    if (!s) return {min:null, max:null};
    // Old format: "0.1–2 %"
    const mRange = s.match(/([\d.]+)\s*[–\-]\s*([\d.]+)\s*%/);
    if (mRange) return {min:parseFloat(mRange[1]), max:parseFloat(mRange[2])};
    // IFRA 51 format: extract all percentages, min/max
    const allPcts = [...s.matchAll(/([\d.]+)\s*%/g)].map(m => parseFloat(m[1]));
    if (allPcts.length) return {min:Math.min(...allPcts), max:Math.max(...allPcts)};
    return {min:null, max:null};
  }
  // Parse IFRA 51 category limits into structured object
  function parseIFRA51(s) {
    if (!s || !s.includes('IFRA 51')) return null;
    const limits = {};
    const pairs = s.replace(/^IFRA 51:\s*/i, '').split('/').map(p => p.trim());
    for (const p of pairs) {
      const m = p.match(/([\d.]+)%\s+(.+)/);
      if (m) limits[m[2].trim()] = parseFloat(m[1]);
    }
    return Object.keys(limits).length ? limits : null;
  }
  // Ordinal scale for odor strength
  function odorStrengthScale(s) {
    if (!s) return null;
    const sl = s.toLowerCase();
    if (sl.includes('none')) return 0;
    if (sl.includes('very high')) return 5;
    if (sl.includes('high')) return 4;
    if (sl.includes('medium to high')) return 3.5;
    if (sl.includes('medium')) return 3;
    if (sl.includes('low to medium')) return 2;
    if (sl.includes('low')) return 1;
    return null;
  }
  // One-hot note classification
  function noteOneHot(s) {
    if (!s) return {is_top:false, is_middle:false, is_base:false};
    const sl = s.toLowerCase();
    return {
      is_top: sl.includes('top'),
      is_middle: sl.includes('middle'),
      is_base: sl.includes('base')
    };
  }
  // Extract unique GHS H-codes from array
  function extractGhsCodes(items) {
    if (!items) return [];
    const codes = new Set();
    for (const item of items) {
      const matches = item.match(/H\d{3}/g);
      if (matches) matches.forEach(c => codes.add(c));
    }
    return [...codes].sort();
  }

  // === Unit Conversion: standardize to °C and mmHg ===
  function parseTempCelsius(text) {
    // Try °C first, then °F, then K
    const patterns = [
      {re:/([-\d.]+)\s*°?\s*C\b/i, fn:v=>v},
      {re:/([-\d.]+)\s*°?\s*F\b/i, fn:v=>(v-32)*5/9},
      {re:/([-\d.]+)\s*K\b/i, fn:v=>v-273.15},
    ];
    for (const {re,fn} of patterns) {
      const m = text.match(re);
      if (m) return Math.round(fn(parseFloat(m[1]))*100)/100;
    }
    return null;
  }
  function parsePressureMmHg(text) {
    const patterns = [
      {re:/([\d.eE+\-]+)\s*mm\s*Hg/i, fn:v=>v},
      {re:/([\d.eE+\-]+)\s*kPa/i, fn:v=>v*7.50062},
      {re:/([\d.eE+\-]+)\s*atm/i, fn:v=>v*760},
      {re:/([\d.eE+\-]+)\s*\[mmHg\]/i, fn:v=>v},
    ];
    for (const {re,fn} of patterns) {
      const m = text.match(re);
      if (m) return Math.round(fn(parseFloat(m[1]))*1e6)/1e6;
    }
    return null;
  }
  function parseDensity(text) {
    const m = text.match(/([\d.]+)\s*(g\s*\/?\s*(cu\s*)?cm|g\s*\/?\s*mL)?/i);
    return m ? parseFloat(m[1]) : null;
  }

  // === Aggregation: median of all parsed values from multiple entries ===
  function parseAllValues(items, parseFn) {
    if (!items) return [];
    const vals = [];
    for (const item of items) {
      const v = parseFn(item);
      if (v != null && isFinite(v)) vals.push(v);
    }
    return vals;
  }
  function median(arr) {
    if (!arr.length) return null;
    const s = [...arr].sort((a,b)=>a-b);
    const mid = Math.floor(s.length/2);
    return s.length%2 ? s[mid] : Math.round((s[mid-1]+s[mid])/2*100)/100;
  }

  // === Data Completeness Score ===
  function calcCompleteness(record) {
    const keyFields = [
      record.cas_number,
      record.identifiers?.iupac_name,
      record.identifiers?.molecular_formula,
      record.identifiers?.smiles,
      record.properties?.molecular_weight,
      record.properties?.xlogp,
      record.perfumery?.odor_description,
      record.perfumery?.odor_type,
      record.perfumery?.note_classification,
      record.perfumery?.tenacity_hours_numeric,
      record.perfumery?.usage_level_min_pct,
      record.ai_extracted?.boiling_point_celsius,
      record.ai_extracted?.density_value,
      record.ai_extracted?.vapor_pressure_mmhg,
      record.ai_extracted?.logp_experimental,
      record.ai_extracted?.ghs_codes?.length > 0 ? true : null,
    ];
    const filled = keyFields.filter(v => v != null && v !== "" && v !== false).length;
    return Math.round(filled / keyFields.length * 100);
  }

  // Build clean JSON for AI analysis
  const data = found.map(mat => {
    const usageRange = parseUsageRange(mat.usage_levels);
    const ifra51 = parseIFRA51(mat.usage_levels);
    const notes = noteOneHot(mat.note_classification);
    const banStatus = getBanStatus(mat);
    const record = {
      name: mat.name,
      pubchem_name: mat._pubchemTitle || mat.synonyms.find(s => !CAS_RE_SYN.test(s)) || mat.iupac_name || mat.name,
      material_type: classifyMaterialType(mat),
      industry_tags: classifyIndustryTags(mat),
      ban_status: banStatus || null,
      is_external_perfumery: mat._externalPerfumery || false,
      cas_number: mat.cas_number || null,
      fema_number: mat.fema_number || null,
      pubchem_url: mat.page_url || null,
      structure_image_url: mat.structure_image_url || null,
      identifiers: {
        iupac_name: mat.iupac_name || null,
        molecular_formula: mat.molecular_formula || null,
        canonical_smiles: mat.smiles || null,
        isomeric_smiles: mat.isomeric_smiles || null,
        inchi: mat.inchi || null
      },
      properties: {
        molecular_weight: mat.molecular_weight ? parseFloat(mat.molecular_weight) : null,
        exact_mass: mat.exact_mass ? parseFloat(mat.exact_mass) : null,
        xlogp: mat.xlogp ? parseFloat(mat.xlogp) : null,
        tpsa: mat.tpsa ? parseFloat(mat.tpsa) : null,
        hbond_donor_count: mat.hbond_donor ? parseInt(mat.hbond_donor) : null,
        hbond_acceptor_count: mat.hbond_acceptor ? parseInt(mat.hbond_acceptor) : null,
        rotatable_bond_count: mat.rotatable_bond ? parseInt(mat.rotatable_bond) : null,
        heavy_atom_count: mat.heavy_atom ? parseInt(mat.heavy_atom) : null
      },
      perfumery: {
        odor_description: mat.odor_description || null,
        odor_type: mat.odor_type || null,
        odor_strength: mat.odor_strength || null,
        odor_strength_scale: odorStrengthScale(mat.odor_strength),
        note_classification: mat.note_classification || null,
        ...notes,
        tenacity: mat.tenacity || null,
        tenacity_hours: mat.tenacity_hours || null,
        tenacity_hours_numeric: parseHoursNumeric(mat.tenacity_hours),
        ifra_guidelines: mat.ifra_guidelines || null,
        usage_levels: mat.usage_levels || null,
        usage_level_min_pct: usageRange.min,
        usage_level_max_pct: usageRange.max,
        ifra_51_limits: ifra51,
        blends_well_with: mat.blends_well_with.length ? mat.blends_well_with : []
      },
      synonyms: mat.synonyms.length ? mat.synonyms.filter(s => !CAS_RE_SYN.test(s)) : [],
      pubchem_data: {},
      ai_extracted: {}
    };
    // Fallback: if smiles still null, try from pubchem_data
    if (!record.identifiers.canonical_smiles && mat.pubchem_sections) {
      for (const [h, items] of Object.entries(mat.pubchem_sections)) {
        if (h.toLowerCase().includes('smiles') && items.length) {
          record.identifiers.canonical_smiles = items[0]; break;
        }
      }
    }
    // Fallback: isomeric_smiles = canonical if not available (no stereocenters)
    if (!record.identifiers.isomeric_smiles && record.identifiers.canonical_smiles) {
      record.identifiers.isomeric_smiles = record.identifiers.canonical_smiles;
      record.identifiers.has_stereocenters = false;
    } else if (record.identifiers.isomeric_smiles) {
      record.identifiers.has_stereocenters =
        record.identifiers.isomeric_smiles !== record.identifiers.canonical_smiles;
    }
    // Add filtered PubChem sections
    if (mat.pubchem_sections && Object.keys(mat.pubchem_sections).length) {
      const globalSeen = new Set();
      for (const [heading, items] of Object.entries(mat.pubchem_sections)) {
        const hl = heading.toLowerCase();
        // Skip excluded sections
        if (SKIP_JSON.some(k => hl.includes(k))) continue;
        // Flatten comma-separated lists (e.g. Deprecated CAS), dedup, truncate
        const flat = [];
        for (const item of items) {
          if (item.startsWith('http')) continue;
          const c = item.replace(/https?:\/\/\S+/g,'').trim();
          if (!c || c.length < 3) continue;
          // Split comma-separated values for dedup (e.g. "A, B, C")
          if (/^\d[\d\-,\s]+$/.test(c)) {
            c.split(',').map(s=>s.trim()).filter(s=>s.length>=3).forEach(s=>flat.push(s));
          } else {
            flat.push(c);
          }
        }
        const cleaned = flat.filter(c => !globalSeen.has(c))
          .map(c => c.length > 500 ? c.substring(0, 500) + '…' : c);
        cleaned.forEach(c => globalSeen.add(c));
        if (cleaned.length) record.pubchem_data[heading] = cleaned;
      }
    }
    // Remove empty pubchem_data
    if (!Object.keys(record.pubchem_data).length) delete record.pubchem_data;

    // === AI Extracted: unit-standardized, aggregated values ===
    const pd = record.pubchem_data || {};
    function findPdVal(...keys) {
      for (const [h, items] of Object.entries(pd)) {
        const hl = h.toLowerCase();
        if (keys.some(k => hl.includes(k)) && items.length) return items;
      }
      return null;
    }

    // GHS codes (deduplicated)
    const ghsItems = findPdVal('ghs classification');
    if (ghsItems) record.ai_extracted.ghs_codes = extractGhsCodes(ghsItems);

    // Physical properties: parse ALL values, convert units, take median
    const bpVals = parseAllValues(findPdVal('boiling point'), parseTempCelsius);
    const mpVals = parseAllValues(findPdVal('melting point'), parseTempCelsius);
    const fpVals = parseAllValues(findPdVal('flash point'), parseTempCelsius);
    const densVals = parseAllValues(findPdVal('density'), parseDensity);
    const vpVals = parseAllValues(findPdVal('vapor pressure'), parsePressureMmHg);
    const logpVals = parseAllValues(findPdVal('logp'), t => {
      const m = t.match(/([\d.]+)/); return m ? parseFloat(m[1]) : null;
    });

    if (bpVals.length) {
      record.ai_extracted.boiling_point_celsius = median(bpVals);
      if (bpVals.length > 1) record.ai_extracted.boiling_point_n = bpVals.length;
    }
    if (mpVals.length) {
      record.ai_extracted.melting_point_celsius = median(mpVals);
      if (mpVals.length > 1) record.ai_extracted.melting_point_n = mpVals.length;
    }
    if (fpVals.length) {
      record.ai_extracted.flash_point_celsius = median(fpVals);
      if (fpVals.length > 1) record.ai_extracted.flash_point_n = fpVals.length;
    }
    if (densVals.length) {
      record.ai_extracted.density_g_cm3 = median(densVals);
    }
    if (vpVals.length) {
      record.ai_extracted.vapor_pressure_mmhg = median(vpVals);
    }
    if (logpVals.length) {
      record.ai_extracted.logp_experimental = median(logpVals);
    }

    // Remove empty ai_extracted
    if (!Object.keys(record.ai_extracted).length) delete record.ai_extracted;

    // === Data Completeness Score (0-100%) ===
    record.data_completeness_pct = calcCompleteness(record);
    record.data_source = {
      chemical_data: "PubChem (NIH/NCBI)",
      perfumery_data: mat._odor_source === 'PubChem' ? "PubChem (partial)" : mat.odor_description ? "Local Perfumery Database" : "Not Available"
    };

    return record;
  });

  if (data.length) {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "perfume_report.json"; a.click();
  }

  btn.textContent = origText;
  btn.style.pointerEvents = "";
  btn.style.opacity = "";
}

async function preparePrint(full=true) {
  if (full) {
    // Load all PubChem data that hasn't been fetched yet
    const unloaded = [];
    results.forEach((mat, idx) => {
      if (mat.found && mat._cid) {
        const dataDiv = document.getElementById("pcData"+idx);
        if (dataDiv && !dataDiv.dataset.loaded) unloaded.push(idx);
      }
    });

    if (unloaded.length) {
      const status = document.createElement('div');
      status.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:12px;background:#3D5A80;color:#fff;text-align:center;z-index:9999;font-size:0.9em;';
      status.textContent = `Loading PubChem data (0/${unloaded.length})...`;
      document.body.appendChild(status);

      for (let i = 0; i < unloaded.length; i++) {
        status.textContent = `Loading PubChem data (${i+1}/${unloaded.length})...`;
        await loadPubchemData(unloaded[i]);
      }
      document.body.removeChild(status);
    }
  }

  // Summary mode: add class to body to hide PubChem data via CSS
  if (!full) document.body.classList.add('print-summary');

  // Remove hidden elements from DOM to prevent browser page-break quirks
  const removed = [];
  document.querySelectorAll('.card-back, .pubchem-toggle, .card-body > hr').forEach(el => {
    removed.push({el, parent: el.parentNode, next: el.nextSibling});
    el.parentNode.removeChild(el);
  });
  // Remove empty pubchem-data divs
  document.querySelectorAll('.pubchem-data').forEach(el => {
    if (!el.innerHTML.trim()) {
      removed.push({el, parent: el.parentNode, next: el.nextSibling});
      el.parentNode.removeChild(el);
    }
  });

  window.print();

  // Cleanup after print - restore removed elements
  function cleanup() {
    document.body.classList.remove('print-summary');
    for (let i = removed.length - 1; i >= 0; i--) {
      const {el, parent, next} = removed[i];
      if (next && next.parentNode === parent) parent.insertBefore(el, next);
      else parent.appendChild(el);
    }
  }
  window.addEventListener('afterprint', cleanup, {once: true});
  setTimeout(cleanup, 60000);
}

function toggleDlMenu() {
  document.getElementById('dlMenu').classList.toggle('open');
}
function closeDlMenu() {
  document.getElementById('dlMenu').classList.remove('open');

document.addEventListener('click', e => {

});

// Material type classification (used in app + JSON)
function classifyMaterialType(mat) {
  const n = (mat.name || '').toLowerCase();
  const syns = (mat.synonyms || []).join(' ').toLowerCase();
  const desc = ((mat.odor_description || '') + ' ' + (mat.usage_levels || '')).toLowerCase();
  const odorType = (mat.odor_type || '').toLowerCase();
  const all = n + ' ' + syns + ' ' + desc + ' ' + odorType;
  // Additives / Preservatives / Stabilizers (not aroma chemicals)
  if (/\b(preservative|biocide|antioxidant|stabilizer|additive)\b/i.test(all) || /^(additive|base\/additive)$/i.test(mat.note||'')) return 'additive';
  if (MIXTURES.has(mat.cas_number)) return 'natural_extract';
  if (/\b(essential oil|absolute|extract|resinoid|concrete|tincture|oleoresin|balsam|wax)\b/i.test(all)) return 'natural_extract';
  if (/\b(solvent|carrier|diluent|emollient|virtually odorless|odorless)\b/i.test(all)) return 'solvent_carrier';
  if (/\b(isododecane|dipropylene glycol|isopropyl myristate|triethyl citrate|benzyl benzoate)\b/i.test(n)) return 'solvent_carrier';
  if (/\b(natural|isolate|from .* oil|occurs in)\b/i.test(all) && !MIXTURES.has(mat.cas_number)) return 'natural_isolate';
  return 'single_molecule';
}
const MATERIAL_TYPE_LABELS = {
  'additive': 'Preservative / Additive',
  'natural_extract': 'Natural Extract',
  'natural_isolate': 'Natural Isolate',
  'solvent_carrier': 'Solvent / Carrier',
  'single_molecule': 'Aroma Chemical'
};

// Industry tags classification
function getBanStatus(mat) {
  const ifra = (mat.ifra_guidelines || '').toLowerCase();
  const usage = (mat.usage_levels || '').toLowerCase();
  const all = ifra + ' ' + usage;
  if (/prohibited\s*worldwide|\bbanned\b(?!.*\beu\b)/i.test(all) && !/\beu\b/i.test(ifra))
    return 'worldwide';
  if (/\bbanned\b|prohibited\s*in\s*eu|banned\s*in\s*eu/i.test(all))
    return 'eu';
  return null;
}
function isBannedEU(mat) { return getBanStatus(mat) !== null; }

function classifyIndustryTags(mat) {
  const tags = [];
  const n = (mat.name || '').toLowerCase();
  const desc = (mat.odor_description || '').toLowerCase();
  const odorType = (mat.odor_type || '').toLowerCase();
  const syns = (mat.synonyms || []).join(' ').toLowerCase();
  const pdStr = mat.pubchem_sections ? JSON.stringify(mat.pubchem_sections).toLowerCase() : '';
  const banned = isBannedEU(mat);

  // Detect non-aroma functional materials (preservatives, antioxidants, stabilizers) — but NOT solvents
  const isSolvent = /\bsolvent\b/i.test(odorType + ' ' + desc + ' ' + (mat.note_classification||''));
  const isFunctional = !isSolvent && /preservative|biocide|antioxidant|stabilizer/i.test(odorType + ' ' + desc);
  const hasRealOdor = (mat.odor_description || mat.odor_type || mat.odor_strength)
    && !isFunctional
    && !/^odorless|^none$/i.test((mat.odor_strength||''));

  // Functional additives — not perfumery
  if (isFunctional) {
    tags.push('additive');
    return tags;
  }

  // Perfumery / Flavor / Cosmetics
  if (hasRealOdor || MIXTURES.has(mat.cas_number) ||
      /fragrance|perfum|aroma|odor agent/i.test(pdStr) ||
      /solvent.*carrier|carrier.*solvent|emollient/i.test(desc + ' ' + odorType)) {
    tags.push('perfumery');
    // Flavor: only if has FEMA or explicit food use, and not banned
    if (!banned && (mat.fema_number || /flavor|flavour|food additive|fema|jecfa/i.test(pdStr))) {
      tags.push('flavor');
    }
    // Cosmetics: exclude if banned in EU
    if (!banned) {
      if (/cosmetic|skin|dermal|masking|emollient/i.test(pdStr)) {
        tags.push('cosmetics');
      } else {
        tags.push('cosmetics');
      }
    }
    // Add banned tag
    if (banned) {
      const scope = getBanStatus(mat);
      tags.push(scope === 'worldwide' ? 'banned_global' : 'banned_eu');
    }
  }

  // Pharmaceutical
  if (!hasRealOdor && /pharma|drug|medicine|therapeutic|anesthetic|analgesic|antibiotic/i.test(pdStr + ' ' + syns)) {
    tags.push('pharmaceutical', 'medicine');
  }
  // Also tag if ATC code present
  if (/atc code/i.test(pdStr)) {
    if (!tags.includes('pharmaceutical')) tags.push('pharmaceutical');
  }

  // Toxicology / Research
  if (/toxin|mycotoxin|venom|research.only|highly.toxic|poison/i.test(n + ' ' + syns + ' ' + pdStr)) {
    tags.push('toxicology', 'research_only');
  }

  // Fallback: if no tags assigned
  if (!tags.length) {
    tags.push('chemical', 'unclassified');
  }

  return tags;
}
const INDUSTRY_TAG_LABELS = {
  'perfumery': 'Perfumery', 'flavor': 'Flavor', 'cosmetics': 'Cosmetics',
  'additive': 'Additive / Preservative',
  'banned_eu': 'Banned (EU)', 'banned_global': 'Banned (Worldwide)',
  'pharmaceutical': 'Pharma', 'medicine': 'Medicine',
  'toxicology': 'Toxicology', 'research_only': 'Research',
  'chemical': 'Chemical', 'unclassified': 'Unclassified'
};

function esc(s) { return (s||"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toTitle(s) { return s.replace(/\b\w/g, c=>c.toUpperCase()); }
