// ═══════════════════════════════════════════════════════════════
// MODULE: Filter Matching
// All filter logic reads from FILTER_CACHE only.
// ═══════════════════════════════════════════════════════════════
function _anyAxisActive() {
  for (const ax of Object.values(_filterAxes)) if (ax.set.size) return true;
  return activeMainFamilyFilters.size > 0 || activeSubFamilyFilters.size > 0 || activeFacetFilters.size > 0;
}

function matchesAllFilters(cas) {
  const fc = cas ? FILTER_CACHE.get(cas) : null;
  if (!fc) return !_anyAxisActive();

  // Filter rule: AND-within-group AND AND-across-groups.
  //   - If the user selects multiple chips inside one axis, the
  //     material must carry ALL of those values (strict AND).
  //   - If the user selects chips across multiple axes, the material
  //     must pass every axis's check.
  //   - Axes the user leaves untouched don't constrain anything.
  // Single-value material fields (Type, Source, Note literal) use
  // the "material's value must be one of the selected values" rule,
  // which is the natural equivalent of AND for a single slot.

  // Note — AND-within on multi-word material notes. '_other' means
  // "no top/middle/base"; selecting it alongside a concrete note
  // is intentionally contradictory (matches nothing).
  const noteSet = _filterAxes.note.set;
  if (noteSet.size) {
    for (const v of noteSet) {
      if (v === '_other') { if (RE_NOTE_OTHER.test(fc.noteLow)) return false; }
      else { if (!fc.noteLow.includes(v)) return false; }
    }
  }
  // Type — single-value on material. Material's materialType must
  // be one of the selected values.
  const typeSet = _filterAxes.type.set;
  if (typeSet.size && !typeSet.has(fc.materialType)) return false;
  // Function — multi-value on material. AND-within.
  const funcSet = _filterAxes.func.set;
  if (funcSet.size) {
    for (const f of funcSet) if (!fc.functions.has(f)) return false;
  }
  // Use — multi-value on material. AND-within.
  const tagSet = _filterAxes.tag.set;
  if (tagSet.size) {
    for (const u of tagSet) if (!fc.uses.has(u)) return false;
  }
  // Regulatory — multi-value on material. AND-within with the
  // _normalizeRegulatoryToken legacy fold and the BANNED_CAS
  // fallback for the 'banned' token.
  const regSet = _filterAxes.reg.set;
  if (regSet.size) {
    for (const r of regSet) {
      const canon = _normalizeRegulatoryToken(r);
      if (canon === 'banned') {
        if (!(BANNED_CAS.has(cas) || fc.regulatory.has('banned'))) return false;
      } else if (!fc.regulatory.has(canon)) {
        // Legacy alias fallback (defensive).
        let hit = false;
        for (const [legacy, c] of Object.entries(REGULATORY_LEGACY_ALIASES)) {
          if (c === canon && fc.regulatory.has(legacy)) { hit = true; break; }
        }
        if (!hit) return false;
      }
    }
  }
  // Source — single-value on material.
  const sourceSet = _filterAxes.source.set;
  if (sourceSet.size && !sourceSet.has(fc.source)) return false;
  // Main Family — Edwards 4-bucket AND-within, tokens within a chip's
  // MAIN_FAMILY_TO_LEGACY Set OR-match.
  // Note: combined set includes both explicit families AND facet-derived
  // parents (via FACET_TAGS). This means a material tagged with facets
  // like 'tobacco'/'hay' is reachable via the Smoky family chip even
  // when 'smoky' isn't listed in primary/secondary — the facet axis is
  // more granular than family, but parent-of-facet membership is
  // logically implied.
  if (activeMainFamilyFilters.size) {
    const combined = new Set([
      ...(fc.primaryFamilies || []),
      ...(fc.secondaryFamilies || [])
    ]);
    for (const f of (fc.facets || [])) {
      const parent = FACET_TAGS[f];
      if (parent) combined.add(parent);
    }
    for (const main of activeMainFamilyFilters) {
      const toks = MAIN_FAMILY_TO_LEGACY[main];
      if (!toks) continue;
      let hit = false;
      for (const t of toks) if (combined.has(t)) { hit = true; break; }
      if (!hit) return false;
    }
  }
  // Family — Edwards 14-subfamily AND-within, tokens within a chip's
  // SUB_FAMILY_TO_LEGACY Set OR-match. Same facet→parent derivation
  // as the Main Family axis above.
  if (activeSubFamilyFilters.size) {
    const combined = new Set([
      ...(fc.primaryFamilies || []),
      ...(fc.secondaryFamilies || [])
    ]);
    for (const f of (fc.facets || [])) {
      const parent = FACET_TAGS[f];
      if (parent) combined.add(parent);
    }
    for (const sub of activeSubFamilyFilters) {
      const toks = SUB_FAMILY_TO_LEGACY[sub];
      if (!toks) continue;
      let hit = false;
      for (const t of toks) if (combined.has(t)) { hit = true; break; }
      if (!hit) return false;
    }
  }
  // Facet — multi-value on material. AND-within.
  if (activeFacetFilters.size) {
    const fcFacets = fc.facets || [];
    for (const facet of activeFacetFilters) {
      if (!fcFacets.includes(facet)) return false;
    }
  }
  return true;
}

function showPills(typed) {
  const ql = typed.toLowerCase().replace(/\s+/g,' ').trim();
  const hasAnyFilter = _anyAxisActive();

  // Existing results — exclude from pill suggestions
  const existingCas = new Set();
  const existingNames = new Set();
  results.forEach(r => { const cas=r.record?.identifiers?.cas; if(cas) existingCas.add(cas); existingNames.add((r.record?.names?.canonical||'').toLowerCase()); });

  if (ql.length < 1) {
    // If any filter active but no text, show matching materials (minus already searched)
    if (hasAnyFilter) {
      let suggestions = [];
      const seenCas = new Set();
      for (const entry of Object.values(DB)) {
        if (suggestions.length >= 10) break;
        if (!matchesAllFilters(entry.cas)) continue;
        if (seenCas.has(entry.cas)) continue;
        if (existingCas.has(entry.cas) || existingNames.has(entry.name.toLowerCase())) continue;
        suggestions.push({name: entry.name, cas: entry.cas});
        seenCas.add(entry.cas);
      }
      renderPills(suggestions);
      return;
    }
    pillsDiv.innerHTML = ""; return;
  }
  
  let suggestions = [];
  const seenCas = new Set();
  
  // Prefix match (with trailing space)
  (PREFIX_IX[ql]||[]).forEach(({name,cas,display}) => {
    if (suggestions.length>=10) return;
    if (cas && seenCas.has(cas)) return;
    if (!matchesAllFilters(cas)) return;
    suggestions.push({name:display,cas}); if(cas)seenCas.add(cas);
  });

  // Space fallback
  if (!suggestions.length && ql.includes(' ')) {
    const shorter = ql.substring(0, ql.lastIndexOf(' '));
    (PREFIX_IX[shorter]||[]).forEach(({name,cas,display}) => {
      if (suggestions.length>=10) return;
      if (!name.startsWith(ql) && !name.includes(ql)) return;
      if (cas && seenCas.has(cas)) return;
      if (!matchesAllFilters(cas)) return;
      suggestions.push({name:display,cas}); if(cas)seenCas.add(cas);
    });
  }

  // Substring
  if (suggestions.length<10 && ql.length>=2) {
    (PREFIX_IX[ql.substring(0,2)]||PREFIX_IX[ql[0]]||[]).forEach(({name,cas,display}) => {
      if (suggestions.length>=10) return;
      if (!name.includes(ql)) return;
      if (suggestions.find(s=>s.name===display)) return;
      if (!matchesAllFilters(cas)) return;
      if (cas && seenCas.has(cas)) return;
      suggestions.push({name:display,cas}); if(cas)seenCas.add(cas);
    });
  }
  
  // Filter out already in results
  suggestions = suggestions.filter(s => {
    const sl = s.name.toLowerCase();
    if (sl===ql || existingNames.has(sl)) return false;
    if (s.cas && existingCas.has(s.cas)) return false;
    return true;
  });

  // Render local suggestions (perfumery DB only)
  renderPills(suggestions);
}

function renderPills(suggestions) {
  pillsDiv.innerHTML = suggestions.slice(0,10).map(s =>
    `<span class="pill" onclick="doSearch('${s.name.replace(/'/g,"\\'")}')">${s.name}</span>`
  ).join('');
}

// Fetch with timeout
// Default fetch timeout reduced from 8s → 6s (per-request). Slow
// networks still have a second chance via fetchWithTimeoutRetry below.
function fetchWithTimeout(url, opts={}, ms=6000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, {...opts, signal:ctrl.signal}).finally(() => clearTimeout(timer));
}

// Retry wrapper — one re-try on AbortError only (i.e. timeout). A
// real HTTP error (404 / 500) resolves without abort and is NOT
// retried. First attempt uses `ms`, retry bumps to 2×ms so a
// genuinely slow request can still complete. Used by the CID lookup
// helpers (getCid / getCidViaSid) so a transient network blip
// doesn't land a permanent null in pcCache.
async function fetchWithTimeoutRetry(url, opts={}, ms=6000) {
  try {
    return await fetchWithTimeout(url, opts, ms);
  } catch (e) {
    if (e?.name === 'AbortError') {
      return fetchWithTimeout(url, opts, ms * 2);
    }
    throw e;
  }
}

// onerror handler for structure-image <img>. On the first failure we
// silently retry once with a cache-buster — handles the common case
// where a mobile network drop aborted the first request. On the
// second failure we replace the <img> with a visible placeholder so
// the user knows the image was attempted (instead of silently hiding
// the whole container — which made it look like the card was missing
// data).
function handleStructureImgError(img) {
  try {
    img.dataset.retry = String(Number(img.dataset.retry || '0') + 1);
    if (img.dataset.retry === '1') {
      const sep = img.src.includes('?') ? '&' : '?';
      img.src = img.src.split('#')[0] + sep + '_r=' + Date.now();
      return;
    }
    img.onerror = null;
    const parent = img.parentNode;
    if (!parent) return;
    parent.innerHTML = '<div style="padding:16px;border:1px dashed var(--border);border-radius:6px;color:var(--text2);font-size:0.85em;text-align:center">Structure image unavailable (network)<br><a href="' + (img.src.split('?')[0].replace('/rest/pug/compound/cid/','/compound/').replace('/PNG','')) + '" target="_blank" style="color:var(--accent)">Open on PubChem ↗</a></div>';
  } catch(e) { /* defensive — never let the handler itself throw */ }
}


// Append pre-escaped HTML into the searchError banner so multiple
// per-item messages in one batch (e.g. "foo, bar, baz" all failing)
// all stay visible instead of only the last one surviving. Callers
// are responsible for passing already-escaped HTML; user-controlled
// strings must go through esc() first.
function _appendSearchError(html) {
  const el = document.getElementById('searchError');
  el.style.display = 'block';
  el.innerHTML = el.innerHTML ? el.innerHTML + '<br>' + html : html;
}
function showSearchError(msg) {
  _appendSearchError(esc(msg));
}
// "Not found" — neutral, non-technical, invites a spelling check.
function showNotFoundMessage(name) {
  _appendSearchError(`<span>No material found for &ldquo;${esc(name)}&rdquo;. Check the spelling or try a different name.</span>`);
}
// "Not a perfumery material" — chemical exists but is outside scope.
// Uses a softer color since this is informational, not an error.
function showNotPerfumeryMessage(name) {
  _appendSearchError(`<span style="color:var(--text2);font-weight:400">&ldquo;${esc(name)}&rdquo; is a chemical, but it isn&rsquo;t classified as a perfumery raw material in this tool.</span>`);
}
function clearSearchError() {
  const el = document.getElementById('searchError');
  el.textContent = '';
  el.style.display = 'none';
  el.innerHTML = '';
}
// Compose a short, neutral one-line summary of batch-level non-success
// outcomes (ambiguous and not-perfumery counts). Returns null when both
// counts are zero so the caller can preserve the default status text.
function _formatBatchSummary(ambig, notPerf) {
  const parts = [];
  if (ambig)   parts.push(`${ambig} ambiguous`);
  if (notPerf) parts.push(`${notPerf} outside perfumery scope`);
  return parts.length ? parts.join(', ') + '.' : null;
}
function _showDidYouMean(input, candidates) {
  _appendSearchError(
    `<span style="color:var(--text2);font-weight:400">No exact match for &ldquo;${esc(input)}&rdquo;. Several close matches were found &mdash; please choose one:</span> ` +
    candidates.map(c =>
      `<a href="#" onclick="event.preventDefault();clearSearchError();doSearch('${c.name.replace(/'/g,"\\'")}');return false" style="color:var(--accent);text-decoration:underline;margin:0 4px">${esc(c.name)} (${c.score}%)</a>`
    ).join(' ')
  );
}

// ===== Search Orchestration =====
async function doSearch(term) {
  clearSearchError();
  const names = term.split(',').map(s=>s.trim()).filter(Boolean);
  const existingNames = new Set(results.map(r=>(r.record?.names?.canonical||'').toLowerCase()));
  const newNames = names.filter(n=>!existingNames.has(n.toLowerCase()));
  if (!newNames.length) return;
  
  const prog = document.getElementById("progress");
  const progBar = document.getElementById("progressBar");
  const progText = document.getElementById("progressText");
  prog.style.display = "block";

  // Batch-level counters for the post-render status summary (UX only).
  // These do NOT influence which materials enter `results`; they only feed
  // the optional one-line summary written into the existing statusText.
  let _ambiguousCount = 0;
  let _notPerfumeryCount = 0;

  // Parallel scraping (max 5 concurrent, fault-tolerant)
  const BATCH = 5;
  for (let i=0; i<newNames.length; i+=BATCH) {
    const batch = newNames.slice(i, i+BATCH);
    progBar.style.width = ((i/newNames.length)*100)+"%";
    progText.textContent = batch.join(', ');
    const settled = await Promise.allSettled(batch.map(n => scrapeMaterial(n)));
    settled.forEach((r, i) => {
      if (r.status === 'rejected') {
        console.warn('scrapeMaterial rejected for "'+batch[i]+'":', r.reason);
        showSearchError(`'${batch[i]}' — search error (see console)`);
        return;
      }
      const mat = r.value;
      if (mat.found) {
        results.unshift(mat);
      } else if (mat._ambiguous && mat.record.match?.ambiguous_candidates?.length) {
        _ambiguousCount++;
        _showDidYouMean(mat.record.names.canonical, mat.record.match.ambiguous_candidates);
      } else if (mat._notPerfumery) {
        // Pipeline found a chemical but validation classified it as outside perfumery scope.
        // Prefer the canonical/resolved name (set by PubChem path) over the raw input.
        _notPerfumeryCount++;
        showNotPerfumeryMessage(mat.record.names.canonical);
      } else {
        // No local match and PubChem couldn't resolve anything.
        showNotFoundMessage(mat.record.names.canonical);
      }
    });
  }
  
  // Dedup by CAS — keep first (newest)
  const seen = new Set();
  results = results.filter(r => {
    const cas = r.record?.identifiers?.cas;
    if (!cas) return true;
    if (seen.has(cas)) return false;
    seen.add(cas); return true;
  });
  
  progBar.style.width = "100%";
  prog.style.display = "none";
  progText.textContent = "";
  input.value = "";
  btn.disabled = true;
  results.forEach(r => r._open = false);
  renderResults._forceCollapse = true;
  // Stash a one-line summary string for renderResults to surface in the
  // status bar. Resets to null when both counts are 0 so the default
  // "N material(s)" text returns. Persists across background re-renders
  // (e.g. _enrichPubchem callbacks) until the next doSearch overwrites it.
  renderResults._statusOverride = _formatBatchSummary(_ambiguousCount, _notPerfumeryCount);
  renderResults();
  // Re-show filtered pills (minus the ones just searched)
  showPills(input.value);
  // Prefetch images + PubChem data in background
  prefetchAll();
}

// GHS pictogram mapping from H-codes
const GHS_PICTOGRAMS = {
  'GHS01': {name:'Explosive', codes:['H200','H201','H202','H203','H204','H205','H240','H241']},
  'GHS02': {name:'Flammable', codes:['H220','H221','H222','H223','H224','H225','H226','H228','H241','H242','H250','H251','H252','H260','H261']},
  'GHS03': {name:'Oxidizer', codes:['H270','H271','H272']},
  'GHS04': {name:'Compressed Gas', codes:['H280','H281','H282','H283','H284']},
  'GHS05': {name:'Corrosive', codes:['H290','H314','H318']},
  'GHS06': {name:'Acute Toxicity', codes:['H300','H301','H310','H311','H330','H331']},
  'GHS07': {name:'Irritant', codes:['H302','H312','H315','H317','H319','H332','H335','H336']},
  'GHS08': {name:'Health Hazard', codes:['H304','H334','H340','H341','H350','H351','H360','H361','H370','H371','H372','H373']},
  'GHS09': {name:'Environmental', codes:['H400','H401','H410','H411','H412','H413']},
};
// Extract GHS codes from PUG View Markup (pictogram image URLs).
// Walks the full section tree; the Set handles dedupe across sources.
function _extractGHSFromMarkup(sections) {
  const codes = new Set();
  function walk(secs) {
    for (const sec of secs) {
      if (sec.Information) {
        // Only use FIRST Information item (harmonized classification)
        const info = sec.Information[0];
        if (info?.Value?.StringWithMarkup) {
          for (const sm of info.Value.StringWithMarkup) {
            if (sm.Markup) {
              for (const m of sm.Markup) {
                if (m.URL) {
                  const match = m.URL.match(/GHS(\d{2})/);
                  if (match) codes.add('GHS' + match[1]);
                }
                if (m.Extra) {
                  const match = m.Extra.match(/GHS(\d{2})/);
                  if (match) codes.add('GHS' + match[1]);
                }
              }
            }
          }
        }
      }
      if (sec.Section) walk(sec.Section);
    }
  }
  walk(sections);
  return [...codes].sort();
}

function getGHSPictograms(mat) {
  if (mat._ghsPictograms) return mat._ghsPictograms;
  // Use pre-extracted codes from PUG View Markup (most reliable).
  // Validate the CID the codes came from still matches the material's
  // current PubChem CID — if a later re-scrape or DB-merge changed
  // the identity we must not show hazard pictograms from the old CID.
  if (mat._ghsCodes && Array.isArray(mat._ghsCodes.codes) && mat._ghsCodes.codes.length) {
    const _curCid = mat.record?.identifiers?.pubchem_cid;
    if (!mat._ghsCodes.cid || mat._ghsCodes.cid === _curCid) {
      mat._ghsPictograms = mat._ghsCodes.codes.filter(g => GHS_PICTOGRAMS[g]);
      return mat._ghsPictograms;
    }
  }
  // Legacy bare-array shape (older persisted state): honored but flagged
  // as untied — the CID consistency check only fires when the object
  // shape carries a `cid` tag.
  if (mat._ghsCodes && Array.isArray(mat._ghsCodes) && mat._ghsCodes.length) {
    mat._ghsPictograms = mat._ghsCodes.filter(g => GHS_PICTOGRAMS[g]);
    return mat._ghsPictograms;
  }
  // Fallback for banned/phototoxic from local DB
  const codes = new Set();
  const ifra = (mat.record?.safety?.ifra_guideline||'').toLowerCase();
  if (/banned|prohibit/i.test(ifra)) codes.add('GHS08');
  if (/phototox/i.test(ifra)) codes.add('GHS07');
  mat._ghsPictograms = [...codes].sort();
  return mat._ghsPictograms;
}
function renderGHSIcons(mat) {
  const pics = getGHSPictograms(mat);
  if (!pics.length) return '';
  return `<div class="ghs-section"><p class="ghs-section-title">Hazard Pictograms</p><div class="ghs-icons">` + pics.map(g => {
    const name = GHS_PICTOGRAMS[g]?.name || g;
    return `<div class="ghs-item"><div class="ghs-icon-wrap"><img src="https://pubchem.ncbi.nlm.nih.gov/images/ghs/${g}.svg" alt="${name}" title="${name}" class="ghs-icon"></div><span class="ghs-label">${name}</span></div>`;
  }).join('') + '</div></div>';
}

function _applyPubchemProps(mat, propsData, synsData, descData) {
  const id = mat.record.identifiers, pr = mat.record.properties, nm = mat.record.names;
  if (propsData) {
    const p = propsData.PropertyTable?.Properties?.[0] || {};
    // Non-destructive assign — only overwrite a field when PubChem
    // returned a truthy value. Protects DB-seeded values from being
    // clobbered back to null by an enrichment call that happened to
    // miss some fields (e.g. temporary PubChem outage on a specific
    // property endpoint, or a property the DB has curated but PubChem
    // now returns as null for this CID).
    const _pc = (target, key, value) => { if (value !== null && value !== undefined && value !== '') target[key] = value; };
    _pc(id, 'molecular_formula', p.MolecularFormula);
    _pc(pr, 'molecular_weight',  p.MolecularWeight);
    // PubChem renamed these fields (~2024):
    //   CanonicalSMILES → ConnectivitySMILES (no stereo)
    //   IsomericSMILES  → SMILES            (with stereo)
    // Accept both for forward/backward compat.
    _pc(id, 'canonical_smiles', p.ConnectivitySMILES || p.CanonicalSMILES);
    _pc(id, 'isomeric_smiles',  p.SMILES            || p.IsomericSMILES);
    _pc(id, 'iupac',            p.IUPACName);
    _pc(id, 'inchi',            p.InChI);
    _pc(pr, 'xlogp',            p.XLogP);
    _pc(pr, 'exact_mass',       p.ExactMass);
    _pc(pr, 'tpsa',             p.TPSA);
    _pc(pr, 'hbond_donor',      p.HBondDonorCount);
    _pc(pr, 'hbond_acceptor',   p.HBondAcceptorCount);
    _pc(pr, 'rotatable_bonds',  p.RotatableBondCount);
    _pc(pr, 'heavy_atoms',      p.HeavyAtomCount);
  }
  if (synsData) {
    nm.synonyms = (synsData.InformationList?.Information?.[0]?.Synonym || []).slice(0, 30);
  }
  if (descData) {
    nm.pubchem_title = descData.InformationList?.Information?.[0]?.Title || null;
  }
}

// ===== Search Matchers =====

// Synonym blacklist — terms too generic/ambiguous for reliable matching
const SYNONYM_BLACKLIST = new Set(['pea','pg','alcohol','oil','musk','acid','ester','water','base','note','top']);
const RISKY_SYNONYMS = new Set(['ipm','dpg','mdj','ies','tec','aag','fcf','oud']);

const CAS_RE_SEARCH = /^\d{2,7}-\d{2}-\d$/;
const SMILES_RE_SEARCH = /^[A-Za-z0-9@+\-\[\]\(\)\\\/=#$.%]+$/;
const AROMA_ELEMENTS_SET = new Set(['C','H','O','N','S','F','Cl','Br']);

function normalizeInput(raw) {
  return (raw || '').toLowerCase().replace(/[\u00AE\u2122]/g, '').replace(/\s+/g, ' ').trim();
}

// All search indexes (TRADES, NAME_TO_CAS, SYN_IX) are keyed by lowercase strings.
// Always use normalizeKey() when looking up a term in these indexes.
function normalizeKey(v) { return (v || '').toLowerCase().trim(); }

function makeMatch(type, confidence, input, term, canonical, reason, source) {
  return { type:type, confidence:confidence, input:input, term:term, canonical:canonical||null, reason:reason, source:source||'local_db', ambiguous_candidates:null };
}

// ── Step 1: Exact CAS in local DB ──
function matchByCAS(n) {
  if (!CAS_RE_SEARCH.test(n)) return null;
  if (DB[n]) return makeMatch('cas_exact', 0.99, n, n, DB[n].name, 'CAS found in local DB', 'local_db');
  const cas = TRADES[normalizeKey(n)];
  if (cas && DB[cas]) return makeMatch('cas_exact', 0.99, n, cas, DB[cas].name, 'CAS via trade index', 'local_db');
  return null;
}

// ── Step 2: Exact canonical name ──
function matchByCanonicalName(n) {
  for (const [cas, entry] of Object.entries(DB)) {
    if (entry.name.toLowerCase() === n) return makeMatch('name_exact', 0.99, n, entry.name, entry.name, 'Exact canonical name match', 'local_db');
  }
  return null;
}

// ── Step 3: Exact synonym ──
function matchBySynonym(n) {
  const nk = normalizeKey(n);
  if (SYNONYM_BLACKLIST.has(nk)) return null;
  const cas = NAME_TO_CAS[nk];
  if (!cas || !DB[cas]) return null;
  const conf = RISKY_SYNONYMS.has(nk) ? 0.80 : 0.95;
  return makeMatch('synonym_exact', conf, n, nk, DB[cas].name,
    RISKY_SYNONYMS.has(nk) ? 'Risky abbreviation — verify' : 'Exact synonym match', 'local_db');
}

// ── Step 4: Exact trade name ──
function matchByTradeName(n) {
  const nk = normalizeKey(n);
  if (SYNONYM_BLACKLIST.has(nk)) return null;
  const cas = TRADES[nk];
  if (!cas || !DB[cas]) return null;
  const conf = RISKY_SYNONYMS.has(nk) ? 0.80 : 0.95;
  return makeMatch('trade_exact', conf, n, nk, DB[cas].name,
    RISKY_SYNONYMS.has(nk) ? 'Risky trade abbreviation' : 'Exact trade name match', 'local_db');
}

// ── Step 5: Normalized alias (dash/space swap + suffix mutation) ──
function matchByAlias(n) {
  if (n.length < 3) return null;
  const variants = [n.replace(/ /g, '-'), n.replace(/-/g, ' ')];
  if (n.length > 4) {
    if (n.endsWith('ol') && !n.endsWith('ool')) variants.push(n.replace(/ol$/, 'ool'));
    if (n.endsWith('ool')) variants.push(n.replace(/ool$/, 'ol'));
    if (n.endsWith('ene') && !n.endsWith('en')) variants.push(n.replace(/ene$/, 'en'));
    if (n.endsWith('en') && !n.endsWith('ene')) variants.push(n.replace(/en$/, 'ene'));
  }
  for (const v of variants) {
    if (v === n) continue;
    const vk = normalizeKey(v);
    const cas = TRADES[vk] || NAME_TO_CAS[vk];
    if (cas && DB[cas]) return makeMatch('alias_normalized', 0.85, n, vk, DB[cas].name, 'Matched via variant: "'+v+'"', 'local_db');
  }
  return null;
}

// ── Step 6: Fuzzy match (substring, threshold 0.8) ──
function matchFuzzyLocal(n) {
  const nk = normalizeKey(n);
  if (nk.length < 3) return null;
  if (SYN_IX[nk] && !SYNONYM_BLACKLIST.has(nk)) {
    const e = SYN_IX[nk];
    return makeMatch('synonym_exact', 0.95, n, nk, DB[e.cas]?.name||e.name, 'Exact synonym match', 'local_db');
  }
  let bestScore = 0, bestMatch = null;
  const candidates = [];
  const seenCasCand = new Set();
  // Normalize dashes/underscores to spaces before substring comparison —
  // lets "trans Linalool" match "trans-Linalool Oxide" and "p cymene"
  // match "p-Cymene" without requiring the user to punctuate exactly.
  const canonSep = s => s.replace(/[-_\s]+/g, ' ').trim();
  const nkC = canonSep(nk);
  for (const [nl, match] of Object.entries(SYN_IX)) {
    if (SYNONYM_BLACKLIST.has(nl)) continue;
    const nlC = canonSep(nl);
    const nlHasNk = nlC.includes(nkC);
    const nkHasNl = nkC.includes(nlC);
    if (!nlHasNk && !nkHasNl) continue;
    const score = Math.min(nk.length, nl.length) / Math.max(nk.length, nl.length);
    if (score > bestScore) { bestScore = score; bestMatch = match; }
    // User-typed-substring-of-DB-name (e.g. "spanish" → Thyme Oil,
    // Spanish + Spanish Sage Oil) always qualifies as a candidate —
    // the length-ratio gate was rejecting these short partial-word
    // queries and returning "No material found" instead of a Did You
    // Mean list. The 0.6 ratio gate is preserved for the reverse
    // direction (nk.includes(nl)) to keep short-synonym noise out.
    const candidateOk = nlHasNk || score > 0.6;
    if (!candidateOk) continue;
    if (seenCasCand.has(match.cas)) continue;
    seenCasCand.add(match.cas);
    candidates.push({ name: DB[match.cas]?.name||match.name, cas: match.cas, score: Math.round(score*100) });
  }
  if (bestScore >= 0.8 && bestMatch) {
    return makeMatch('fuzzy', Math.round(bestScore*70)/100, n, normalizeKey(bestMatch.name), DB[bestMatch.cas]?.name||bestMatch.name,
      'Fuzzy match (score: '+Math.round(bestScore*100)+'%)', 'local_db');
  }
  if (candidates.length > 0) {
    const result = makeMatch('ambiguous', 0, n, null, null, 'No confident match found', null);
    result.ambiguous_candidates = candidates.sort((a,b)=>b.score-a.score).slice(0,3);
    return result;
  }
  return null;
}

// ── Helper: background PubChem enrichment for local DB matches ──
function _enrichPubchem(mat, cas) {
  // Prefer a curated CID on the local DB entry (applyPerfumery copies it
  // into mat.record.identifiers.pubchem_cid) — avoids the name→CID
  // round-trip on slow mobile networks and bypasses PubChem's flaky
  // name-lookup (which returns the wrong stereoisomer for some oxide
  // CAS numbers). Fall back to getCid(cas) only when no CID is curated.
  const curatedCid = mat.record?.identifiers?.pubchem_cid || null;
  const cidPromise = curatedCid ? Promise.resolve(Number(curatedCid)) : getCid(cas);
  mat._loadPubchem = cidPromise.then(async cid => {
    if (!cid) return;
    mat.record.identifiers.pubchem_cid = cid;
    mat.page_url = 'https://pubchem.ncbi.nlm.nih.gov/compound/'+cid;
    mat.structure_image_url = PUBCHEM_REST+'/compound/cid/'+cid+'/PNG?image_size=large';
    const [propsRes, synsRes, descRes] = await Promise.allSettled([
      fetchWithTimeout(PUBCHEM_REST+'/compound/cid/'+cid+'/property/MolecularFormula,MolecularWeight,ConnectivitySMILES,SMILES,IUPACName,InChI,InChIKey,XLogP,ExactMass,TPSA,HBondDonorCount,HBondAcceptorCount,RotatableBondCount,HeavyAtomCount/JSON').then(r=>r.json()).catch(()=>null),
      fetchWithTimeout(PUBCHEM_REST+'/compound/cid/'+cid+'/synonyms/JSON').then(r=>r.json()).catch(()=>null),
      fetchWithTimeout(PUBCHEM_REST+'/compound/cid/'+cid+'/description/JSON').then(r=>r.json()).catch(()=>null),
    ]);
    _applyPubchemProps(mat, propsRes.status==='fulfilled'?propsRes.value:null, synsRes.status==='fulfilled'?synsRes.value:null, descRes.status==='fulfilled'?descRes.value:null);
    try { _computeClassification(mat); } catch(e) { console.warn('_computeClassification (enrich):', e); }
    renderResults(); prefetchAll();
    fetchWithTimeout('https://pubchem.ncbi.nlm.nih.gov/rest/pug_view/data/compound/'+cid+'/JSON?heading=GHS+Classification', {}, 8000)
      .then(r=>r.json()).then(d => {
        const liveCodes = _extractGHSFromMarkup(d.Record?.Section||[]);
        // Only overwrite DB-seeded codes if the live fetch actually
        // returned something. The DB's seed uses a majority-vote
        // extractor which finds codes on cases where the live
        // Information[0]-only extractor returns empty (e.g. Camphor
        // where Information[0] is a minority "no hazard" report).
        if (liveCodes.length > 0) {
          mat._ghsCodes = { cid, codes: liveCodes };
          mat._ghsPictograms = null;
          renderResults();
        }
      })
      .catch(e => { if (e?.name !== 'AbortError') console.warn('GHS fetch error:', e); });
  }).catch(e => { if (e?.name !== 'AbortError') console.warn('_enrichPubchem error:', e); });
}

// Mirror of _buildFilterRecord's Function-axis derivation, applied to the
// canonical record shape. Returns an array of values from the closed
// Function axis { aromatic, fixative, solvent, carrier, blender,
// modifier, enhancer }. Used by the runtime classification path for
// materials that bypass FILTER_CACHE (external / PubChem-only results).
// FILTER_CACHE remains the primary source of truth whenever a CAS hits
// the local DB.
function classifyFunctionsFromRecord(record) {
  if (!record || !record.perfumery) return [];
  const pf = record.perfumery, sf = record.safety || {}, nm = record.names || {};
  const n         = (nm.canonical || '').toLowerCase();
  const odorType  = (pf.odor_type || '').toLowerCase();
  const noteLow   = (pf.note || '').toLowerCase();
  const desc      = ((pf.odor_description || '') + ' ' + (sf.usage_levels || '')).toLowerCase();
  const tenacity  = (pf.tenacity || '').toLowerCase();
  const funcAll   = odorType + ' ' + noteLow + ' ' + desc;
  const hasRealOdor = !!(pf.odor_description && !RE_ODORLESS.test(pf.odor_description));
  const out = [];
  const add = f => { if (!out.includes(f)) out.push(f); };

  // Aromatic: any material with a real odor description is aromatic. Do
  // NOT exclude based on funcAll containing "fixative" / "solvent" — many
  // aroma chemicals (Benzyl Salicylate, Benzyl Alcohol, Cinnamic Acid,
  // Lanolin, Isoamyl Acetate, …) have a real odor AND a fixative/solvent
  // secondary role. They belong on the aromatic Function bucket too.
  if (hasRealOdor) add('aromatic');
  for (const f of FUNCTION_AXIS_SPECIFIC) { if (funcAll.includes(f)) add(f); }

  // Fixative: explicit text trigger above already added it. Add it for
  // base notes with high / very-high / excellent tenacity (a high-
  // tenacity base material is a fixative by definition in perfumery),
  // for materials whose canonical name is a natural base class
  // (balsam / resin / oleoresin / absolute — these are fixatives by
  // nature), and for materials on the known-fixative override list.
  if (/\b(high|very high|excellent|extremely high)\b/i.test(tenacity) && /\bbase\b/i.test(noteLow)) add('fixative');
  if (/\b(balsam|resin|resinoid|oleoresin|absolute)\b/i.test(n)) add('fixative');
  if (KNOWN_FIXATIVE_NAMES.test(n)) add('fixative');

  // Blender / modifier / enhancer: explicit text triggers + small
  // known-name override lists.
  if (/\bblender\b/i.test(funcAll) || KNOWN_BLENDER_NAMES.test(n)) add('blender');
  if (/\bmodifier\b/i.test(funcAll) || KNOWN_MODIFIER_NAMES.test(n)) add('modifier');
  if (/\benhancer\b|\bbooster\b/i.test(funcAll)) add('enhancer');

  return out;
}

// ── Helper: apply local DB match result to mat object ──
// Populates every taxonomy axis on the canonical record. industry_tags
// is kept for backward compat (it aliases the new `uses` field that
// exposes the multi-axis Use taxonomy).
function _computeClassification(mat) {
  if (!mat.found) return;
  const c = mat.record.classification;
  c.material_type = classifyMaterialType(mat);
  const uses      = classifyUses(mat);
  c.uses          = uses;
  c.industry_tags = uses; // legacy alias
  c.functions     = classifyFunctionsFromRecord(mat.record);
  c.regulatory    = classifyRegulatory(mat);
  c.source        = classifySource(mat);
  // Step 3 axis — prefer the FILTER_CACHE precompute when the CAS
  // is in the local DB so we don't recompute the inference per
  // result. PubChem-only / external materials fall through to a
  // single _inferTaxonomy call (still once per result, never inside
  // a render hot loop).
  const _cas = mat.record.identifiers?.cas;
  const _fc  = _cas ? FILTER_CACHE.get(_cas) : null;
  if (_fc) {
    c.primaryFamilies   = _fc.primaryFamilies;
    c.secondaryFamilies = _fc.secondaryFamilies;
    c.facets            = _fc.facets;
  } else {
    const _tax = _inferTaxonomy(mat);
    c.primaryFamilies   = _tax.primaries;
    c.secondaryFamilies = _tax.secondaries;
    c.facets            = _tax.facets;
  }
}

function _applyLocalMatch(mat, match) {
  const cas = (() => {
    if (match.type==='cas_exact' && DB[match.term]) return match.term;
    const t = normalizeKey(match.term);
    return TRADES[t] || NAME_TO_CAS[t] || (SYN_IX[t]?.cas);
  })();
  if (!cas || !DB[cas]) return false;
  mat.record.match = match;
  mat.record.names.canonical = DB[cas].name;
  mat.record.identifiers.cas = cas;
  mat.found = true;
  mat.match_info = (match.confidence >= 0.9 ? '\u2705 ' : '\u2139\uFE0F ') + match.reason + ' (' + cas + ')';
  applyPerfumery(mat, cas);
  if (MIXTURES.has(cas)) mat.match_info = '\u2705 Natural mixture (' + cas + ')';
  _computeClassification(mat);
  _enrichPubchem(mat, cas);
  return true;
}

// ── Main search function ──
// ===== Canonical Record =====
// record.* is the single source of truth for all material data.
// All read/write paths use mat.record.* directly.
function createResult(inputName) {
  const record = {
    identifiers: { cas:null, fema:null, pubchem_cid:null, iupac:null, molecular_formula:null,
      canonical_smiles:null, isomeric_smiles:null, inchi:null },
    names: { canonical:inputName, pubchem_title:null, synonyms:[], trade_names:[] },
    properties: { molecular_weight:null, exact_mass:null, xlogp:null, tpsa:null,
      hbond_donor:null, hbond_acceptor:null, rotatable_bonds:null, heavy_atoms:null },
    perfumery: { odor_description:null, odor_type:null, odor_strength:null, odor_source:null,
      note:null, tenacity:null, tenacity_hours:null, blends_with:[] },
    safety: { ifra_guideline:null, usage_levels:null, ban_status:null, ghs_codes:[] },
    classification: { material_type:null, industry_tags:null, uses:null, functions:null, regulatory:null, source:null,
      // Family axis — primaryFamilies/secondaryFamilies are legacy
      // PRIMARY_FAMILIES tokens (used by similarity scoring); the UI
      // collapses them into Edwards 14 Family chips via SUB_FAMILY_TO_LEGACY.
      primaryFamilies:null, secondaryFamilies:null, facets:null },
    match: makeMatch(null, 0, inputName, null, null, null, null),
    metadata: { source:null, is_external:false, pubchem_sections:{} }
  };
  return {
    record,
    found: false,
    // UI-only transient state (not in record)
    _open: false, _loadPubchem: null, _ghsCodes:null, _ghsPictograms:null,
    _ambiguous:false, _notPerfumery:false,
    structure_image_url: null, page_url: null, match_info: null,
  };
}

async function scrapeMaterial(name) {
  const mat = createResult(name);

  const n = normalizeInput(name);

  // ── Local DB matchers (Steps 1-5, synchronous, high confidence) ──
  const localMatch = matchByCAS(n) || matchByCanonicalName(n) || matchBySynonym(n) || matchByTradeName(n) || matchByAlias(n);
  if (localMatch && _applyLocalMatch(mat, localMatch)) return mat;

  // ── Step 6: Fuzzy local match ──
  const fuzzyResult = matchFuzzyLocal(n);
  if (fuzzyResult) {
    if (fuzzyResult.type === 'ambiguous') {
      mat.record.match = fuzzyResult; mat.found = false; mat._ambiguous = true;
      return mat;
    }
    if (_applyLocalMatch(mat, fuzzyResult)) return mat;
  }

  // ── Steps 7-11: PubChem fallbacks (async) ──
  let cid = null;

  // Step 7: CAS via PubChem
  if (CAS_RE_SEARCH.test(n)) {
    cid = await getCid(n);
    if (cid) { mat.record.identifiers.cas = n; mat.record.match = makeMatch('cas_exact', 0.98, name, n, null, 'CAS lookup via PubChem', 'pubchem'); }
  }
  // Step 8: SMILES
  if (!cid && SMILES_RE_SEARCH.test(n) && n.length > 5 && /[=#\(\)]/.test(n)) {
    try {
      const r = await fetchWithTimeout(PUBCHEM_REST+'/compound/smiles/cids/JSON?smiles='+encodeURIComponent(name.trim()));
      const d = await r.json(); cid = d.IdentifierList?.CID?.[0] || null;
      if (cid) mat.record.match = makeMatch('structure_lookup', 0.90, name, name, null, 'SMILES lookup via PubChem', 'pubchem');
    } catch(e) { if (e?.name !== 'AbortError') console.warn('scrapeMaterial smiles lookup:', e); }
  }
  // Step 9: InChI
  if (!cid && n.startsWith('inchi=')) {
    try {
      const r = await fetchWithTimeout(PUBCHEM_REST+'/compound/inchi/cids/JSON', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'inchi='+encodeURIComponent(name.trim())});
      const d = await r.json(); cid = d.IdentifierList?.CID?.[0] || null;
      if (cid) mat.record.match = makeMatch('structure_lookup', 0.95, name, name, null, 'InChI lookup via PubChem', 'pubchem');
    } catch(e) { if (e?.name !== 'AbortError') console.warn('scrapeMaterial inchi lookup:', e); }
  }
  // Step 10: PubChem name — validate that resolved compound actually relates to input
  if (!cid) {
    cid = await getCid(name);
    if (cid) {
      // Fetch title to verify the match is plausible
      let pcTitle = null;
      try {
        const dr = await fetchWithTimeout(PUBCHEM_REST+'/compound/cid/'+cid+'/description/JSON', {}, 5000);
        pcTitle = (await dr.json()).InformationList?.Information?.[0]?.Title || null;
      } catch(e) {}
      const titleNorm = (pcTitle||'').toLowerCase();
      const inputNorm = n;
      // Plausibility: accept only if
      //   (a) one string contains the entire other (substring match), OR
      //   (b) at least TWO tokens from the title appear in the input AND
      //       the shared tokens cover ≥50% of the input characters.
      // The old rule accepted any 4-char token shared in either direction,
      // which admitted random PubChem hits whose titles just happened to
      // contain a common chemistry word like "methyl" or "acid".
      // Normalize chemical-name suffix variants so that English synonyms
      // like "phenylethyl alcohol" and "2-phenylethanol" both reduce to
      // a comparable stem ("phenylethan-"). Strips leading positional
      // numbers and collapses "-ol"/"-yl alcohol" tail forms.
      // Also normalizes "-ic acid" → "-ate" for a whitelist of roots
      // common in perfumery so "cinnamic acid" matches "methyl cinnamate".
      const _stem = s => s
        .replace(/^\d+[-\s]*/, '')      // drop leading "2-" / "1 "
        .replace(/\s+alcohol\b/g, 'ol') // "phenylethyl alcohol" → "phenylethylol"
        .replace(/yl ?ol\b/g, 'anol')   // "phenylethylol" → "phenylethanol"
        .replace(/[\s\-]+/g, '')        // strip remaining whitespace/hyphens
        // acid↔ester: whitelisted roots (expanded for common fragrance
        // acids/esters — geranic, phenylacetic, acetic, propionic,
        // butyric, hexanoic/hex-, octanoic, decanoic, nonanoic,
        // caproic/caprylic/capric, lauric, myristic, palmitic).
        .replace(/(cinnam|benzo|salicyl|anthranil|geran|phenylacet|acet|propion|butyr|hexano|octano|decano|nonano|capro|capryl|capr|laur|myrist|palmit)icacid/g, '$1ate');

      // Stereo-descriptor consistency check. If the user's query carries
      // an explicit stereo marker (L-, D-, R-, S-, (+)-, (−)-, cis-,
      // trans-, E-, Z-, α-, β-, γ-) the PubChem title must carry a
      // compatible marker — otherwise PubChem returned the "default"
      // CID and we'd show wrong stereochemistry. The _stem normalizer
      // strips hyphens and would silently collapse "L-Linalool" onto
      // plain "Linalool", so we check markers BEFORE stemming.
      const _extractStereo = s => {
        const out = new Set();
        if (!s) return out;
        if (/(?:^|[^a-z])l(?=[- ])/i.test(s) || /l\s*-\s*\(/i.test(s) || /\(s\)/i.test(s) || /\(-\)/.test(s) || /\(−\)/.test(s)) out.add('L');
        if (/(?:^|[^a-z])d(?=[- ])/i.test(s) || /d\s*-\s*\(/i.test(s) || /\(r\)/i.test(s) || /\(\+\)/.test(s)) out.add('D');
        if (/\btrans[- ]/i.test(s) || /\(e\)/i.test(s) || /(?:^|[^a-z])e(?=[- ])/.test(s.toLowerCase())) out.add('trans');
        if (/\bcis[- ]/i.test(s) || /\(z\)/i.test(s) || /(?:^|[^a-z])z(?=[- ])/.test(s.toLowerCase())) out.add('cis');
        if (/(^|[^a-z])(?:alpha|α)(?=[- ])/i.test(s)) out.add('alpha');
        if (/(^|[^a-z])(?:beta|β)(?=[- ])/i.test(s)) out.add('beta');
        if (/(^|[^a-z])(?:gamma|γ)(?=[- ])/i.test(s)) out.add('gamma');
        return out;
      };
      const inputStereo = _extractStereo(name);
      const titleStereo = _extractStereo(pcTitle || '');
      const stereoAgrees = inputStereo.size === 0
        || [...inputStereo].every(m => titleStereo.has(m));

      let isPlausible = false;
      if (titleNorm) {
        if (titleNorm.includes(inputNorm) || inputNorm.includes(titleNorm)) {
          isPlausible = true;
        } else {
          // Stem-normalized substring check (handles -ol / -yl alcohol pairs)
          const titleStem = _stem(titleNorm);
          const inputStem = _stem(inputNorm);
          if (titleStem && inputStem && titleStem.length >= 5 && inputStem.length >= 5
              && (titleStem.includes(inputStem) || inputStem.includes(titleStem))) {
            isPlausible = true;
          } else {
            const titleTokens = titleNorm.split(/[\s\-,()\[\]]+/).filter(w => w.length >= 5);
            const inputTokens = new Set(inputNorm.split(/[\s\-,()\[\]]+/).filter(w => w.length >= 5));
            const shared = titleTokens.filter(w => inputTokens.has(w));
            const sharedChars = shared.reduce((n, w) => n + w.length, 0);
            const inputLen = Math.max(inputNorm.replace(/\s+/g,'').length, 1);
            if (shared.length >= 2 && sharedChars / inputLen >= 0.5) isPlausible = true;
          }
        }
      }
      if (isPlausible && stereoAgrees) {
        mat.record.match = makeMatch('pubchem_name', 0.80, name, pcTitle||name, pcTitle, 'PubChem name lookup', 'pubchem');
      } else if (isPlausible && !stereoAgrees) {
        // Name matches but stereo descriptor doesn't — PubChem likely
        // returned the default (racemic / unspecified) CID instead of
        // the specific enantiomer/isomer the query asked for.
        mat.record.match = makeMatch('pubchem_name', 0.60, name, pcTitle||name, pcTitle,
          'PubChem returned "' + (pcTitle||'unknown') + '" — stereochemistry may differ from query (' + [...inputStereo].join(',') + ')', 'pubchem');
      } else {
        // Low confidence — PubChem returned something but name doesn't match well
        mat.record.match = makeMatch('pubchem_name', 0.55, name, pcTitle||name, pcTitle,
          'PubChem returned "' + (pcTitle||'unknown') + '" — may not match input', 'pubchem');
      }
    }
  }
  // Step 11: SID — lowest confidence, always flag for verification
  if (!cid) {
    cid = await getCidViaSid(name);
    if (cid) mat.record.match = makeMatch('sid_lookup', 0.50, name, name, null, 'Substance DB — verify identity', 'pubchem');
  }

  if (!cid) return mat;

  mat.found = true; mat.record.identifiers.pubchem_cid = cid;
  mat.page_url = 'https://pubchem.ncbi.nlm.nih.gov/compound/'+cid;
  mat.structure_image_url = PUBCHEM_REST+'/compound/cid/'+cid+'/PNG?image_size=large';
  mat.match_info = (mat.record.match.confidence >= 0.9 ? '\u2705 ' : '\u2139\uFE0F ') + (mat.record.match.reason || 'Found via PubChem');

  // Fetch properties
  const [propsRes, synsRes, descRes] = await Promise.allSettled([
    fetchWithTimeout(PUBCHEM_REST+'/compound/cid/'+cid+'/property/MolecularFormula,MolecularWeight,ConnectivitySMILES,SMILES,IUPACName,InChI,InChIKey,XLogP,ExactMass,TPSA,HBondDonorCount,HBondAcceptorCount,RotatableBondCount,HeavyAtomCount/JSON').then(r=>r.json()).catch(()=>null),
    fetchWithTimeout(PUBCHEM_REST+'/compound/cid/'+cid+'/synonyms/JSON').then(r=>r.json()).catch(()=>null),
    fetchWithTimeout(PUBCHEM_REST+'/compound/cid/'+cid+'/description/JSON').then(r=>r.json()).catch(()=>null),
  ]);
  _applyPubchemProps(mat, propsRes.status==='fulfilled'?propsRes.value:null, synsRes.status==='fulfilled'?synsRes.value:null, descRes.status==='fulfilled'?descRes.value:null);
  if (!mat.record.identifiers.cas && mat.record.names.synonyms.length) { const cas = mat.record.names.synonyms.find(s => CAS_RE_SEARCH.test(s)); if (cas) mat.record.identifiers.cas = cas; }
  if (mat.record.identifiers.cas) {
    const _cas = mat.record.identifiers.cas;
    const _dbEntry = DB[_cas];
    if (_dbEntry) {
      // Guard: a CAS extracted from PubChem synonyms is NOT guaranteed
      // to refer to the same compound the user intended — for natural
      // mixtures and compounds whose registries list constituent or
      // related-compound CAS numbers, the first CAS-shaped synonym can
      // belong to a different material. Applying local DB overrides
      // via the wrong CAS silently overwrites odor, tenacity, IFRA
      // and FEMA fields with unrelated data. Only apply the DB merge
      // when the DB entry's canonical name shares a meaningful stem
      // with either the PubChem title or the user's search query.
      if (_dbNameMatchesContext(_dbEntry, mat.record.names.pubchem_title, name)) {
        mat.record.names.canonical = _dbEntry.name;
        applyPerfumery(mat, _cas);
      } else {
        console.warn('[scrape] synonym CAS ' + _cas + ' → DB name "' + _dbEntry.name +
          '" does not match PubChem title "' + (mat.record.names.pubchem_title||'') +
          '" or query "' + name + '" — skipping DB merge');
      }
    }
  }

  // ── Perfumery validation ──
  if (mat.record.identifiers.molecular_formula) {
    const els = mat.record.identifiers.molecular_formula.replace(/[0-9+\-\(\)]/g, '').match(/[A-Z][a-z]?/g) || [];
    if (els.some(el => !AROMA_ELEMENTS_SET.has(el))) { mat.found = false; mat._notPerfumery = true; return mat; }
  }
  const hasPerfData = mat.record.perfumery.odor_description || mat.record.perfumery.odor_type || mat.record.perfumery.note || mat.record.safety.ifra_guideline || mat.record.perfumery.tenacity || MIXTURES.has(mat.record.identifiers.cas) || (mat.record.identifiers.cas && DB[mat.record.identifiers.cas]);
  if (!hasPerfData) {
    const mw = +(mat.record.properties.molecular_weight||0), tpsa = +(mat.record.properties.tpsa||0), xlogp = +(mat.record.properties.xlogp||0), heavy = +(mat.record.properties.heavy_atoms||0);
    if (!(mw >= 80 && mw <= 400 && (!mat.record.properties.tpsa || tpsa < 60))) { mat.found = false; mat._notPerfumery = true; return mat; }
    let isPerfPC = false;
    try {
      const pvRes = await fetchWithTimeout(PUBCHEM_REST.replace('/rest/pug','')+'/rest/pug_view/data/compound/'+cid+'/JSON?heading=Use+and+Manufacturing', {}, 6000);
      isPerfPC = /fragranc|perfum|flavor|flavour|aroma\s*chemical|odor\s*agent|ifra|rifm|fema\s*\d|jecfa|essential\s*oil|fragrance\s*ingredient/i.test(JSON.stringify(await pvRes.json()));
    } catch(e) { if (e?.name !== 'AbortError') console.warn('scrapeMaterial use+manufacturing fetch:', e); }
    if (!isPerfPC && mw >= 80 && mw <= 400 && xlogp >= 0 && xlogp <= 6 && tpsa < 60 && heavy >= 5 && heavy <= 30) {
      isPerfPC = /fragranc|perfum|aroma|flavor|flavour|essential oil|fema|ifra|odor|scent/i.test(mat.record.names.synonyms.join(' ').toLowerCase());
    }
    if (!isPerfPC) { mat.found = false; mat._notPerfumery = true; return mat; }
    mat.record.metadata.is_external = true;
  }

  try { _computeClassification(mat); } catch(e) { console.warn('_computeClassification (pubchem):', e); }

  // Fetch GHS — tag the extracted codes with the CID they belong to
  // so getGHSPictograms can drop them if the material's CID later
  // changes (prevents stale hazard codes from a re-scraped material).
  fetchWithTimeout('https://pubchem.ncbi.nlm.nih.gov/rest/pug_view/data/compound/'+cid+'/JSON?heading=GHS+Classification', {}, 8000)
    .then(r=>r.json()).then(d => { mat._ghsCodes = { cid, codes: _extractGHSFromMarkup(d.Record?.Section||[]) }; mat._ghsPictograms=null; renderResults(); })
    .catch(e => { if (e?.name !== 'AbortError') console.warn('GHS fetch (pubchem path):', e); });

  return mat;
}

// SID→CID lookup
async function getCidViaSid(name) {
  const key = 'sid_'+name.toLowerCase();
  if (pcCache[key] !== undefined) return pcCache[key];
  try {
    const r = await fetchWithTimeoutRetry(`${PUBCHEM_REST}/substance/name/${encodeURIComponent(name)}/cids/JSON?cids_type=standardized`);
    const d = await r.json();
    const cid = d.InformationList?.Information?.[0]?.CID?.[0] || null;
    pcCache[key] = cid;
    return cid;
  } catch(e) {
    // Don't cache timeout results — allow retry on next search.
    if (e?.name === 'AbortError') return null;
    pcCache[key] = null;
    return null;
  }
}


// Whitelist: only keep sections matching these keywords (case-insensitive)
const KEEP_KEYWORDS = [
  // Identifiers
  "name", "identifier", "cas", "iupac", "synonym",
  "molecular formula", "molecular weight", "fema",
  // Physical & Chemical Properties
  "propert", "boiling point", "melting point", "flash point",
  "density", "vapor pressure", "refractive index", "solubility",
  "logp", "xlogp", "log p", "surface tension", "viscosity",
  "optical rotation", "henry", "dissociation",
  "ph", "pka", "auto-ignition", "flammab", "stability", "decompos",
  // Structure
  "structure", "2d",
  // Safety & Hazards
  "safety", "hazard", "ghs", "pictogram", "signal",
  "precaution", "toxicol", "toxicity", "lethal", "ld50", "lc50",
  "irritat", "sensitiz", "mutagen", "carcinog", "nfpa",
  "exposure", "threshold", "osha", "niosh", "acgih",
  "acute effect", "chronic effect", "cleanup", "disposal",
  // Pharmacology (skin/fragrance relevant)
  "pharmacol", "absorption", "metabolism", "skin", "dermal",
  // Appearance & Odor
  "color", "appearance", "odor", "smell", "taste", "physical description",
  "identification",
  // Use & Manufacturing
  "use", "manufacturing", "formulation", "preparation",
  "consumer product", "industrial", "storage", "impurit",
  // Spectroscopy (analytical)
  "spectro", "spectrum", "spectra", "gc-ms", "nmr", "mass spec", "ir spec",
  // Environmental fate
  "environment", "biodegradation", "bioconcentration",
  "soil adsorption", "atmospheric fate",
  // Food & Flavor
  "food", "flavor", "flavour", "fragrance", "aroma", "cosmetic"
];
// Always skip these even if they match keep keywords
const FORCE_SKIP = [
  "patent", "literature", "pubmed", "depositor", "vendor", "supplier",
  "protein target", "protein bound", "bioassay", "biological test",
  "taxonomy", "crystal structure", "3d conformer",
  "record description", "summary information",
  "disorder", "disease", "pathway", "related record", "wikipedia",
  "drug and medication",
  "canonical smiles", "isomeric smiles", "inchi"
];
// Word-boundary skip patterns (to avoid "gene" matching "general")
const FORCE_SKIP_REGEX = [/\bgene\b/, /\bgenes\b/];
// PubChem section filtering — used only by extractAllSections() to decide
// which TOC sections survive into the flattened pubchem_sections map.
// Not part of the search/match pipeline. Not directly called from any
// other site.
function isForceSkipped(text) {
  const h = text.toLowerCase();
  if (FORCE_SKIP.some(k => h.includes(k))) return true;
  if (FORCE_SKIP_REGEX.some(r => r.test(h))) return true;
  return false;
}
function isKeepMatch(text) {
  return KEEP_KEYWORDS.some(k => text.toLowerCase().includes(k));
}

// Niche helper — used by:
//   1) prefetchAll (background PubChem section prefetch)
//   2) loadPubchemData (on-demand "Complete PubChem Data" card expand)
//   3) downloadJSON (best-effort retry inside the per-batch enrichment loop)
// Not part of the core search/match/filter pipeline. Returns the raw
// flattened {heading: [strings]} shape; future structured-export work
// would replace this with a typed PUG View walker.
// Walk raw PubChem sections to find the FEMA Number (3-4 digit string
// that extractAllSections discards because of its >5-char threshold).
// Returns the FEMA number string or null.
function _extractFemaNumber(sections, depth=0) {
  if (!sections || depth > 5) return null;
  for (const sec of sections) {
    if (/^fema\s+number$/i.test(sec.TOCHeading || '')) {
      for (const info of (sec.Information || [])) {
        if (info.Value?.Number?.length) return String(info.Value.Number[0]);
        if (info.Value?.StringWithMarkup) {
          for (const sm of info.Value.StringWithMarkup) {
            if (sm.String && /^\d{3,5}$/.test(sm.String.trim())) return sm.String.trim();
          }
        }
      }
    }
    if (sec.Section) {
      const found = _extractFemaNumber(sec.Section, depth+1);
      if (found) return found;
    }
  }
  return null;
}

// Extract all PUG View sections recursively (whitelist approach)
function extractAllSections(sections, prefix="", depth=0) {
  if (depth > 4) return {};
  const result = {};
  for (const sec of sections) {
    const heading = prefix ? `${prefix} > ${sec.TOCHeading}` : sec.TOCHeading;
    // Skip if heading OR full path matches force skip
    const skipped = isForceSkipped(sec.TOCHeading) || isForceSkipped(heading);
    // Keep if heading OR full path matches keep keywords (and not force skipped)
    const keepThis = !skipped && (isKeepMatch(sec.TOCHeading) || isKeepMatch(heading));
    if (sec.Information && keepThis) {
      const items = [];
      const seen = new Set();
      for (const info of sec.Information) {
        if (items.length >= 30) break;
        if (info.Value?.StringWithMarkup) {
          for (const sm of info.Value.StringWithMarkup) {
            if (sm.String && sm.String.length > 5 && !seen.has(sm.String)) {
              seen.add(sm.String);
              items.push(sm.String);
            }
          }
        }
      }
      if (items.length) result[heading] = items;
    }
    // Always recurse into sub-sections (parent may not match but child might)
    if (sec.Section) {
      Object.assign(result, extractAllSections(sec.Section, heading, depth+1));
    }
  }
  return result;
}

// Cross-compound contamination guard. Returns true when the local DB
// entry's canonical name shares a meaningful stem with either the
// PubChem title or the user's raw search input. Used before routing
// the synonym-derived CAS to applyPerfumery so mixtures / related
// compounds can't silently overwrite odor / IFRA / FEMA fields with
// data from an unrelated material.
function _dbNameMatchesContext(dbEntry, pubTitle, searchInput) {
  if (!dbEntry || !dbEntry.name) return false;
  const db = String(dbEntry.name).toLowerCase();
  const pt = String(pubTitle || '').toLowerCase();
  const si = String(searchInput || '').toLowerCase();
  if (pt && (pt.includes(db) || db.includes(pt))) return true;
  if (si && (si.includes(db) || db.includes(si))) return true;
  const tokenize = s => s.split(/[^a-z0-9]+/).filter(w => w.length >= 5);
  const dbTokens = new Set(tokenize(db));
  if (!dbTokens.size) return false;
  for (const t of tokenize(pt)) if (dbTokens.has(t)) return true;
  for (const t of tokenize(si)) if (dbTokens.has(t)) return true;
  return false;
}

function applyPerfumery(mat, cas) {
  const rec = mat.record, id = rec.identifiers, pf = rec.perfumery, sf = rec.safety;
  let pdb = DB[cas];
  if (!pdb && rec.names.canonical) {
    const fallbackCas = NAME_TO_CAS[normalizeKey(rec.names.canonical)];
    if (fallbackCas) { pdb = DB[fallbackCas]; cas = fallbackCas; id.cas = cas; }
  }
  if (!pdb) return;
  // Non-destructive overlay: only overwrite a field when the local DB
  // actually has a truthy value for it. This protects PubChem-sourced
  // data (e.g. odor_description extracted from a Physical Description
  // section) from being clobbered back to null when applyPerfumery is
  // re-run on a material whose local DB entry has empty odor fields
  // (e.g. Dipropylene Glycol, Isopropyl Myristate).
  const _assign = (target, key, value) => { if (value) target[key] = value; };
  _assign(pf, 'odor_description', pdb.odor?.description);
  _assign(pf, 'odor_type',        pdb.odor?.type);
  _assign(pf, 'odor_strength',    pdb.odor?.strength);
  _assign(pf, 'note',             pdb.note);
  _assign(pf, 'tenacity',         pdb.performance?.tenacity);
  _assign(pf, 'tenacity_hours',   pdb.performance?.duration);
  _assign(sf, 'ifra_guideline',   pdb.safety?.ifra);
  _assign(sf, 'usage_levels',     pdb.safety?.usage);
  if (Array.isArray(pdb.blends_with) && pdb.blends_with.length) pf.blends_with = pdb.blends_with;
  if (pdb.fema) id.fema = pdb.fema;
  // Pre-populate PubChem link + 2D structure image from curated CID when
  // the DB has one. Lets the card show the molecule picture + PubChem
  // deep-link INSTANTLY on first render (no CAS→CID network round-trip),
  // and bypasses the flaky PubChem name-lookup path (which returns the
  // wrong stereoisomer for some oxide CAS numbers — e.g. 60047-17-8 →
  // furanoid CID instead of pyranoid). _enrichPubchem still runs for
  // properties/synonyms/GHS, but skips its own getCid() when a CID is
  // already set here.
  if (pdb.pubchem_cid) {
    id.pubchem_cid = pdb.pubchem_cid;
    if (!mat.page_url) mat.page_url = pdb.pubchem_url || ('https://pubchem.ncbi.nlm.nih.gov/compound/' + pdb.pubchem_cid);
    if (!mat.structure_image_url) mat.structure_image_url = PUBCHEM_REST + '/compound/cid/' + pdb.pubchem_cid + '/PNG?image_size=large';
  }
  if (pdb.iupac) id.iupac = pdb.iupac;
  if (pdb.formula) id.molecular_formula = pdb.formula;
  if (pdb.weight) rec.properties.molecular_weight = pdb.weight;
  // Structural identifiers + molecular properties + GHS hazard codes —
  // pre-populated in the DB from a one-time PubChem scrape so the
  // card's long-props section + hazard pictograms render instantly on
  // mobile without 3 additional PubChem round-trips. _enrichPubchem
  // still runs (can refresh with newer PubChem data), but it no longer
  // blocks first paint.
  if (pdb.smiles) id.canonical_smiles = pdb.smiles;
  if (pdb.isomeric_smiles) id.isomeric_smiles = pdb.isomeric_smiles;
  if (pdb.inchi) id.inchi = pdb.inchi;
  const _numFill = (dst, key) => {
    const v = pdb[key];
    if (v === undefined || v === null || String(v).trim() === '') return;
    rec.properties[dst] = v;
  };
  _numFill('xlogp',          'xlogp');
  _numFill('exact_mass',     'exact_mass');
  _numFill('tpsa',            'tpsa');
  _numFill('hbond_donor',     'hbond_donor');
  _numFill('hbond_acceptor',  'hbond_acceptor');
  _numFill('rotatable_bonds', 'rotatable_bonds');
  _numFill('heavy_atoms',     'heavy_atoms');
  if (Array.isArray(pdb.ghs_codes) && pdb.ghs_codes.length && !mat._ghsCodes) {
    // Tag with pubchem_cid so the CID-consistency check in
    // getGHSPictograms accepts it once _enrichPubchem runs.
    mat._ghsCodes = { cid: pdb.pubchem_cid ? Number(pdb.pubchem_cid) : null, codes: pdb.ghs_codes.slice() };
    mat._ghsPictograms = null;
  }
  if (!mat.match_info) mat.match_info = "✅ CAS match (" + cas + ")";
}

async function getCid(name) {
  const key = 'cid_'+name.toLowerCase();
  if (pcCache[key] !== undefined) return pcCache[key];
  try {
    const r = await fetchWithTimeoutRetry(`${PUBCHEM_REST}/compound/name/${encodeURIComponent(name)}/cids/JSON`);
    const d = await r.json();
    const cid = d.IdentifierList?.CID?.[0] || null;
    // Cache confirmed result (CID found or PubChem said "not found").
    // Missing status field is treated as confirmed null.
    pcCache[key] = cid;
    return cid;
  } catch(e) {
    // Timeout / network error — don't cache so a later retry can
    // succeed when the network recovers. The lookup just returns null
    // for this call.
    if (e?.name === 'AbortError') return null;
    pcCache[key] = null;
    return null;
  }
}

let pcGroupId = 0;
// Niche helper — only called from loadPubchemData() to render the
// expanded "Complete PubChem Data" sub-panel inside a card. Not used
// by the main JSON/CSV export, the search pipeline, or filters.
function renderPubchemSections(sections) {
  const grouped = {};
  for (const [heading, items] of Object.entries(sections)) {
    const top = heading.includes(' > ') ? heading.split(' > ')[0] : heading;
    if (!grouped[top]) grouped[top] = [];
    grouped[top].push({heading, items});
  }
  let html = '';
  for (const [topH, subs] of Object.entries(grouped)) {
    // Build body content first to check if it's empty
    let bodyHtml = '';
    for (const {heading, items} of subs) {
      let display = heading.includes(' > ') ? heading.split(' > ').pop() : heading;
      // Rename "FEMA Flavor Profile" to "Flavor Profile" to avoid confusion with FEMA number
      display = display.replace(/^FEMA\s+Flavor\s+Profile$/i, 'Flavor Profile');
      const cleaned = [];
      for (const item of items) {
        if (cleaned.length >= 20) break;
        if (item.startsWith('http')) continue;
        const c = item.replace(/https?:\/\/\S+/g,'').trim();
        if (c && c.length >= 3) cleaned.push(c);
      }
      if (!cleaned.length) continue;
      bodyHtml += `<div class="pc-sub">`;
      if (display !== topH) bodyHtml += `<div class="pc-sub-title">${esc(display)}</div>`;
      bodyHtml += `<div class="pc-sub-content">`;
      // Split into short (< 80 chars) and long items
      const short = cleaned.filter(c => c.length < 80);
      const long = cleaned.filter(c => c.length >= 80);
      if (short.length > 1) {
        bodyHtml += `<p>${short.map(c=>esc(c)).join(', ')}</p>`;
      } else {
        for (const c of short) bodyHtml += `<p>${esc(c)}</p>`;
      }
      for (const c of long) {
        bodyHtml += `<p>${esc(c.length>400?c.substring(0,400)+'…':c)}</p>`;
      }
      bodyHtml += `</div></div>`;
    }
    // Skip entire group if body is empty
    if (!bodyHtml) continue;
    const gid = pcGroupId++;
    html += `<div class="pc-group">`;
    html += `<div class="pc-group-header" onclick="togglePcGroup(${gid})">
      <span>${esc(topH)}</span>
      <span class="pc-arrow" id="pcArrow${gid}">▶</span>
    </div>`;
    html += `<div class="pc-group-body" id="pcBody${gid}">${bodyHtml}</div></div>`;
  }
  return html;
}

function togglePcGroup(gid) {
  const body = document.getElementById("pcBody"+gid);
  const arrow = document.getElementById("pcArrow"+gid);
  const header = body.previousElementSibling;
  const isOpening = !body.classList.contains("open");
  if (isOpening) {
    const parent = body.closest('.pubchem-data');
    if (parent) {
      parent.querySelectorAll('.pc-group-body.open').forEach(el => {
        el.classList.remove("open");
        const otherId = el.id.replace("pcBody","");
        const otherArrow = document.getElementById("pcArrow"+otherId);
        if (otherArrow) otherArrow.classList.remove("open");
      });
    }
  }
  body.classList.toggle("open");
  arrow.classList.toggle("open");
  if (isOpening && header) {
    setTimeout(() => header.scrollIntoView({behavior:'smooth', block:'start'}), 50);
  }
}

// ===== Rendering =====
// ── Field-separation helpers (display-only) ──
// A handful of curated DB entries mix axis dimensions into the wrong
// field — Benzyl Benzoate's odor description ends with "— mainly
// fixative/solvent", its tenacity field is literally "Fixative",
// its safety usage ends with "(also used as solvent/fixative)", and
// similar patterns appear on Benzyl Salicylate / Benzyl Alcohol. These
// helpers clean up the DISPLAY text only. They do NOT touch the raw
// record fields the classifier reads — Function / Type / Use /
// Regulatory detection still sees the original text, so filter
// counts, FILTER_CACHE, and exports are unchanged.
function _cleanOdorDescription(s, source) {
  if (!s) return s;
  // Strip trailing "— mainly fixative/solvent" / "— mostly a solvent" /
  // "— fixative" / "— denaturant and fixative" style suffixes. Function
  // words are Function-axis values and should not appear inside an odor
  // description. The alternation accepts '/', '&', ',', and 'and' as
  // separators between chained function words.
  const FW = '(?:fixative|solvent|carrier|diluent|denaturant|plasticizer|emollient|preservative)';
  const re = new RegExp('\\s*[—\\-–]\\s*(?:mainly\\s+|mostly\\s+|primarily\\s+|also\\s+|used\\s+as\\s+|acts\\s+as\\s+)*(?:a\\s+|an\\s+)?' + FW + '(?:\\s*(?:[\\/&,]|and)\\s*' + FW + ')*\\s*$', 'i');
  const cleaned = s.replace(re, '').trim();
  // PubChem-sourced odor descriptions are often generic adjectives
  // ("Pleasant", "Mild", "Characteristic odor", …) that carry no
  // perfumery information. Suppress them so the card falls through
  // to the "—" placeholder instead of showing noise.
  //
  // Multi-word check: a description made entirely of generic
  // adjectives (e.g. "Pleasant mild") is still noise. Only suppress
  // when EVERY non-filler word is in the generic set — a single
  // meaningful token like "floral" anywhere ("Mild floral") keeps
  // the description as legitimate odor copy.
  if (source === 'PubChem' && cleaned) {
    const GENERIC = new Set([
      'pleasant','mild','strong','sweet','faint','odorless','odourless',
      'none','pungent','aromatic','characteristic','slight','slightly',
      'weak','intense','nice','agreeable','fragrant','fresh','clean',
      'distinct','noticeable','typical','light'
    ]);
    const FILLER = new Set(['odor','odour','smell','scent','and','a','an','the','with','of']);
    const tokens = cleaned.toLowerCase().replace(/[.,;:!?]/g, '').split(/\s+/).filter(Boolean);
    const meaningful = tokens.filter(t => !FILLER.has(t));
    if (meaningful.length && meaningful.every(t => GENERIC.has(t))) return '';
  }
  return cleaned;
}
function _cleanPerformanceTenacity(s) {
  if (!s) return s;
  const t = s.trim();
  // If the tenacity field is literally just a function word, replace
  // it with a performance-style description. If it's "N/A", return
  // an empty string so the card falls through to the "—" placeholder.
  if (/^fixative$/i.test(t)) return 'Low odor impact — acts mainly as a fixative';
  if (/^solvent$/i.test(t))  return 'Minimal performance contribution — used as a solvent';
  if (/^carrier$/i.test(t))  return 'Minimal performance contribution — used as a carrier';
  if (/^n\/a$/i.test(t))     return '';
  return s;
}
function _cleanTenacityHours(s) {
  if (!s) return s;
  // Strip trailing parentheticals that are function-word leakage
  // (e.g. "N/A (fixative)", "~48h (fixative)"). After stripping, if
  // the remaining text is just "N/A" or empty, return '' so the card
  // doesn't render a meaningless placeholder line.
  const stripped = s.replace(/\s*\(\s*(?:fixative|solvent|carrier|diluent|denaturant|plasticizer|emollient|preservative)\s*\)\s*$/i, '').trim();
  if (!stripped || /^n\/a$/i.test(stripped)) return '';
  return stripped;
}
function _cleanSafetyUsage(s) {
  if (!s) return s;
  // Strip parentheticals that specifically mention function words as
  // the material's "other use" — they belong on the Function axis,
  // not inside a safety/usage note. Legitimate safety parentheticals
  // ("(polycyclic musk; environmental persistence)") are preserved
  // because they don't match the "(also used as …)" pattern.
  return s
    .replace(/\s*\(\s*(?:also\s+)?used\s+as\s+[^)]*\)/gi, '')
    .replace(/\s*\(\s*also\s+[^)]*(?:solvent|fixative|carrier|diluent|denaturant|plasticizer|emollient)[^)]*\)/gi, '')
    .trim();
}
function _cleanBlendsWith(arr) {
  if (!Array.isArray(arr) || !arr.length) return [];
  // Strip entries that describe the material's function instead of
  // naming a blend partner. "All — universal fixative/solvent" is not
  // a blend partner; "Universal" / "N/A" are not blend partners; any
  // entry whose text contains a function word is suspect. Accepts
  // both legacy string entries and enhanced {label,…} objects; the
  // object form is passed through so downstream renderers can pick
  // up strength/source annotations.
  const FW = /\b(fixative|solvent|carrier|diluent|denaturant|plasticizer|emollient|preservative|universal)\b/i;
  return arr.filter(x => {
    const t = _blendEntryLabel(x).trim();
    if (!t) return false;
    if (/^(n\/a|none|all|any)$/i.test(t)) return false;
    if (FW.test(t)) return false;
    return true;
  });
}
function renderResults() {
  const div = document.getElementById("results");
  // Save open states before re-render (skip if just searched)
  if (!renderResults._forceCollapse) {
    results.forEach((mat, idx) => {
      const body = document.getElementById("body"+idx);
      if (body) mat._open = body.classList.contains("open");
    });
  }
  renderResults._forceCollapse = false;
  document.getElementById("statusBar").style.display = results.length?"flex":"none";
  // Default status text is "N material(s)". If the most recent doSearch
  // attached a batch summary (ambiguous / not-perfumery counts), append it
  // after a bullet separator so the user sees both pieces of information.
  // One-shot consumption: after a summary is used for one render, clear
  // renderResults._statusOverride so subsequent background re-renders
  // (e.g. _enrichPubchem callbacks) don't re-apply a stale summary from
  // an earlier search.
  // On the default (non-override) path, also append compact quick stats
  // ("X banned", "Y external") for the current result set. These are
  // computed lazily here; no new state, no shared mutation.
  const _baseStatus = `${results.length} material${results.length!==1?'s':''}`;
  const _override = renderResults._statusOverride;
  if (typeof _override === 'string' && _override.trim()) {
    document.getElementById("statusText").textContent = `${_baseStatus} • ${_override}`;
    renderResults._statusOverride = null;
  } else {
    const _bannedCount   = results.filter(r => !!getBanStatus(r)).length;
    const _externalCount = results.filter(r => !!r.record?.metadata?.is_external).length;
    const _stats = [];
    if (_bannedCount)   _stats.push(`${_bannedCount} banned`);
    if (_externalCount) _stats.push(`${_externalCount} external`);
    document.getElementById("statusText").textContent = _stats.length
      ? `${_baseStatus} • ${_stats.join(' • ')}`
      : _baseStatus;
  }
  // Download bar always visible (contains Formulate link)

  const cards = [];
  results.forEach((mat,idx) => {
   try {
    const rec = mat.record, id = rec.identifiers, nm = rec.names, pr = rec.properties, pf = rec.perfumery, sf = rec.safety, cls = rec.classification, mtch = rec.match;
    // ── Card classification display (single precedence per axis) ──
    // Six independent axes — Type, Function, Use, Odor Family, Regulatory,
    // Source — each rendered from the same source of truth used by
    // FILTER_CACHE / matchesAllFilters so cards and filter counts can never
    // disagree. FILTER_CACHE is preferred for local-DB CAS hits; the runtime
    // classifier is used as the fallback for external / PubChem-only results.
    const _displayMaterialType = cls.material_type || classifyMaterialType(mat) || null;
    const _fcCard = id.cas ? FILTER_CACHE.get(id.cas) : null;
    const _rawIndTags = (cls.industry_tags && cls.industry_tags.length) ? cls.industry_tags : (classifyUses(mat) || []);
    const displayTags = _filterDisplayTags(_rawIndTags);
    const displayMatLabel = TYPE_LABELS[_displayMaterialType] || '';
    const displayFunctions = _fcCard
      ? [...(_fcCard.functions || [])]
      : (Array.isArray(cls.functions) && cls.functions.length ? cls.functions : classifyFunctionsFromRecord(rec));
    // Dedup the Type label against the Function labels (case-insensitive).
    // Materials whose Type and Function are literally the same word —
    // ethanol → Type "Solvent" + Function "solvent", squalane → Type
    // "Carrier" + Function "carrier" — used to render as "Solvent • Solvent"
    // / "Carrier • Carrier". Build a deduped joined-label list once and
    // reuse it in the .card-meta-row template below.
    const _typeFuncParts = [];
    {
      const seen = new Set();
      const _addPart = lbl => { if (!lbl) return; const k = lbl.toLowerCase(); if (seen.has(k)) return; seen.add(k); _typeFuncParts.push(lbl); };
      _addPart(displayMatLabel);
      for (const f of displayFunctions) _addPart(FUNCTION_LABELS[f] || f);
    }
    const _typeFuncJoined = _typeFuncParts.join(' • ');
    // Regulatory display: normalize through _normalizeRegulatoryToken
    // so a legacy-imported record carrying 'ifra_limited' (or any
    // variant casing) renders as 'Regulated' on the badge, not as the
    // legacy token. _fcCard is already normalized at build time; the
    // PubChem-only / external fallback path isn't, so the normalizer
    // runs on every element regardless of source.
    const displayRegulatory = (_fcCard
      ? [...(_fcCard.regulatory || [])]
      : (Array.isArray(cls.regulatory) && cls.regulatory.length ? cls.regulatory : classifyRegulatory(mat))
    ).map(_normalizeRegulatoryToken).filter(Boolean);
    const displaySource = _fcCard ? _fcCard.source : (cls.source || classifySource(mat));
    // Step 5 axis — read precomputed primary / secondary / facets from
    // FILTER_CACHE for local-DB hits, fall back to record.classification
    // for PubChem-only / external results.
    const displayPrimaryFamilies = _fcCard
      ? [...(_fcCard.primaryFamilies || [])]
      : (Array.isArray(cls.primaryFamilies) ? cls.primaryFamilies : []);
    const displaySecondaryFamilies = _fcCard
      ? [...(_fcCard.secondaryFamilies || [])]
      : (Array.isArray(cls.secondaryFamilies) ? cls.secondaryFamilies : []);
    const displayFacets = _fcCard
      ? [...(_fcCard.facets || [])]
      : (Array.isArray(cls.facets) ? cls.facets : []);
    // Display-only field cleaners (see _cleanOdorDescription /
    // _cleanPerformanceTenacity / _cleanSafetyUsage defined near the top
    // of the Rendering module). These normalize text that mixes
    // dimensions into the wrong curated field — e.g. Benzyl Benzoate's
    // odor description ends with "— mainly fixative/solvent", its
    // tenacity is literally "Fixative", etc. Only the rendered strings
    // change; the underlying record.perfumery.* / record.safety.* fields
    // the classifier reads are untouched.
    const _odorDescClean = _cleanOdorDescription(pf.odor_description, pf.odor_source);
    const _tenacityClean = _cleanPerformanceTenacity(pf.tenacity);
    const _tenacityHoursClean = _cleanTenacityHours(pf.tenacity_hours);
    const _usageLevelsClean = _cleanSafetyUsage(sf.usage_levels);
    // Curated + auto-mirrored reverse partners, cleaned of function-word noise.
    const _blendsWithClean = _cleanBlendsWith(_mergedBlendPartners(id.cas, pf.blends_with));
    const nl = (pf.note||"").toLowerCase();
    let badges = "";
    if (nl.includes("top")) badges += `<span class="badge badge-top">Top</span>`;
    if (nl.includes("middle")) badges += `<span class="badge badge-mid">Middle</span>`;
    if (nl.includes("base")) badges += `<span class="badge badge-base">Base</span>`;

    const ids = [
      id.cas?`<p><code>CAS</code> ${esc(id.cas)}</p>`:"",
      id.fema?`<p><code>FEMA</code> ${esc(id.fema)}</p>`:"",
      id.iupac?`<p><code>IUPAC</code> ${esc(id.iupac)}</p>`:"",
      id.molecular_formula?`<p><code>Formula</code> ${esc(id.molecular_formula)}</p>`:"",
    ].join('');
