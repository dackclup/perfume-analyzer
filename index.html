// Background-only helper — called from doSearch() at the very end of
// each search to warm structure-image and PubChem section caches for
// each card. Failure is silent and tolerated; the card UI continues
// to work without prefetched data. Not part of the search/match/filter
// pipeline.
function prefetchAll() {
  results.forEach((mat, idx) => {
    if (!mat.found) return;
    // Prefetch structure image
    if (mat.structure_image_url) {
      const img = new Image();
      img.src = mat.structure_image_url;
    }
    // Prefetch PubChem pug_view data in background
    if (mat.record.identifiers.pubchem_cid && !mat._prefetched) {
      mat._prefetched = true;
      mat._loadPubchem = fetchWithTimeout(`https://pubchem.ncbi.nlm.nih.gov/rest/pug_view/data/compound/${mat.record.identifiers.pubchem_cid}/JSON`, {}, 15000)
        .then(r => r.json())
        .then(d => {
          const sections = d.Record?.Section || [];
          mat.record.metadata.pubchem_sections = extractAllSections(sections);
          if (!mat.record.identifiers.fema) {
            const _fn = _extractFemaNumber(sections);
            if (_fn) mat.record.identifiers.fema = _fn;
          }
          // Re-classify with PubChem-enriched data: newly-found FEMA number
          // and pubchem_sections with food/flavor signals.
          try { _computeClassification(mat); } catch(e) { console.warn('_computeClassification (prefetch):', e); }
          // Merge PubChem odor/description for compounds without local perfumery data.
          // Reject single-word / generic adjectives like "Pleasant", "Mild",
          // "Characteristic odor" — they carry no perfumery information AND
          // they would make hasRealOdor true inside the classifier, flipping
          // materials like Ethanol from Type=solvent to Type=aroma_chemical
          // after prefetch. Keep only descriptions that look genuinely
          // informative (longer than a single adjective, or containing a
          // specific note word).
          const _isUsefulPubchemOdor = (s) => {
            if (!s) return false;
            const t = s.trim();
            if (t.length < 15) return false;
            if (/^(pleasant|mild|strong|sweet|faint|odorless|odourless|none|pungent|aromatic|characteristic|mild\s+odor|pleasant\s+odor|sweet\s+odor|characteristic\s+odor|no\s+odor|odour\s+none)\.?$/i.test(t)) return false;
            return true;
          };
          if (!mat.record.perfumery.odor_description) {
            for (const [heading, items] of Object.entries(mat.record.metadata.pubchem_sections)) {
              const hl = heading.toLowerCase();
              if (hl.includes('odor') && !hl.includes('threshold') && items.length) {
                const first = items.find(_isUsefulPubchemOdor);
                if (first) {
                  mat.record.perfumery.odor_description = first;
                  mat.record.perfumery.odor_source = 'PubChem';
                }
                break;
              }
            }
          }
          if (!mat.record.perfumery.odor_description) {
            for (const [heading, items] of Object.entries(mat.record.metadata.pubchem_sections)) {
              const hl = heading.toLowerCase();
              if (hl.includes('physical description') && items.length) {
                const odorItem = items.find(i => /odor|smell|aroma|scent/i.test(i) && _isUsefulPubchemOdor(i));
                if (odorItem) {
                  mat.record.perfumery.odor_description = odorItem;
                  mat.record.perfumery.odor_source = 'PubChem'; break;
                }
              }
            }
          }
          renderResults();
        })
        .catch(e => { if (e?.name !== 'AbortError') console.warn('prefetchAll pug_view:', e); });
    }
  });
}

function collapseSubSections(cardBody) {
  cardBody.querySelectorAll('.pc-group-body.open').forEach(el => {
    el.classList.remove("open");
    const id = el.id.replace("pcBody","");
    const a = document.getElementById("pcArrow"+id);
    if (a) a.classList.remove("open");
  });
  const pcData = cardBody.querySelector('.pubchem-data.open');
  if (pcData) {
    pcData.classList.remove("open");
    const toggle = cardBody.querySelector('.pubchem-toggle');
    if (toggle) toggle.textContent = "▶ Complete PubChem Data";
  }
}
// ===== Blends-with chip click handlers =====
//
// Resolved material chip → add that material as a result card.
// If already in results, scroll to its card instead of re-searching.
function addBlendSearch(name) {
  if (!name) return;
  const nl = String(name).toLowerCase();
  const existingIdx = results.findIndex(r => (r.record?.names?.canonical || '').toLowerCase() === nl);
  if (existingIdx >= 0) {
    // Already in results — open and scroll to the existing card.
    const body = document.getElementById("body"+existingIdx);
    if (body && !body.classList.contains("open")) toggleCard(existingIdx);
    body?.closest('.card')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }
  if (typeof doSearch === 'function') doSearch(name);
}

// Group-label chip → activate the matching Family filter drawer chip
// and scroll the filter into view so the user can browse the candidate
// partners the group represents. The legacy 7-bucket Edwards "primary"
// filter was removed; group chips now route exclusively to the
// 14-bucket Sub-family axis (which the UI labels just "Family").
function toggleBlendFilter(filterKind, token) {
  if (!token) return;
  let sel = null;
  if (filterKind === 'subfamily' || filterKind === 'primary') {
    sel = `#subFamilyFilters .odor-tag[data-subfam="${token}"]`;
  }
  const el = sel ? document.querySelector(sel) : null;
  if (!el) return;
  el.click();
  // Make sure the filter drawer is visible so the user sees the toggle.
  const drawer = document.getElementById('filterSection') || document.getElementById('filterDrawer');
  (drawer || el)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleCard(idx) {
  const body = document.getElementById("body"+idx);
  if (!body) return;
  const arrow = document.getElementById("arrow"+idx);
  const card = body.closest('.card');
  const isOpening = !body.classList.contains("open");
  // Close all other cards and their sub-sections
  if (isOpening) {
    document.querySelectorAll('.card-body.open').forEach(el => {
      collapseSubSections(el);
      el.classList.remove("open");
      const otherId = el.id.replace("body","");
      const otherArrow = document.getElementById("arrow"+otherId);
      if (otherArrow) otherArrow.textContent = "▶";
    });
  } else {
    // Closing this card — collapse its sub-sections
    collapseSubSections(body);
  }
  body.classList.toggle("open");
  arrow.textContent = body.classList.contains("open") ? "▼" : "▶";
  if (isOpening && card) {
    setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 50);
  }
}

// Card-UI / print-only helper — wired to the "▶ Complete PubChem Data"
// toggle inside each card body and also called by preparePrint() to
// load all sections before generating a PDF. Not part of the main JSON
// or CSV export, search pipeline, or filter logic.
async function loadPubchemData(idx) {
  const toggle = document.getElementById("pcToggle"+idx);
  const dataDiv = document.getElementById("pcData"+idx);
  
  // Toggle open/close if already loaded
  if (dataDiv.dataset.loaded) {
    const isOpening = !dataDiv.classList.contains("open");
    if (!isOpening) {
      // Closing — collapse all sub-sections inside
      dataDiv.querySelectorAll('.pc-group-body.open').forEach(el => {
        el.classList.remove("open");
        const id = el.id.replace("pcBody","");
        const a = document.getElementById("pcArrow"+id);
        if (a) a.classList.remove("open");
      });
    }
    dataDiv.classList.toggle("open");
    toggle.textContent = dataDiv.classList.contains("open") ? "▼ Complete PubChem Data" : "▶ Complete PubChem Data";
    if (isOpening) {
      setTimeout(() => toggle.scrollIntoView({behavior:'smooth', block:'start'}), 50);
    }
    return;
  }
  
  const mat = results[idx];
  if (!mat.record.identifiers.pubchem_cid) return;
  
  toggle.textContent = "⏳ Loading...";
  try {
    // Use prefetched data if available, otherwise fetch now
    if (!mat.record.metadata.pubchem_sections || !Object.keys(mat.record.metadata.pubchem_sections).length) {
      const r = await fetchWithTimeout(`https://pubchem.ncbi.nlm.nih.gov/rest/pug_view/data/compound/${mat.record.identifiers.pubchem_cid}/JSON`, {}, 10000);
      const d = await r.json();
      const sections = d.Record?.Section || [];
      mat.record.metadata.pubchem_sections = extractAllSections(sections);
      if (!mat.record.identifiers.fema) {
        const _fn = _extractFemaNumber(sections);
        if (_fn) mat.record.identifiers.fema = _fn;
      }
    }
    
    dataDiv.innerHTML = renderPubchemSections(mat.record.metadata.pubchem_sections);
    dataDiv.dataset.loaded = "1";
    dataDiv.classList.add("open");
    toggle.textContent = "▼ Complete PubChem Data";
    setTimeout(() => toggle.scrollIntoView({behavior:'smooth', block:'start'}), 50);
  } catch(e) {
    toggle.textContent = "❌ Failed to load — click to retry";
    dataDiv.dataset.loaded = "";
  }
}

function delResult(idx) {

// ===== Send to Formulator =====
function sendToFormulator() {
  const found = results.filter(r => r.found);
  try {
    if (found.length) {
      const payload = found.map(mat => {
        const src = mat.record;
        const fc = src.identifiers?.cas ? FILTER_CACHE.get(src.identifiers.cas) : null;
        return {
          cas: src.identifiers.cas || null,
          name: src.names.canonical,
          smiles: src.identifiers.canonical_smiles || null,
          molecular_weight: src.properties.molecular_weight || null,
          xlogp: src.properties.xlogp || null,
          tpsa: src.properties.tpsa || null,
          hbond_donor: src.properties.hbond_donor || null,
          hbond_acceptor: src.properties.hbond_acceptor || null,
          note: src.perfumery.note || null,
          odor_type: src.perfumery.odor_type || null,
          odor_strength: src.perfumery.odor_strength || null,
          odor_description: src.perfumery.odor_description || null,
          tenacity: src.perfumery.tenacity || null,
          tenacity_hours: src.perfumery.tenacity_hours || null,
          blends_with: src.perfumery.blends_with || [],
          ifra_guideline: src.safety.ifra_guideline || null,
          usage_levels: src.safety.usage_levels || null,
          primaryFamilies: fc ? [...(fc.primaryFamilies || [])] : (src.classification?.primaryFamilies || []),
          secondaryFamilies: fc ? [...(fc.secondaryFamilies || [])] : (src.classification?.secondaryFamilies || []),
          facets: fc ? [...(fc.facets || [])] : (src.classification?.facets || []),
          functions: fc ? [...(fc.functions || [])] : (src.classification?.functions || []),
          regulatory: fc ? [...(fc.regulatory || [])] : (src.classification?.regulatory || []),
          // Phase 5 (simplified Obsidian export) — the remaining 3 filter
          // axes so formulation.html can render full 9-axis membership
          // without re-deriving anything.
          uses:         fc ? [...(fc.uses || [])] : (src.classification?.uses         || []),
          materialType: fc ? (fc.materialType || null) : (src.classification?.material_type || null),
          source:       fc ? (fc.source || null)       : (src.classification?.source        || null),
        };
      });
      localStorage.setItem('perfume_formulation_materials', JSON.stringify(payload));
      localStorage.setItem('perfume_formulation_ts', Date.now().toString());
    }
    window.open('formulation.html', '_blank');
  } catch (e) {
    console.error('sendToFormulator:', e);
    window.open('formulation.html', '_blank');
  }
}

// ===== Classification =====
// (Taxonomy constants — TYPE_VALUES, FUNCTION_VALUES, ODOR_FAMILY_*,
//  USE_VALUES, REGULATORY_VALUES, SOURCE_VALUES — have been hoisted to
//  the top of the script so they are available when FILTER_CACHE runs
//  its module-init pass.)
function classifyMaterialType(mat) {
  const r = mat.record || mat; // support both result objects and raw DB entries
  const pf = r.perfumery || {}, sf = r.safety || {}, nm = r.names || {}, id = r.identifiers || {};
  const n = (nm.canonical || '').toLowerCase();
  const desc = ((pf.odor_description || '') + ' ' + (sf.usage_levels || '')).toLowerCase();
  const odorType = (pf.odor_type || '').toLowerCase();
  const note = (pf.note || '').toLowerCase();
  const cas = id.cas || '';
  // NOTE: synonyms are intentionally excluded from the keyword surface.
  // PubChem synonym lists inject noise like "Absolute ethanol", "Ethanol wax
  // emulsion", etc. that used to flip single molecules into the wrong Type.
  const all = n + ' ' + desc + ' ' + odorType + ' ' + note;

  // 0) Hard overrides for materials whose primary identity on the Type
  //    axis is solvent/carrier even though the curated DB carries an odor
  //    description (e.g. Benzyl Benzoate has a faint balsamic odor but is
  //    primarily a perfumery solvent/fixative; TEC is a perfumery solvent
  //    despite a faint plasticizer note). Tiny override list — kept here
  //    instead of in classifyUses so the Type label comes out right too.
  if (/\b(benzyl benzoate|triethyl citrate)\b/i.test(n)) return 'solvent';

  // 1) Antioxidants, preservatives, solubilizers, emulsifiers (most specific first).
  if (/\b(antioxidant|tocopherol|bht|bha)\b/i.test(all)) return 'antioxidant';
  if (/\b(preservative|biocide|paraben)\b/i.test(all)) return 'preservative';
  if (/\b(solubilizer|solubilis|polysorbate|peg[- ]\d|hydrogenated castor)\b/i.test(all)) return 'solubilizer';
  if (/\b(emulsifier|emulsifying|lecithin|ceteareth|stearate)\b/i.test(all)) return 'emulsifier';

  // 2) Natural mixtures — sub-typed from the canonical name keyword,
  //    then defaulting to essential_oil for any unmatched mixture.
  if (MIXTURES.has(cas)) {
    if (/\b(absolute)\b/i.test(n)) return 'absolute';
    if (/\b(balsam)\b/i.test(n))   return 'balsam';
    if (/\b(resin|resinoid|oleoresin)\b/i.test(n)) return 'resin';
    if (/\b(wax)\b/i.test(n))      return 'wax';
    return 'essential_oil';
  }
  if (/\b(absolute)\b/i.test(n)) return 'absolute';
  if (/\b(balsam)\b/i.test(n))   return 'balsam';
  if (/\b(resin|resinoid|oleoresin)\b/i.test(n)) return 'resin';
  if (/\b(essential oil|tincture|concrete)\b/i.test(n)) return 'essential_oil';

  // 3) Natural isolate — explicit claim only.
  if (/\bisolate(?:d|s)?\b|\bfrom\s+\w+(?:\s+\w+)?\s+oil\b|\boccurs\s+in\b|\bnatural\s+(?:form|isolate|source|origin)\b/i.test(all) && !MIXTURES.has(cas)) return 'natural_isolate';

  // 4) Waxes (after balsam/absolute so beeswax-absolute hits absolute).
  //    Lanolin is a wool wax whose canonical name has no "wax" word — add
  //    it explicitly so the Type axis doesn't fall through to aroma_chemical.
  if (/\b(wax|lanolin)\b/i.test(n)) return 'wax';

  // 5) Formulation solvents and carriers — split into two distinct
  //    Type values via name and curated text. The override list above
  //    already caught the dual-role aromatic ones (BB / TEC).
  const hasRealOdor = !!(pf.odor_description && !RE_ODORLESS.test(pf.odor_description));
  const isCarrierName = /\b(dipropylene glycol|propylene glycol|mct oil|squalane|isododecane|isopropyl myristate|triacetin|diethyl phthalate)\b/i.test(n);
  const isSolventName = /\b(ethanol|ethyl alcohol)\b/i.test(n);
  if (!hasRealOdor && (isSolventName || /\bsolvent\b/i.test(note + ' ' + desc))) return 'solvent';
  if (!hasRealOdor && (isCarrierName || /\bcarrier\b/i.test(note + ' ' + desc))) return 'carrier';

  // 6) Generic additive note ("additive" / "base/additive").
  if (/^(additive|base\/additive)$/i.test(note)) return 'additive';

  return 'aroma_chemical';
}

// Use axis is the closed set USE_VALUES. Regulatory / banned lives on
// its own axis and is rendered separately. Reduce a raw tag list to
// ONLY Use-axis values, dedup-preserving order. Used by the result-card
// render path so the Use tag row never mixes in regulatory, pharma, or
// fallback "chemical/unclassified" labels.
function _filterDisplayTags(tags) {
  if (!Array.isArray(tags) || !tags.length) return [];
  const out = [];
  const seen = new Set();
  for (const t of tags) {
    if (!t || seen.has(t)) continue;
    if (!USE_VALUES.includes(t)) continue;
    seen.add(t);
    out.push(t);
  }
  return out;
}

function getBanStatus(mat) {
  const r = mat.record || mat;
  const sf = r.safety || {};
  const ifra = (sf.ifra_guideline || '').toLowerCase();
  const usage = (sf.usage_levels || '').toLowerCase();
  // Worldwide-ban detection must scope its "no EU" lookahead to the
  // ifra field only. The earlier version concatenated ifra+usage and
  // ran the lookahead over the full string, so a legitimate
  // "prohibited worldwide (phototoxicity)" in ifra + any mention of
  // "eu" in usage (e.g. "Limited use in EU cosmetics") would cause
  // the negative lookahead to fail and downgrade the status to null.
  const ifraSaysWorldwide = /\bprohibited\s+worldwide\b/i.test(ifra) ||
                            /\bbanned\s+worldwide\b/i.test(ifra);
  const ifraMentionsEU = /\beu\b/i.test(ifra);
  if (ifraSaysWorldwide && !ifraMentionsEU) return 'worldwide';
  const all = ifra + ' ' + usage;
  if (/\bbanned\b|prohibited\s*in\s*eu|banned\s*in\s*eu/i.test(all))
    return 'eu';
  return null;
}
function isBannedEU(mat) { return getBanStatus(mat) !== null; }

// Use-axis classifier — 4 industry categories. Returns an array.
//   fine_fragrance — EDP/EDT/extrait + supporting vehicles
//   personal_care  — soap / shampoo / lotion / deodorant / cosmetics
//   home_care      — candle / diffuser / fabric / laundry / household
//   flavor         — FEMA/GRAS food-grade aroma chemicals
//
// Evidence-based design: a tag is added ONLY when the curated safety/
// usage text (or a hard-coded vehicle list / FEMA gate) provides
// explicit positive evidence. The previous "any non-banned perfumery
// material gets personal_care for free" auto-fire was removed —
// it made the tag carry no information. A material with no evidence
// in any axis returns []; the result card and Use chip cloud show
// exactly what the data supports, no more.
function classifyUses(mat) {
  const r = mat.record || mat;
  const pf = r.perfumery || {}, sf = r.safety || {}, nm = r.names || {}, id = r.identifiers || {};
  const n = (nm.canonical || '').toLowerCase();
  const desc = (pf.odor_description || '').toLowerCase();
  const usage = (sf.usage_levels || '').toLowerCase();
  const ifra = (sf.ifra_guideline || '').toLowerCase();
  const cas = id.cas || '';
  const banned = isBannedEU(mat);
  // Single combined safety text — every text-based gate scans this.
  const safetyText = ifra + ' ' + usage;
  const tags = new Set();

  // ── Fragrance vehicles / functional ingredients ──
  // Hard-coded list of solvents, carriers and antioxidants that are
  // essential backbone ingredients in fine-fragrance and personal-care
  // formulations. Curated DB text rarely names them as "fine fragrance"
  // but the perfumery industry treats them as part of the fragrance
  // stack, so seed both axes from the name.
  const isFragranceVehicle = /\b(ethanol|ethyl alcohol|dipropylene glycol|propylene glycol|isopropyl myristate|triethyl citrate|mct oil|squalane|isododecane|benzyl benzoate|triacetin|diethyl phthalate)\b/i.test(n);
  const isAntioxidant = /\b(tocopherol|bht|bha|antioxidant)\b/i.test(n);
  if (!banned && (isFragranceVehicle || isAntioxidant)) {
    tags.add('fine_fragrance');
    if (!PERSONAL_CARE_EXCLUDED_CAS.has(cas)) tags.add('personal_care');
  }

  // ── Fine Fragrance ──
  // Explicit usage cue OR very-high tenacity (industry shorthand for
  // a base-note workhorse used in EDP/EDT). No more "high tenacity +
  // base note" inference — that was firing on most absolutes.
  if (!banned && (
      /\bfine fragrance\b|\bedp\b|\bedt\b|\bextrait\b|\beau\s+de\s+(parfum|toilette|cologne)\b/i.test(safetyText) ||
      /\b(very high|excellent|extremely high)\b/i.test((pf.tenacity || '').toLowerCase())
  )) {
    tags.add('fine_fragrance');
  }

  // ── Personal Care & Cosmetics ──
  // Explicit cosmetic/skin-care keyword in the safety text. The
  // earlier auto-fire ("any non-banned perfumery material gets this
  // tag") was removed — it added no information.
  if (!banned && !PERSONAL_CARE_EXCLUDED_CAS.has(cas) && /\b(body lotion|body wash|deodorant|shampoo|conditioner|skin care|skin\s*condition|cosmetic|lip\s*(stick|balm|gloss)|hair\s*(care|product)|axillae|leave[- ]on|rinse[- ]off|emollient|humectant|soap|toothpaste)\b/i.test(safetyText)) {
    tags.add('personal_care');
  }

  // ── Home Care & Air Care ──
  // Explicit household/air-care keyword in the safety text. The
  // earlier "base note + woody/amber profile" inference was removed —
  // it over-fired on every dark base-note material regardless of
  // whether the source data actually mentioned home-care use.
  // Evidence vocabulary extended 2026-04 to cover industry shorthand
  // "functional perfumery" (= soap/detergent/candle/air care collectively)
  // and explicit bar-soap / shower-gel / body-bar mentions that were
  // missing from the original household-keyword list.
  if (!banned && /\b(candle|wax melt|reed diffuser|room spray|air freshener|air care|fabric|laundry|softener|detergent|household|home care|all[- ]purpose|cleaner|dishwash|surfactant|functional\s*perfumery|bar\s*soap|shower\s*gel|body\s*bar|dish\s*soap)\b/i.test(safetyText)) {
    tags.add('home_care');
  }

  // ── Baseline perfumery-material fallback ──
  // After the evidence-based rewrite, ~55% of DB materials ended up
  // with zero Use tags because most curated safety texts don't carry
  // explicit EDP/EDT/cosmetic keywords even though every aromatic
  // aroma chemical and essential oil IS used in both fine fragrance
  // and personal care formulations. Add a conservative baseline:
  // any non-banned material with a real odor description (or natural
  // mixture) gets `fine_fragrance` + `personal_care` by default.
  // Banned materials, IFRA-prohibited materials and odorless vehicles
  // are excluded — the earlier auto-fire erroneously tagged those too.
  const isMixture = MIXTURES.has(cas);
  const hasRealOdor = !!(pf.odor_description && !RE_ODORLESS.test(pf.odor_description));
  if (!banned && (hasRealOdor || isMixture)) {
    tags.add('fine_fragrance');
    if (!PERSONAL_CARE_EXCLUDED_CAS.has(cas)) tags.add('personal_care');
  }

  // ── Flavor ──
  // FEMA# 2001-5999 is the gold-standard gate (FEMA GRAS list).
  // Multi-layer safety gate:
  //  a) not banned (EU or worldwide)
  //  b) not on FLAVOR_EXCLUDED_CAS (phthalates, nitro/polycyclic musks, thujone)
  //  c) no explicit "not for food" / "non-food" cue
  //  d) HARD_TOXICITY_RE (convulsant, CMR1, fatal) — blocks unconditionally
  //     even for FEMA-listed compounds; defense-in-depth against a FEMA
  //     number slipping a genuinely-lethal material through the gate
  //  e) for non-FEMA materials: soft toxicity cue (carcinogen, mutagen,
  //     neurotox, reproductive tox, CMR2)
  //  f) positive evidence: valid FEMA OR food-use keyword
  const femaNum = parseInt(id.fema, 10);
  const hasValidFema = id.fema && femaNum >= 2001 && femaNum <= 5999;
  const notFood = NOT_FOOD_RE.test(safetyText + ' ' + n);
  const hardTox = HARD_TOXICITY_RE.test(safetyText);
  const toxicNonFema = !hasValidFema && TOXICITY_BLOCK_RE.test(safetyText);
  if (!banned && !FLAVOR_EXCLUDED_CAS.has(cas) && !notFood && !hardTox && !toxicNonFema) {
    if (hasValidFema ||
        FLAVOR_POSITIVE_RE.test(safetyText) ||
        FLAVOR_POSITIVE_RE.test(desc) ||
        FLAVOR_WEAK_RE.test(usage)) {
      tags.add('flavor');
    }
  }

  // ── PubChem section-based enrichment ──
  // After prefetch, pubchem_sections may carry "Use and Manufacturing",
  // "Food Additives", "FDA", "IFRA", "Cosmetic" headings with
  // industry-use signals the local DB lacks. Single entry point —
  // no per-axis re-scan loops scattered through the function.
  const pcSections = r.metadata?.pubchem_sections;
  if (pcSections) {
    let pcUseText = '';
    for (const [heading, items] of Object.entries(pcSections)) {
      const hl = heading.toLowerCase();
      if (hl.includes('use') || hl.includes('food') || hl.includes('pharmacol') ||
          hl.includes('fda') || hl.includes('gras') || hl.includes('cosmetic') ||
          hl.includes('consumer') || hl.includes('fragrance') || hl.includes('household')) {
        pcUseText += ' ' + items.join(' ');
      }
    }
    if (pcUseText) {
      if (!banned && PUBCHEM_FRAGRANCE_RE.test(pcUseText))    tags.add('fine_fragrance');
      if (!banned && !PERSONAL_CARE_EXCLUDED_CAS.has(cas) && PUBCHEM_PERSONALCARE_RE.test(pcUseText)) tags.add('personal_care');
      if (PUBCHEM_HOMECARE_RE.test(pcUseText))                tags.add('home_care');
      if (!banned && !FLAVOR_EXCLUDED_CAS.has(cas) && !notFood && !hardTox && !toxicNonFema &&
          (FLAVOR_POSITIVE_RE.test(pcUseText) || PUBCHEM_FLAVOR_RE.test(pcUseText))) {
        tags.add('flavor');
      }
    }
  }

  return [...tags];
}
// Backwards-compat alias — older code paths still call classifyIndustryTags.
function classifyIndustryTags(mat) { return classifyUses(mat); }

// Regulatory axis classifier — independent of Use. A material can be
// perfumery + regulated + allergen + sensitizer simultaneously.
// All triggers require an explicit safety cue: a bare "%" in usage
// text (which most perfumery materials carry) is NOT enough to imply
// IFRA limitation.
//
// Backward compatibility: the canonical token for the IFRA-limit
// bucket is now 'regulated'. The legacy token 'ifra_limited' is still
// accepted on INPUT (via _normalizeRegulatoryToken / the legacy alias
// map) but this classifier only EMITS 'regulated'. Cards, filters,
// and JSON export all route through the normalizer so any old
// imported record carrying 'ifra_limited' still works end-to-end.
function classifyRegulatory(mat) {
  const r = mat.record || mat;
  const sf = r.safety || {}, nm = r.names || {};
  const ifra = (sf.ifra_guideline || '').toLowerCase();
  const usage = (sf.usage_levels || '').toLowerCase();
  const n = (nm.canonical || '').toLowerCase();
  const all = ifra + ' ' + usage;
  const out = [];

  // Banned: explicit "banned"/"prohibited" anywhere in safety text.
  if (/\b(banned|prohibited)\b/i.test(all)) out.push('banned');
  // Restricted: explicit "restricted" word OR known restriction phrases.
  if (/\brestricted\b/i.test(all)) out.push('restricted');
  // Regulated: only fires when the safety text carries an actual limit
  // signal. The "IFRA" word inside a "No specific IFRA restriction"
  // phrase is NOT a limit — guard against it explicitly.
  //
  // Category detection accepts both the long form "category N" and the
  // industry-standard abbreviation "Cat.5A" / "Cat 5" / "Cat5" that
  // curated safety text actually uses. The old regex only matched
  // "category N" so materials with Cat-specific caps (Camphor,
  // Lavender Absolute etc.) were missed.
  const noRestriction = /\bno\b[^.\n]*\b(specific|ifra|restriction)\b/i.test(ifra);
  const limitCue = /\bIFRA\s*51\b/i.test(ifra) ||
                   /\bIFRA\s*51\b/i.test(usage) ||
                   /\b(?:category|cat\.?)\s*\d/i.test(all) ||
                   /\b(regulated|limited|limits?|max(?:imum)?)\b/i.test(ifra);
  if (!out.includes('banned') && !noRestriction && limitCue) {
    out.push('regulated');
  }
  // Allergen: explicit cue OR canonical name on the EU 26-allergen list.
  // Negation guard: curated text may say "not an EU 26 allergen" or
  // "low sensitization risk; not an allergen" to document the negative
  // case. The bare regex used to fire on those phrases because it just
  // looked for the substring "allergen". The guard filters out
  // "not an/a ... allergen" before running the positive match.
  const negAllergen = /\bnot\s+(?:an?|a)\s+(?:[a-z0-9\s]{0,20})?allergen\b/i.test(all);
  if (!negAllergen && (
      /\b(allergen|26 allergens|annex iii|labeling required)\b/i.test(all) ||
      /\b(linalool|limonene|citral|geraniol|eugenol|coumarin|farnesol|citronellol|cinnamal|cinnamic alcohol|cinnamyl alcohol|isoeugenol|benzyl alcohol|benzyl salicylate|benzyl benzoate|benzyl cinnamate|hydroxycitronellal|amyl cinnamal|amylcinnamyl alcohol|hexyl cinnamal|methyl heptine carbonate|alpha-isomethyl ionone|oakmoss|treemoss|evernia)\b/i.test(n))) {
    out.push('allergen');
  }
  // Phototoxic: explicit cue OR known phototoxic citrus / furocoumarin.
  // The hardcoded citrus list is limited to oils whose bergapten /
  // furocoumarin content makes them IFRA-restricted as phototoxic.
  // `cumin` was removed — while cumin aldehyde can be photosensitizing
  // at high concentrations, IFRA does not classify Cumin Oil as
  // phototoxic and the material's safety.ifra explicitly says "no
  // specific IFRA restriction". Trigger the tag only when the curated
  // safety text says so.
  if (/\bphototox/i.test(all) ||
      /\b(bergapten|psoralen|furocoumarin)\b/i.test(n + ' ' + all) ||
      /\b(bergamot|lime|bitter orange|angelica root|rue|fig leaf)\b/i.test(n)) {
    out.push('phototoxic');
  }
  // Sensitizer: explicit "sensitizer" / "sensitis(z)ing" / IFRA H317 cue.
  // Negation guard: phrases like "low sensitization risk", "non-sensitizing",
  // "not a sensitizer" document the negative case and must not fire the tag.
  const negSens = /\b(?:not|no|non|low|minimal)[\s\-]+(?:a\s+)?sensiti(?:s|z)/i.test(all) ||
                  /\bsensiti(?:s|z)\w*\s+risk[^.,]{0,30}?\b(?:low|minimal|none|no)\b/i.test(all);
  if (!negSens && (/\bsensiti(?:s|z)/i.test(all) || /\bh317\b/i.test(all))) out.push('sensitizer');

  return out;
}

// Source axis classifier (optional / future-ready). Best-effort split
// between natural (mixtures), synthetic (single molecules whose curated
// data shows no natural-occurrence claim) and semi-synthetic / biotech
// for explicit cues.
function classifySource(mat) {
  const r = mat.record || mat;
  const pf = r.perfumery || {}, nm = r.names || {}, id = r.identifiers || {};
  const cas = id.cas || '';
  const all = ((nm.canonical || '') + ' ' + (pf.odor_description || '')).toLowerCase();
  if (/\b(biotech|fermentation|bio[\s-]?based)\b/i.test(all)) return 'biotech';
  if (/\b(semi[\s-]?synthetic|hemi[\s-]?synthetic)\b/i.test(all)) return 'semi_synthetic';
  if (MIXTURES.has(cas)) return 'natural';
  if (/\boccurs\s+in\b|\bnatural\s+(?:form|isolate|source|origin)\b/i.test(all)) return 'natural';
  return 'synthetic';
}

(function initTheme() {
  const root = document.documentElement;
  const btn = document.getElementById('themeSwitch');
  if (!btn) return;
  const saved = localStorage.getItem('perfume_theme');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const initial = saved || (prefersDark ? 'dark' : 'light');
  function apply(theme) {
    if (theme === 'dark') root.setAttribute('data-theme', 'dark');
    else root.removeAttribute('data-theme');
    const isDark = theme === 'dark';
    btn.setAttribute('aria-pressed', String(isDark));
    btn.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
    const useEl = btn.querySelector('use');
    if (useEl) useEl.setAttribute('href', isDark ? '#i-sun' : '#i-moon');
  }
  apply(initial);
  btn.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('perfume_theme', next);
    apply(next);
  });
})();

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', e => {
  const tag = (e.target && e.target.tagName) || '';
  const typing = /^(INPUT|TEXTAREA|SELECT)$/.test(tag);
  if (e.key === '/' && !typing) {
    e.preventDefault();
    const i = document.getElementById('searchInput');
    if (i) i.focus();
  }
  if (e.key === 'Escape') {
    const i = document.getElementById('searchInput');
    if (i && document.activeElement === i) { i.value = ''; i.blur(); }
  }
});

// ===== Toast helper =====
window.showToast = function({ message, variant='info', retry=null, timeout=6000 } = {}) {
  const region = document.getElementById('toastRegion');
  if (!region) return;
  const el = document.createElement('div');
  el.className = 'toast toast--' + variant;
  el.setAttribute('role', variant === 'danger' ? 'alert' : 'status');
  const iconId = variant === 'danger' || variant === 'warn' ? '#i-warning' :
                 variant === 'success' ? '#i-check' : '#i-info';
  el.innerHTML =
    '<svg class="icon" aria-hidden="true"><use href="' + iconId + '"/></svg>' +
    '<div class="toast__body"><div>' + String(message).replace(/</g,'&lt;') + '</div>' +
    (retry ? '<button class="toast__retry" type="button">Retry</button>' : '') +
    '</div>' +
    '<button class="toast__close" type="button" aria-label="Dismiss"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-close"/></svg></button>';
  const close = () => { if (el.parentNode) el.remove(); };
  el.querySelector('.toast__close').addEventListener('click', close);
  if (retry) el.querySelector('.toast__retry').addEventListener('click', () => { close(); try { retry(); } catch(e){} });
  region.appendChild(el);
  if (timeout > 0) setTimeout(close, timeout);
  return close;
};
</script>
