function buildPerfumerySections(mat) {
  const pf = mat.record.perfumery, sf = mat.record.safety;
  const sections = [];
  if (pf.odor_description || pf.odor_type || pf.odor_strength) {
    const info = [];
    if (pf.odor_description) info.push({ReferenceNumber:0,Description:"Odor Description",Value:{StringWithMarkup:[{String:pf.odor_description}]}});
    if (pf.odor_type) info.push({ReferenceNumber:0,Description:"Odor Type",Value:{StringWithMarkup:[{String:pf.odor_type}]}});
    if (pf.odor_strength) info.push({ReferenceNumber:0,Description:"Odor Strength",Value:{StringWithMarkup:[{String:pf.odor_strength}]}});
    sections.push({TOCHeading:"Odor Profile",Description:"Olfactory characteristics from perfumery database.",Information:info});
  }
  if (pf.note) {
    sections.push({TOCHeading:"Note Classification",Description:"Fragrance pyramid classification.",Information:[
      {ReferenceNumber:0,Value:{StringWithMarkup:[{String:pf.note}]}}
    ]});
  }
  if (pf.tenacity || pf.tenacity_hours) {
    const info = [];
    if (pf.tenacity) info.push({ReferenceNumber:0,Description:"Tenacity",Value:{StringWithMarkup:[{String:pf.tenacity}]}});
    if (pf.tenacity_hours) info.push({ReferenceNumber:0,Description:"Duration",Value:{StringWithMarkup:[{String:pf.tenacity_hours}]}});
    sections.push({TOCHeading:"Performance",Description:"Longevity and projection characteristics.",Information:info});
  }
  if (sf.ifra_guideline || sf.usage_levels) {
    const info = [];
    if (sf.ifra_guideline) info.push({ReferenceNumber:0,Description:"IFRA Guidelines",Value:{StringWithMarkup:[{String:sf.ifra_guideline}]}});
    if (sf.usage_levels) info.push({ReferenceNumber:0,Description:"Usage Levels",Value:{StringWithMarkup:[{String:sf.usage_levels}]}});
    sections.push({TOCHeading:"Perfumery Safety",Description:"IFRA restrictions and recommended usage levels.",Information:info});
  }
  const _bw = Array.isArray(pf.blends_with) ? pf.blends_with : [];
  if (_bw.length) {
    sections.push({TOCHeading:"Blending",Description:"Compatible fragrance materials.",Information:[
      {ReferenceNumber:0,Description:"Blends Well With",Value:{StringWithMarkup:_bw.map(s=>({String:String(s)}))}}
    ]});
  }
  return sections;
}

function buildLocalRecord(mat) {
  const rec = mat.record, id = rec.identifiers, nm = rec.names, pr = rec.properties;
  const sections = [];

  const namesSec = [];
  if (id.cas) namesSec.push({TOCHeading:"CAS",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:id.cas}]}}]});
  if (id.fema) namesSec.push({TOCHeading:"FEMA Number",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:String(id.fema)}]}}]});
  if (id.iupac) namesSec.push({TOCHeading:"IUPAC Name",Description:"Chemical name.",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:id.iupac}]}}]});
  if ((nm.synonyms||[]).length) namesSec.push({TOCHeading:"Synonyms",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:(nm.synonyms||[]).map(s=>({String:String(s)}))}}]});
  if (namesSec.length) sections.push({TOCHeading:"Names and Identifiers",Description:"Chemical names, synonyms, identifiers.",Section:namesSec});

  const chemSec = [];
  if (id.molecular_formula) chemSec.push({TOCHeading:"Molecular Formula",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:id.molecular_formula}]}}]});
  if (pr.molecular_weight) chemSec.push({TOCHeading:"Molecular Weight",Information:[{ReferenceNumber:0,Value:{Number:[pr.molecular_weight]}}]});
  if (pr.exact_mass) chemSec.push({TOCHeading:"Exact Mass",Information:[{ReferenceNumber:0,Value:{Number:[pr.exact_mass]}}]});
  if (pr.xlogp!=null) chemSec.push({TOCHeading:"XLogP",Information:[{ReferenceNumber:0,Value:{Number:[pr.xlogp]}}]});
  if (pr.tpsa!=null) chemSec.push({TOCHeading:"TPSA",Information:[{ReferenceNumber:0,Value:{Number:[pr.tpsa]}}]});
  if (pr.hbond_donor!=null) chemSec.push({TOCHeading:"H-Bond Donor Count",Information:[{ReferenceNumber:0,Value:{Number:[pr.hbond_donor]}}]});
  if (pr.hbond_acceptor!=null) chemSec.push({TOCHeading:"H-Bond Acceptor Count",Information:[{ReferenceNumber:0,Value:{Number:[pr.hbond_acceptor]}}]});
  if (pr.rotatable_bonds!=null) chemSec.push({TOCHeading:"Rotatable Bond Count",Information:[{ReferenceNumber:0,Value:{Number:[pr.rotatable_bonds]}}]});
  if (pr.heavy_atoms!=null) chemSec.push({TOCHeading:"Heavy Atom Count",Information:[{ReferenceNumber:0,Value:{Number:[pr.heavy_atoms]}}]});
  if (id.canonical_smiles) chemSec.push({TOCHeading:"Canonical SMILES",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:id.canonical_smiles}]}}]});
  if (id.inchi) chemSec.push({TOCHeading:"InChI",Description:"International Chemical Identifier.",Information:[{ReferenceNumber:0,Value:{StringWithMarkup:[{String:id.inchi}]}}]});
  if (chemSec.length) sections.push({TOCHeading:"Chemical and Physical Properties",Description:"Structural descriptors and computed properties.",Section:chemSec});

  if (id.pubchem_cid) {
    sections.push({TOCHeading:"Structures",Description:"Structure depictions.",Section:[
      {TOCHeading:"2D Structure",Information:[{ReferenceNumber:0,Value:{Boolean:[true]}}],
        URL:`https://pubchem.ncbi.nlm.nih.gov/image/imgsrv.fcgi?cid=${id.pubchem_cid}&t=l`}
    ]});
  }

  // Perfumery Data
  const perfSections = buildPerfumerySections(mat);
  if (perfSections.length) sections.push({TOCHeading:"Perfumery Data",Description:"Perfumery-specific data from local fragrance database.",Section:perfSections});

  return {
    Record: {
      RecordType: "CID",
      RecordNumber: id.pubchem_cid || null,
      RecordTitle: nm.canonical,
      Section: sections
    }
  };
}

// ===== JSON Export =====
async function downloadJSON() {
  const found = results.filter(r=>r.found);
  if (!found.length) return;

  const btn = document.querySelector('.dl-menu a[onclick*="downloadJSON"]');
  if (!btn) return;
  const origText = btn.textContent;
  btn.style.pointerEvents = "none";
  btn.style.opacity = "0.4";

  // Load PubChem data for all compounds
  // Wait for any pending PubChem property loads (fast path)
  await Promise.allSettled(found.map(mat => mat._loadPubchem).filter(Boolean));

  const BATCH = 4;
  for (let i = 0; i < found.length; i += BATCH) {
    const batch = found.slice(i, i + BATCH);
    btn.textContent = `⏳ ${i+1}/${found.length}...`;
    await Promise.allSettled(batch.map(async mat => {
      if (mat.record.identifiers.pubchem_cid && (!mat.record.metadata.pubchem_sections || !Object.keys(mat.record.metadata.pubchem_sections).length)) {
        try {
          const r = await fetchWithTimeout(`https://pubchem.ncbi.nlm.nih.gov/rest/pug_view/data/compound/${mat.record.identifiers.pubchem_cid}/JSON`, {}, 10000);
          const d = await r.json();
          const sections = d.Record?.Section || [];
          mat.record.metadata.pubchem_sections = extractAllSections(sections);
        } catch(e) { if (e?.name !== 'AbortError') console.warn('downloadJSON pug_view:', e); }
      }
    }));
  }

  // Headings to exclude from JSON export
  const SKIP_JSON = [
    // Spectra (raw data too verbose for AI)
    "spectr", "lc-ms", "gc-ms", "mass spec", "ms-ms", "raman",
    // Verbose sections not useful for perfumery AI analysis
    "mechanism of action", "human toxicity excerpt", "non-human toxicity excerpt",
    "national toxicology", "ongoing test", "antidote", "first aid",
    "fire fighting", "accidental release", "transport information",
    "nonfire spill", "spillage", "isolation and evacuation",
    "respirator recommendation", "sampling procedure",
    // Noise
    "removed synonym", "springermaterials",
    // Already in card identifiers/properties — avoid duplication
    "computed descriptor", "computed properties", "molecular formula",
    "molecular weight", "exact mass", "monoisotopic mass"
  ];

  // === AI Preprocessing Helpers ===
  const CAS_RE_SYN = /^\d{2,7}-\d{2}-\d$/;

  // Parse numeric from text like "~36 hours", "~400 hours"
  function parseHoursNumeric(s) {
    if (!s) return null;
    const m = s.match(/([\d.]+)\s*hour/i);
    return m ? parseFloat(m[1]) : null;
  }
  // Parse usage range — supports "0.1–2 %" and "IFRA 51: 7.3% FF / 1.9% Body"
  function parseUsageRange(s) {
    if (!s) return {min:null, max:null};
    // Old format: "0.1–2 %"
    const mRange = s.match(/([\d.]+)\s*[–\-]\s*([\d.]+)\s*%/);
    if (mRange) return {min:parseFloat(mRange[1]), max:parseFloat(mRange[2])};
    // IFRA 51 format: extract all percentages, min/max
    const allPcts = [...s.matchAll(/([\d.]+)\s*%/g)].map(m => parseFloat(m[1]));
    if (allPcts.length) return {min:Math.min(...allPcts), max:Math.max(...allPcts)};
    return {min:null, max:null};
  }
  // Parse IFRA 51 category limits into structured object
  function parseIFRA51(s) {
    if (!s || !s.includes('IFRA 51')) return null;
    const limits = {};
    const pairs = s.replace(/^IFRA 51:\s*/i, '').split('/').map(p => p.trim());
    for (const p of pairs) {
      const m = p.match(/([\d.]+)%\s+(.+)/);
      if (m) limits[m[2].trim()] = parseFloat(m[1]);
    }
    return Object.keys(limits).length ? limits : null;
  }
  // Ordinal scale for odor strength
  function odorStrengthScale(s) {
    if (!s) return null;
    const sl = s.toLowerCase();
    if (sl.includes('none')) return 0;
    if (sl.includes('very high')) return 5;
    if (sl.includes('high')) return 4;
    if (sl.includes('medium to high')) return 3.5;
    if (sl.includes('medium')) return 3;
    if (sl.includes('low to medium')) return 2;
    if (sl.includes('low')) return 1;
    return null;
  }
  // One-hot note classification
  function noteOneHot(s) {
    if (!s) return {is_top:false, is_middle:false, is_base:false};
    const sl = s.toLowerCase();
    return {
      is_top: sl.includes('top'),
      is_middle: sl.includes('middle'),
      is_base: sl.includes('base')
    };
  }
  // Extract unique GHS H-codes from array
  function extractGhsCodes(items) {
    if (!items) return [];
    const codes = new Set();
    for (const item of items) {
      const matches = item.match(/H\d{3}/g);
      if (matches) matches.forEach(c => codes.add(c));
    }
    return [...codes].sort();
  }

  // === Unit Conversion: standardize to °C and mmHg ===
  function parseTempCelsius(text) {
    // Try °C first, then °F, then K
    const patterns = [
      {re:/([-\d.]+)\s*°?\s*C\b/i, fn:v=>v},
      {re:/([-\d.]+)\s*°?\s*F\b/i, fn:v=>(v-32)*5/9},
      {re:/([-\d.]+)\s*K\b/i, fn:v=>v-273.15},
    ];
    for (const {re,fn} of patterns) {
      const m = text.match(re);
      if (m) return Math.round(fn(parseFloat(m[1]))*100)/100;
    }
    return null;
  }
  function parsePressureMmHg(text) {
    const patterns = [
      {re:/([\d.eE+\-]+)\s*mm\s*Hg/i, fn:v=>v},
      {re:/([\d.eE+\-]+)\s*kPa/i, fn:v=>v*7.50062},
      {re:/([\d.eE+\-]+)\s*atm/i, fn:v=>v*760},
      {re:/([\d.eE+\-]+)\s*\[mmHg\]/i, fn:v=>v},
    ];
    for (const {re,fn} of patterns) {
      const m = text.match(re);
      if (m) return Math.round(fn(parseFloat(m[1]))*1e6)/1e6;
    }
    return null;
  }
  function parseDensity(text) {
    const m = text.match(/([\d.]+)\s*(g\s*\/?\s*(cu\s*)?cm|g\s*\/?\s*mL)?/i);
    return m ? parseFloat(m[1]) : null;
  }

  // === Aggregation: median of all parsed values from multiple entries ===
  function parseAllValues(items, parseFn) {
    if (!items) return [];
    const vals = [];
    for (const item of items) {
      const v = parseFn(item);
      if (v != null && isFinite(v)) vals.push(v);
    }
    return vals;
  }
  function median(arr) {
    if (!arr.length) return null;
    const s = [...arr].sort((a,b)=>a-b);
    const mid = Math.floor(s.length/2);
    return s.length%2 ? s[mid] : Math.round((s[mid-1]+s[mid])/2*100)/100;
  }

  // === Data Completeness Score ===
  // Split completeness into local (curated perfumery DB) and pubchem
  // (CID-derived chemical/physical data). This prevents local-only
  // materials from being chronically under-scored just because PubChem
  // wasn't consulted, and lets enriched materials get visible credit
  // for the additional data.
  // Returned shape: { overall, local, pubchem }
  //   - no CID:   overall == local, pubchem == null
  //   - with CID: overall == round(local*0.6 + pubchem*0.4)
  function calcCompleteness(record) {
    // hasCid: derived from pubchem_url presence (the export record
    // doesn't carry pubchem_cid as a key, but pubchem_url is set
    // exactly when a CID was resolved at scrape time).
    const hasCid = record.pubchem_url != null;
    // Local fields — curated by perfumery_data.js / parsed at export.
    // Restricted to fields that realistically come from the local DB
    // for this codebase. molecular_formula/canonical_smiles/molecular_weight
    // are NOT here because perfumery_data.js leaves them empty for
    // virtually every entry; they only fill in after PubChem enrichment.
    const localFields = [
      record.cas_number,
      record.fema_number,
      record.perfumery?.odor_description,
      record.perfumery?.odor_type,
      record.perfumery?.odor_strength,
      record.perfumery?.note_classification,
      record.perfumery?.tenacity,
      record.perfumery?.tenacity_hours_numeric,
      record.perfumery?.usage_level_min_pct,
      (record.perfumery?.blends_well_with || []).length > 0 ? true : null,
      record.perfumery?.ifra_guidelines,
    ];
    // PubChem fields — only expected when a CID was resolved.
    const pubchemFields = [
      record.identifiers?.iupac_name,
      record.identifiers?.molecular_formula,
      record.identifiers?.canonical_smiles,
      record.identifiers?.inchi,
      record.properties?.molecular_weight,
      record.properties?.xlogp,
      record.properties?.tpsa,
      record.ai_extracted?.boiling_point_celsius,
      record.ai_extracted?.density_g_cm3,
      record.ai_extracted?.vapor_pressure_mmhg,
      record.ai_extracted?.logp_experimental,
      record.ai_extracted?.ghs_codes?.length > 0 ? true : null,
    ];
    const isFilled = v => v != null && v !== "" && v !== false;
    const localFilled = localFields.filter(isFilled).length;
    const pubchemFilled = pubchemFields.filter(isFilled).length;
    const local_pct = Math.round(localFilled / localFields.length * 100);
    const pubchem_pct = hasCid ? Math.round(pubchemFilled / pubchemFields.length * 100) : null;
    const overall = hasCid
      ? Math.round(local_pct * 0.6 + pubchem_pct * 0.4)
      : local_pct;
    return { overall, local: local_pct, pubchem: pubchem_pct };
  }

  // Build clean JSON — consumes canonical record directly
  const data = found.map(mat => {
    const src = mat.record; // canonical source of truth
    const usageRange = parseUsageRange(src.safety.usage_levels);
    const ifra51 = parseIFRA51(src.safety.usage_levels);
    const notes = noteOneHot(src.perfumery.note);
    const banStatus = getBanStatus(mat);
    const record = {
      name: src.names.canonical,
      pubchem_name: src.names.pubchem_title || (src.names.synonyms||[]).find(s => !CAS_RE_SYN.test(s)) || src.identifiers.iupac || src.names.canonical,
      material_type: src.classification.material_type || classifyMaterialType(mat),
      industry_tags: src.classification.industry_tags || classifyIndustryTags(mat),
      ban_status: banStatus || null,
      is_external_perfumery: src.metadata.is_external || false,
      match: src.match || null,
      cas_number: src.identifiers.cas || null,
      fema_number: src.identifiers.fema || null,
      pubchem_url: mat.page_url || null,
      structure_image_url: mat.structure_image_url || null,
      identifiers: {
        iupac_name: src.identifiers.iupac,
        molecular_formula: src.identifiers.molecular_formula,
        canonical_smiles: src.identifiers.canonical_smiles,
        isomeric_smiles: src.identifiers.isomeric_smiles,
        inchi: src.identifiers.inchi
      },
      properties: {
        molecular_weight: src.properties.molecular_weight,
        exact_mass: src.properties.exact_mass,
        xlogp: src.properties.xlogp,
        tpsa: src.properties.tpsa,
        hbond_donor_count: src.properties.hbond_donor,
        hbond_acceptor_count: src.properties.hbond_acceptor,
        rotatable_bond_count: src.properties.rotatable_bonds,
        heavy_atom_count: src.properties.heavy_atoms
      },
      perfumery: {
        odor_description: src.perfumery.odor_description,
        odor_type: src.perfumery.odor_type,
        odor_strength: src.perfumery.odor_strength,
        odor_strength_scale: odorStrengthScale(src.perfumery.odor_strength),
        note_classification: src.perfumery.note,
        ...notes,
        tenacity: src.perfumery.tenacity,
        tenacity_hours: src.perfumery.tenacity_hours,
        tenacity_hours_numeric: parseHoursNumeric(src.perfumery.tenacity_hours),
        ifra_guidelines: src.safety.ifra_guideline,
        usage_levels: src.safety.usage_levels,
        usage_level_min_pct: usageRange.min,
        usage_level_max_pct: usageRange.max,
        ifra_51_limits: ifra51,
        blends_well_with: (src.perfumery.blends_with||[]).length ? src.perfumery.blends_with : []
      },
      synonyms: (src.names.synonyms||[]).length ? src.names.synonyms.filter(s => !CAS_RE_SYN.test(s)) : [],
      // Canonical-record nested views (Plan §B.1) — additive; the flat
      // top-level material_type / industry_tags / is_external_perfumery
      // / match / cas_number / fema_number above are kept for backwards
      // compatibility with any existing JSON consumer.
      classification: {
        material_type: src.classification?.material_type ?? null,
        industry_tags: Array.isArray(src.classification?.industry_tags) ? src.classification.industry_tags : [],
        function: null,  // reserved by Plan §B.1; not currently computed on the record
      },
      metadata: {
        source: src.metadata?.source ?? null,
        is_external: src.metadata?.is_external ?? false,
        has_pubchem_sections: !!(src.metadata?.pubchem_sections && Object.keys(src.metadata.pubchem_sections).length),
        data_quality_pct: null,  // filled below after calcCompleteness runs
      },
      pubchem_data: {},
      ai_extracted: {}
    };
    // Fallback: if smiles still null, try from pubchem_data
    if (!record.identifiers.canonical_smiles && src.metadata.pubchem_sections) {
      for (const [h, items] of Object.entries(src.metadata.pubchem_sections)) {
        if (h.toLowerCase().includes('smiles') && items.length) {
          record.identifiers.canonical_smiles = items[0]; break;
        }
      }
    }
    // Fallback: isomeric_smiles = canonical if not available (no stereocenters)
    if (!record.identifiers.isomeric_smiles && record.identifiers.canonical_smiles) {
      record.identifiers.isomeric_smiles = record.identifiers.canonical_smiles;
      record.identifiers.has_stereocenters = false;
    } else if (record.identifiers.isomeric_smiles) {
      record.identifiers.has_stereocenters =
        record.identifiers.isomeric_smiles !== record.identifiers.canonical_smiles;
    }
    // Add filtered PubChem sections
    if (src.metadata.pubchem_sections && Object.keys(src.metadata.pubchem_sections).length) {
      const globalSeen = new Set();
      for (const [heading, items] of Object.entries(mat.record.metadata.pubchem_sections)) {
        const hl = heading.toLowerCase();
        // Skip excluded sections
        if (SKIP_JSON.some(k => hl.includes(k))) continue;
        // Flatten comma-separated lists (e.g. Deprecated CAS), dedup, truncate
        const flat = [];
        for (const item of items) {
          if (item.startsWith('http')) continue;
          const c = item.replace(/https?:\/\/\S+/g,'').trim();
          if (!c || c.length < 3) continue;
          // Split comma-separated values for dedup (e.g. "A, B, C")
          if (/^\d[\d\-,\s]+$/.test(c)) {
            c.split(',').map(s=>s.trim()).filter(s=>s.length>=3).forEach(s=>flat.push(s));
          } else {
            flat.push(c);
          }
        }
        const cleaned = flat.filter(c => !globalSeen.has(c))
          .map(c => c.length > 500 ? c.substring(0, 500) + '…' : c);
        cleaned.forEach(c => globalSeen.add(c));
        if (cleaned.length) record.pubchem_data[heading] = cleaned;
      }
    }
    // Remove empty pubchem_data
    if (!Object.keys(record.pubchem_data).length) delete record.pubchem_data;

    // === AI Extracted: unit-standardized, aggregated values ===
    const pd = record.pubchem_data || {};
    function findPdVal(...keys) {
      for (const [h, items] of Object.entries(pd)) {
        const hl = h.toLowerCase();
        if (keys.some(k => hl.includes(k)) && items.length) return items;
      }
      return null;
    }

    // GHS codes (deduplicated)
    const ghsItems = findPdVal('ghs classification');
    if (ghsItems) record.ai_extracted.ghs_codes = extractGhsCodes(ghsItems);

    // Physical properties: parse ALL values, convert units, take median
    const bpVals = parseAllValues(findPdVal('boiling point'), parseTempCelsius);
    const mpVals = parseAllValues(findPdVal('melting point'), parseTempCelsius);
    const fpVals = parseAllValues(findPdVal('flash point'), parseTempCelsius);
    const densVals = parseAllValues(findPdVal('density'), parseDensity);
    const vpVals = parseAllValues(findPdVal('vapor pressure'), parsePressureMmHg);
    const logpVals = parseAllValues(findPdVal('logp'), t => {
      const m = t.match(/([\d.]+)/); return m ? parseFloat(m[1]) : null;
    });

    if (bpVals.length) {
      record.ai_extracted.boiling_point_celsius = median(bpVals);
      if (bpVals.length > 1) record.ai_extracted.boiling_point_n = bpVals.length;
    }
    if (mpVals.length) {
      record.ai_extracted.melting_point_celsius = median(mpVals);
      if (mpVals.length > 1) record.ai_extracted.melting_point_n = mpVals.length;
    }
    if (fpVals.length) {
      record.ai_extracted.flash_point_celsius = median(fpVals);
      if (fpVals.length > 1) record.ai_extracted.flash_point_n = fpVals.length;
    }
    if (densVals.length) {
      record.ai_extracted.density_g_cm3 = median(densVals);
    }
    if (vpVals.length) {
      record.ai_extracted.vapor_pressure_mmhg = median(vpVals);
    }
    if (logpVals.length) {
      record.ai_extracted.logp_experimental = median(logpVals);
    }

    // Remove empty ai_extracted
    if (!Object.keys(record.ai_extracted).length) delete record.ai_extracted;

    // === Data Completeness Score (0-100%) ===
    // New shape: { overall, local, pubchem } — pubchem is null when no CID.
    // Keep `data_completeness_pct` for backwards compat (= overall).
    const _cmp = calcCompleteness(record);
    record.data_completeness_pct = _cmp.overall;
    record.data_completeness = _cmp;
    // Mirror the same value into the canonical-shape metadata block.
    if (record.metadata) record.metadata.data_quality_pct = _cmp.overall;
    record.data_source = {
      chemical_data: "PubChem (NIH/NCBI)",
      perfumery_data: mat.record?.perfumery?.odor_source === 'PubChem' ? "PubChem (partial)" : mat.record?.perfumery?.odor_description ? "Local Perfumery Database" : "Not Available"
    };

    return record;
  });

  if (data.length) {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "perfume_report.json"; a.click();
  }

  btn.textContent = origText;
  btn.style.pointerEvents = "";
  btn.style.opacity = "";
}

// ===== Print / PDF =====
async function preparePrint(full=true) {
  if (full) {
    // Load all PubChem data that hasn't been fetched yet
    const unloaded = [];
    results.forEach((mat, idx) => {
      if (mat.found && mat.record.identifiers.pubchem_cid) {
        const dataDiv = document.getElementById("pcData"+idx);
        if (dataDiv && !dataDiv.dataset.loaded) unloaded.push(idx);
      }
    });

    if (unloaded.length) {
      const status = document.createElement('div');
      status.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:12px;background:#3D5A80;color:#fff;text-align:center;z-index:9999;font-size:0.9em;';
      status.textContent = `Loading PubChem data (0/${unloaded.length})...`;
      document.body.appendChild(status);

      for (let i = 0; i < unloaded.length; i++) {
        status.textContent = `Loading PubChem data (${i+1}/${unloaded.length})...`;
        await loadPubchemData(unloaded[i]);
      }
      document.body.removeChild(status);
    }
  }

  // Summary mode: add class to body to hide PubChem data via CSS
  if (!full) document.body.classList.add('print-summary');

  // Remove hidden elements from DOM to prevent browser page-break quirks
  const removed = [];
  document.querySelectorAll('.card-back, .pubchem-toggle, .card-body > hr').forEach(el => {
    removed.push({el, parent: el.parentNode, next: el.nextSibling});
    el.parentNode.removeChild(el);
  });
  // Remove empty pubchem-data divs
  document.querySelectorAll('.pubchem-data').forEach(el => {
    if (!el.innerHTML.trim()) {
      removed.push({el, parent: el.parentNode, next: el.nextSibling});
      el.parentNode.removeChild(el);
    }
  });

  window.print();

  // Cleanup after print - restore removed elements
  function cleanup() {
    document.body.classList.remove('print-summary');
    for (let i = removed.length - 1; i >= 0; i--) {
      const {el, parent, next} = removed[i];
      if (next && next.parentNode === parent) parent.insertBefore(el, next);
      else parent.appendChild(el);
    }
  }
  window.addEventListener('afterprint', cleanup, {once: true});
  setTimeout(cleanup, 60000);
}

function toggleDlMenu() {
  document.getElementById('dlMenu').classList.toggle('open');
}
function closeDlMenu() {
  document.getElementById('dlMenu').classList.remove('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.dl-wrap')) closeDlMenu();
});

// ===== Classification =====
function classifyMaterialType(mat) {
  const r = mat.record || mat; // support both result objects and raw DB entries
  const pf = r.perfumery || {}, sf = r.safety || {}, nm = r.names || {}, id = r.identifiers || {};
  const n = (nm.canonical || '').toLowerCase();
  const syns = (nm.synonyms || []).join(' ').toLowerCase();
  const desc = ((pf.odor_description || '') + ' ' + (sf.usage_levels || '')).toLowerCase();
  const odorType = (pf.odor_type || '').toLowerCase();
  const note = (pf.note || '').toLowerCase();
  const cas = id.cas || '';
  const all = n + ' ' + syns + ' ' + desc + ' ' + odorType;
  if (/\b(preservative|biocide|antioxidant|stabilizer|additive)\b/i.test(all) || /^(additive|base\/additive)$/i.test(note)) return 'additive';
  if (MIXTURES.has(cas)) return 'natural_extract';
  if (/\b(essential oil|absolute|extract|resinoid|concrete|tincture|oleoresin|balsam|wax)\b/i.test(all)) return 'natural_extract';
  if (/\b(solvent|carrier|diluent|emollient|virtually odorless|odorless)\b/i.test(all)) return 'solvent_carrier';
  if (/\b(isododecane|dipropylene glycol|isopropyl myristate|triethyl citrate|benzyl benzoate)\b/i.test(n)) return 'solvent_carrier';
  if (RE_NATURAL_ISO.test(all) && !MIXTURES.has(cas)) return 'natural_isolate';
  return 'single_molecule';
}
const MATERIAL_TYPE_LABELS = {
  'additive': 'Preservative / Additive',
  'natural_extract': 'Natural Extract',
  'natural_isolate': 'Natural Isolate',
  'solvent_carrier': 'Solvent / Carrier',
  'single_molecule': 'Aroma Chemical'
};

function getBanStatus(mat) {
  const r = mat.record || mat;
  const sf = r.safety || {};
  const ifra = (sf.ifra_guideline || '').toLowerCase();
  const usage = (sf.usage_levels || '').toLowerCase();
  const all = ifra + ' ' + usage;
  if (/prohibited\s*worldwide|\bbanned\b(?!.*\beu\b)/i.test(all) && !/\beu\b/i.test(ifra))
    return 'worldwide';
  if (/\bbanned\b|prohibited\s*in\s*eu|banned\s*in\s*eu/i.test(all))
    return 'eu';
  return null;
}
function isBannedEU(mat) { return getBanStatus(mat) !== null; }

function classifyIndustryTags(mat) {
  const r = mat.record || mat;
  const pf = r.perfumery || {}, sf = r.safety || {}, nm = r.names || {}, md = r.metadata || {};
  const tags = [];
  const n = (nm.canonical || '').toLowerCase();
  const desc = (pf.odor_description || '').toLowerCase();
  const odorType = (pf.odor_type || '').toLowerCase();
  const syns = (nm.synonyms || []).join(' ').toLowerCase();
  const pdStr = md.pubchem_sections ? JSON.stringify(md.pubchem_sections).toLowerCase() : '';
  const id = r.identifiers || {};
  const cas = id.cas || '';
  const banned = isBannedEU(mat);

  const isSolvent = /\bsolvent\b/i.test(odorType + ' ' + desc + ' ' + (pf.note || ''));
  const isFunctional = !isSolvent && /preservative|biocide|antioxidant|stabilizer/i.test(odorType + ' ' + desc);
  const hasRealOdor = (pf.odor_description || pf.odor_type || pf.odor_strength)
    && !isFunctional
    && !/^odorless|^none$/i.test((pf.odor_strength||''));

  // Functional additives — not perfumery
  if (isFunctional) {
    tags.push('additive');
    return tags;
  }

  // Cosmetics-only branch: solvents / carriers / diluents that are not
  // themselves perfumery ingredients but are used in cosmetic formulation.
  // This runs BEFORE the perfumery branch so materials like Dipropylene
  // Glycol, Isopropyl Myristate, Propylene Glycol, Squalane get a meaningful
  // cosmetics tag without being incorrectly tagged 'perfumery'.
  const isCosmeticCarrier = !banned && !hasRealOdor && !MIXTURES.has(cas) && (
    /\b(solvent|carrier|diluent|emollient)\b/i.test((pf.note||'') + ' ' + desc + ' ' + odorType) ||
    /\b(dipropylene glycol|isopropyl myristate|triethyl citrate|mct oil|squalane|isododecane|propylene glycol|benzyl benzoate)\b/i.test(n)
  );
  if (isCosmeticCarrier) tags.push('cosmetics');

  // Perfumery / Flavor / Cosmetics
  if (hasRealOdor || MIXTURES.has(cas) ||
      /fragrance|perfum|aroma|odor agent/i.test(pdStr) ||
      /solvent.*carrier|carrier.*solvent|emollient/i.test(desc + ' ' + odorType)) {
    tags.push('perfumery');
    // Flavor: only if has FEMA or explicit food use, and not banned
    if (!banned && (id.fema || /flavor|flavour|food additive|fema|jecfa/i.test(pdStr))) {
      tags.push('flavor');
    }
    // Cosmetics: narrower rule than "any non-banned perfumery material".
    // Tag only when there's a concrete cosmetic signal:
    //   - explicit cosmetic/skin keywords in PubChem sections, OR
    //   - solvent/carrier/emollient function (non-aromatic functional use), OR
    //   - MCT oil / triacetin / benzyl benzoate class (explicit carriers in name), OR
    //   - odorless / very-low-odor ingredients that are commonly used as diluents.
    // This makes "cosmetics" distinguishable from "perfumery" in the filter.
    if (!banned) {
      const cosmeticSignal =
        /\b(cosmetic|skin|dermal|masking|emollient|carrier|diluent|excipient)\b/i.test(pdStr) ||
        /\b(solvent|carrier|diluent|emollient)\b/i.test(desc + ' ' + odorType + ' ' + (pf.note||'')) ||
        /\b(benzyl benzoate|dipropylene glycol|isopropyl myristate|triethyl citrate|mct oil|squalane|isododecane|propylene glycol)\b/i.test(n);
      if (cosmeticSignal) tags.push('cosmetics');
    }
    // Add banned tag
    if (banned) {
      const scope = getBanStatus(mat);
      tags.push(scope === 'worldwide' ? 'banned_global' : 'banned_eu');
    }
  }

  // Pharmaceutical
  if (!hasRealOdor && /pharma|drug|medicine|therapeutic|anesthetic|analgesic|antibiotic/i.test(pdStr + ' ' + syns)) {
    tags.push('pharmaceutical', 'medicine');
  }
  // Also tag if ATC code present
  if (/atc code/i.test(pdStr)) {
    if (!tags.includes('pharmaceutical')) tags.push('pharmaceutical');
  }

  // Toxicology / Research
  if (/toxin|mycotoxin|venom|research.only|highly.toxic|poison/i.test(n + ' ' + syns + ' ' + pdStr)) {
    tags.push('toxicology', 'research_only');
  }

  // Fallback: if no tags assigned
  if (!tags.length) {
    tags.push('chemical', 'unclassified');
  }

  return tags;
}
const INDUSTRY_TAG_LABELS = {
  'perfumery': 'Perfumery', 'flavor': 'Flavor', 'cosmetics': 'Cosmetics',
  'additive': 'Additive / Preservative',
  'banned_eu': 'Banned (EU)', 'banned_global': 'Banned (Worldwide)',
  'pharmaceutical': 'Pharma', 'medicine': 'Medicine',
  'toxicology': 'Toxicology', 'research_only': 'Research',
  'chemical': 'Chemical', 'unclassified': 'Unclassified'
};

function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toTitle(s) { return s.replace(/\b\w/g, c=>c.toUpperCase()); }
