name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        # Skip the prepare lifecycle (it tries to install git hooks into
        # .git/hooks; CI doesn't need them and the hook copy can fail on
        # shallow checkouts).
        run: npm ci --ignore-scripts

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Tests (vitest)
        run: npm test

      - name: Lint data (schema + cross-ref + ratchet)
        run: npm run lint:data

      # Round 3 P1.7 — molecular layer gates.
      # verify-molecular runs offline against audit/cache/ + the
      # baseline allowlist. The cache directory is gitignored, so a
      # fresh CI clone can't run the row-level InChIKey integrity
      # check; verify-molecular silently skips that one check on
      # cache-miss (logs the skip count) and still validates ranges +
      # provenance + vapor-pressure positivity. Range / provenance
      # errors fail the build; allowlisted rows + cache skips do not.
      #
      # PubChem auto-fetch is intentionally NOT wired here — the rate
      # limit + non-determinism would make CI flaky. Operators run
      # `npm run enrich-molecular` on a dev box and commit the patches.
      - name: Lint molecular (range + provenance + cache integrity)
        run: npm run lint:molecular

      - name: Molecular coverage report (informational)
        run: npm run report:molecular-coverage
        continue-on-error: true

      - name: Lint version drift
        run: npm run lint:version

      - name: Codemap freshness
        run: npm run codemap:check
